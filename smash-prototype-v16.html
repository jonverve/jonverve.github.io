                    const r = Math.max(0, ((hex >> 16) & 0xff) - amt);
                    const g = Math.max(0, ((hex >>  8) & 0xff) - amt);
                    const b = Math.max(0,  (hex        & 0xff) - amt);
                    return (r << 16) | (g << 8) | b;
                };
                const colLight  = lighten(col, 80);   // highlight colour
                const colDark   = darken(col,  60);   // shadow colour
                const colRim    = lighten(col, 140);  // rim-light / specular

                // ── Capsule helper ──────────────────────────────────────────
                // Draws a filled pill-shape from (x1,y1) to (x2,y2) with half-width r.
                // Uses two end-circles + a filled quad, then an optional highlight pass.
                const drawCapsule = (x1, y1, x2, y2, r, fillCol, fillAlpha, hlCol, hlAlpha) => {
                    const dx = x2 - x1, dy = y2 - y1;
                    const len = Math.sqrt(dx*dx + dy*dy);
                    if (len < 0.5) { gfx.fillStyle(fillCol, fillAlpha); gfx.fillCircle(x1, y1, r); return; }
                    const nx = -dy / len, ny = dx / len; // perpendicular unit
                    // Fill end circles
                    gfx.fillStyle(fillCol, fillAlpha);
                    gfx.fillCircle(x1, y1, r);
                    gfx.fillCircle(x2, y2, r);
                    // Fill body quad (two triangles)
                    gfx.fillTriangle(
                        x1 + nx*r, y1 + ny*r,
                        x1 - nx*r, y1 - ny*r,
                        x2 + nx*r, y2 + ny*r
                    );
                    gfx.fillTriangle(
                        x1 - nx*r, y1 - ny*r,
                        x2 - nx*r, y2 - ny*r,
                        x2 + nx*r, y2 + ny*r
                    );
                    // Dark outline for form definition
                    gfx.lineStyle(1, colDark, 0.55);
                    gfx.lineBetween(x1 + nx*r, y1 + ny*r, x2 + nx*r, y2 + ny*r);
                    gfx.lineBetween(x1 - nx*r, y1 - ny*r, x2 - nx*r, y2 - ny*r);
                    // Highlight stripe — offset slightly toward the light source (upper-left)
                    if (hlAlpha > 0) {
                        const hOff = r * 0.35;
                        gfx.lineStyle(r * 0.45, hlCol, hlAlpha);
                        gfx.lineBetween(
                            x1 + nx*hOff - ny*0.5, y1 + ny*hOff + nx*0.5,
                            x2 + nx*hOff - ny*0.5, y2 + ny*hOff + nx*0.5
                        );
                    }
                };

                // Limb thickness values
                const armR   = 3.2 * scale;   // arm capsule half-width
                const legR   = 3.8 * scale;   // leg capsule half-width
                const torsoW = 5.5 * scale;   // torso half-width at shoulder
                const torsoWH = 3.8 * scale;  // torso half-width at hip

                // ── Compute all joint positions first ───────────────────────
                const headDrawX = headX + Math.sin(L.headTilt * facing) * 2;
                const elbowF = limbEnd(shoulderRX, shoulderY, L.armFrontUpper, upperArm);
                const handF  = limbEnd(elbowF.x, elbowF.y, L.armFrontUpper + L.armFrontLower, lowerArm);
                const elbowB = limbEnd(shoulderLX, shoulderY, L.armBackUpper, upperArm);
                const handB  = limbEnd(elbowB.x, elbowB.y, L.armBackUpper + L.armBackLower, lowerArm);
                const kneeF  = limbEnd(hipX, hipY, L.legFrontUpper, upperLeg);
                const footF  = limbEnd(kneeF.x, kneeF.y, L.legFrontUpper + L.legFrontLower, lowerLeg);
                const kneeB  = limbEnd(hipX, hipY, L.legBackUpper, upperLeg);
                const footB  = limbEnd(kneeB.x, kneeB.y, L.legBackUpper + L.legBackLower, lowerLeg);

                // ── Draw order: back limbs → torso → front limbs → head ─────

                // -- BACK LEG (further from camera — dimmer, thinner) --
                drawCapsule(hipX, hipY, kneeB.x, kneeB.y, legR * 0.72, colDark, 0.75, colLight, 0.0);
                drawCapsule(kneeB.x, kneeB.y, footB.x, footB.y, legR * 0.65, colDark, 0.7, colLight, 0.0);
                // Knee joint
                gfx.fillStyle(darken(col, 40), 0.8);
                gfx.fillCircle(kneeB.x, kneeB.y, legR * 0.75);

                // -- BACK ARM (weapon/bow/gun hand — behind body) --
                drawCapsule(shoulderLX, shoulderY, elbowB.x, elbowB.y, armR * 0.72, colDark, 0.7, colLight, 0.0);
                drawCapsule(elbowB.x, elbowB.y, handB.x, handB.y, armR * 0.65, colDark, 0.65, colLight, 0.0);
                gfx.fillStyle(darken(col, 30), 0.75);
                gfx.fillCircle(elbowB.x, elbowB.y, armR * 0.8);

                // -- TORSO (filled tapered shape) --
                // Draw as two overlapping capsules for a slight taper
                const torsoMidX = (neckX + hipX) / 2;
                const torsoMidY = (neckY + hipY) / 2;
                // Main torso fill — tapered quad via triangles
                const tdx = hipX - neckX, tdy = hipY - neckY;
                const tLen = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
                const tnx = -tdy / tLen, tny = tdx / tLen;
                gfx.fillStyle(col, 1);
                gfx.fillTriangle(
                    neckX + tnx * torsoW,  neckY + tny * torsoW,
                    neckX - tnx * torsoW,  neckY - tny * torsoW,
                    hipX  + tnx * torsoWH, hipY  + tny * torsoWH
                );
                gfx.fillTriangle(
                    neckX - tnx * torsoW,  neckY - tny * torsoW,
                    hipX  - tnx * torsoWH, hipY  - tny * torsoWH,
                    hipX  + tnx * torsoWH, hipY  + tny * torsoWH
                );
                // Torso highlight stripe
                gfx.lineStyle(torsoW * 0.6, colLight, 0.22);
                gfx.lineBetween(neckX + tnx * torsoW * 0.3, neckY + tny * torsoW * 0.3,
                                hipX  + tnx * torsoWH * 0.3, hipY  + tny * torsoWH * 0.3);
                // Torso outline
                gfx.lineStyle(1.2, colDark, 0.6);
                gfx.lineBetween(neckX + tnx * torsoW, neckY + tny * torsoW, hipX + tnx * torsoWH, hipY + tny * torsoWH);
                gfx.lineBetween(neckX - tnx * torsoW, neckY - tny * torsoW, hipX - tnx * torsoWH, hipY - tny * torsoWH);
                // Shoulder cap
                gfx.fillStyle(lighten(col, 30), 0.9);
                gfx.fillCircle(neckX, neckY, torsoW * 0.9);
                // Hip cap
                gfx.fillStyle(colDark, 0.9);
                gfx.fillCircle(hipX, hipY, torsoWH * 0.95);

                // -- FRONT LEG (closer — full brightness) --
                drawCapsule(hipX, hipY, kneeF.x, kneeF.y, legR, col, 1.0, colLight, 0.28);
                drawCapsule(kneeF.x, kneeF.y, footF.x, footF.y, legR * 0.85, col, 1.0, colLight, 0.22);
                // Knee joint sphere
                gfx.fillStyle(lighten(col, 20), 1);
                gfx.fillCircle(kneeF.x, kneeF.y, legR * 1.1);
                gfx.fillStyle(colLight, 0.4);
                gfx.fillCircle(kneeF.x - 1, kneeF.y - 1, legR * 0.5); // specular

                // -- FRONT ARM (front — full brightness) --
                drawCapsule(shoulderRX, shoulderY, elbowF.x, elbowF.y, armR, col, 1.0, colLight, 0.32);
                drawCapsule(elbowF.x, elbowF.y, handF.x, handF.y, armR * 0.85, col, 1.0, colLight, 0.26);
                // Elbow joint sphere
                gfx.fillStyle(lighten(col, 20), 1);
                gfx.fillCircle(elbowF.x, elbowF.y, armR * 1.05);
                gfx.fillStyle(colLight, 0.4);
                gfx.fillCircle(elbowF.x - 1, elbowF.y - 1, armR * 0.45); // specular

                // Hand nub
                gfx.fillStyle(col, 1);
                gfx.fillCircle(handF.x, handF.y, armR * 0.9);

                // -- SWORD (drawn from FRONT hand, pointing forward along facing) --
                if (L.swordVisible && L.swordLength > 0) {
                    // swordAngle: 0 = forward, positive = upward, negative = downward
                    // facing=1 means right, facing=-1 means left
                    const swordA = -L.swordAngle + (facing < 0 ? Math.PI : 0);
                    const tipX = handF.x + Math.cos(swordA) * L.swordLength;
                    const tipY = handF.y + Math.sin(swordA) * L.swordLength;
                    const sPerp = swordA + Math.PI / 2;
                    // Blade — filled flat shape with highlight edge
                    const bW = 2.5;
                    gfx.fillStyle(0x888899, 1);
                    gfx.fillTriangle(
                        handF.x + Math.cos(sPerp)*bW, handF.y + Math.sin(sPerp)*bW,
                        handF.x - Math.cos(sPerp)*bW, handF.y - Math.sin(sPerp)*bW,
                        tipX, tipY
                    );
                    // Blade edge highlight
                    gfx.lineStyle(1.2, 0xeeeeff, 0.85);
                    gfx.lineBetween(handF.x + Math.cos(sPerp)*bW, handF.y + Math.sin(sPerp)*bW, tipX, tipY);
                    // Dark spine
                    gfx.lineStyle(1, 0x444455, 0.7);
                    gfx.lineBetween(handF.x, handF.y, tipX, tipY);
                    // Guard (crosspiece)
                    const guardPerp = swordA + Math.PI / 2;
                    const guardLen = 5;
                    gfx.lineStyle(4, 0xaa8833, 1);
                    gfx.lineBetween(
                        handF.x + Math.cos(guardPerp) * guardLen,
                        handF.y + Math.sin(guardPerp) * guardLen,
                        handF.x - Math.cos(guardPerp) * guardLen,
                        handF.y - Math.sin(guardPerp) * guardLen
                    );
                    gfx.lineStyle(1.5, 0xffdd66, 0.7);
                    gfx.lineBetween(
                        handF.x + Math.cos(guardPerp) * guardLen,
                        handF.y + Math.sin(guardPerp) * guardLen,
                        handF.x - Math.cos(guardPerp) * guardLen,
                        handF.y - Math.sin(guardPerp) * guardLen
                    );
                    // Tip glint
                    gfx.fillStyle(0xffffff, 0.9);
                    gfx.fillCircle(tipX, tipY, 2);
                }

                // -- HEAD --
                // Outer shadow ring for depth
                gfx.fillStyle(colDark, 0.7);
                gfx.fillCircle(headDrawX + 1, headY + 1, headR);
                // Main fill
                gfx.fillStyle(col, 1);
                gfx.fillCircle(headDrawX, headY, headR);
                // Dark outline
                gfx.lineStyle(1.5, colDark, 0.8);
                gfx.strokeCircle(headDrawX, headY, headR);
                // Sheen highlight — upper-left quadrant, offset oval
                gfx.fillStyle(colRim, 0.35);
                gfx.fillEllipse(headDrawX - headR * 0.2, headY - headR * 0.28, headR * 0.9, headR * 0.65);
                // Specular point
                gfx.fillStyle(0xffffff, 0.55);
                gfx.fillCircle(headDrawX - headR * 0.3, headY - headR * 0.35, headR * 0.18);
                // Eyes — whites
                const eyeDir = facing;
                const eyeX = headDrawX + eyeDir * headR * 0.35;
                const eyeY = headY - headR * 0.1;
                gfx.fillStyle(0xffffff, 1);
                gfx.fillCircle(eyeX, eyeY, 2.5);
                // Iris (tinted to character colour)
                gfx.fillStyle(colDark, 1);
                gfx.fillCircle(eyeX + eyeDir * 0.7, eyeY, 1.6);
                // Pupil
                gfx.fillStyle(0x000000, 1);
                gfx.fillCircle(eyeX + eyeDir * 0.9, eyeY, 0.8);
                // Eye glint
                gfx.fillStyle(0xffffff, 0.9);
                gfx.fillCircle(eyeX + eyeDir * 0.3, eyeY - 0.7, 0.5);

                // -- CHARACTER-SPECIFIC ACCESSORIES --
                const charKey = f.charKey;

                if (charKey === 'bowman') {
                    // BOW: held in BACK hand (weapon hand). Vertical stave, curve forward, string toward bowman.
                    const bowAtkName = f.currentAttack?.name || '';
                    const isDrawAttack = f.state === S.ATTACK &&
                        (bowAtkName === 'Arrow Shot' || bowAtkName === 'Triple Shot' || bowAtkName === 'Piercing Shot');
                    const isDrawing = isDrawAttack && f.attackFrame <= (f.currentAttack?.startup || 0);
                    const drawPct = isDrawing ? Math.min(f.attackFrame / Math.max(f.currentAttack?.startup || 1, 1), 1) : 0;

                    const bowHalfH = 16 * scale;  // half-height of bow stave
                    const bowBulge = 7 * scale;   // forward bulge of curve
                    const bulgeFwd = facing;       // curve points toward enemy

                    // Bow center always at back hand; raise 5px during the shot (active + recovery)
                    const isShooting = isDrawAttack && !isDrawing;
                    const bowCx = handB.x;
                    const bowCy = handB.y - (isShooting ? 15 : 0);

                    const bowTopX = bowCx, bowTopY = bowCy - bowHalfH;
                    const bowBotX = bowCx, bowBotY = bowCy + bowHalfH;

                    // Draw bow stave as forward-bulging arc
                    gfx.lineStyle(2.5, 0x885522, 1);
                    const pts = 10;
                    for (let i = 0; i < pts; i++) {
                        const t0 = i / pts, t1 = (i + 1) / pts;
                        const y0 = bowTopY + (bowBotY - bowTopY) * t0;
                        const y1 = bowTopY + (bowBotY - bowTopY) * t1;
                        const bx0 = bowCx + bulgeFwd * Math.sin(t0 * Math.PI) * bowBulge;
                        const bx1 = bowCx + bulgeFwd * Math.sin(t1 * Math.PI) * bowBulge;
                        gfx.lineBetween(bx0, y0, bx1, y1);
                    }

                    // String: white, connects tips, nock pulls back toward front hand on draw
                    const stringPull = drawPct * 10 * scale;
                    // On draw, the front hand pulls the string toward itself (back toward bowman body)
                    const nockX = bowCx - bulgeFwd * stringPull;
                    const nockY = bowCy;

                    gfx.lineStyle(1.5, 0xffffff, 0.9);
                    gfx.lineBetween(bowTopX, bowTopY, nockX, nockY);
                    gfx.lineBetween(bowBotX, bowBotY, nockX, nockY);

                    // Nocked arrow during draw — horizontal shaft from nock toward enemy
                    if (drawPct > 0.05) {
                        const arrowShaftLen = bowBulge + stringPull + 8 * scale;
                        const arrowTipX = nockX + bulgeFwd * arrowShaftLen;
                        const arrowTipY = nockY;
                        gfx.lineStyle(1.5, 0xcc9944, 0.9);
                        gfx.lineBetween(nockX, nockY, arrowTipX, arrowTipY);
                        const ahSize = 3;
                        gfx.fillStyle(0x999999, 1);
                        gfx.fillTriangle(
                            arrowTipX + bulgeFwd * ahSize, arrowTipY,
                            arrowTipX - bulgeFwd * ahSize, arrowTipY - ahSize,
                            arrowTipX - bulgeFwd * ahSize, arrowTipY + ahSize
                        );
                        gfx.lineStyle(1, 0xff4444, 0.7);
                        gfx.lineBetween(nockX, nockY, nockX - bulgeFwd * 4, nockY - 3);
                        gfx.lineBetween(nockX, nockY, nockX - bulgeFwd * 4, nockY + 3);
                    }
                }

                if (charKey === 'wizard') {
                    // WIZARD HAT: triangle on top of head
                    const hatBase = headR * 1.2;
                    const hatH = headR * 2.2;
                    const hatY = headY - headR;
                    gfx.fillStyle(0x4422aa, 0.9);
                    gfx.fillTriangle(
                        headDrawX - hatBase, hatY,
                        headDrawX + hatBase, hatY,
                        headDrawX + facing * 4, hatY - hatH
                    );
                    gfx.lineStyle(1.5, 0x6644cc, 1);
                    gfx.strokeTriangle(
                        headDrawX - hatBase, hatY,
                        headDrawX + hatBase, hatY,
                        headDrawX + facing * 4, hatY - hatH
                    );
                    // Hat brim
                    gfx.lineStyle(2.5, 0x4422aa, 1);
                    gfx.lineBetween(headDrawX - hatBase * 1.4, hatY, headDrawX + hatBase * 1.4, hatY);
                    // Star on hat
                    gfx.fillStyle(0xffcc00, 0.9);
                    gfx.fillCircle(headDrawX + facing * 2, hatY - hatH * 0.55, 2.5);
                    // Magic glow during attacks — emanates from BACK hand (casting hand)
                    if (f.state === S.ATTACK) {
                        gfx.fillStyle(0x9944ff, 0.3);
                        gfx.fillCircle(handB.x, handB.y, 8 + Math.sin(f.stateTimer * 0.3) * 3);
                        gfx.lineStyle(1, 0xcc88ff, 0.6);
                        gfx.strokeCircle(handB.x, handB.y, 10 + Math.sin(f.stateTimer * 0.3) * 3);
                    }
                }

                if (charKey === 'cowboy') {
                    // COWBOY HAT: wide brim
                    const brimW = headR * 2.0;
                    const brimY = headY - headR * 0.7;
                    gfx.fillStyle(0x885522, 0.9);
                    // Hat crown
                    gfx.fillRect(headDrawX - headR * 0.7, brimY - headR * 0.9, headR * 1.4, headR * 0.9);
                    // Brim
                    gfx.fillRect(headDrawX - brimW, brimY, brimW * 2, 3);
                    gfx.lineStyle(1, 0x664411, 1);
                    gfx.strokeRect(headDrawX - brimW, brimY, brimW * 2, 3);

                    // COWBOY BOOTS/SPURS on feet
                    [footF, footB].forEach((foot, bi) => {
                        const alpha = bi === 0 ? 1 : 0.5;
                        gfx.fillStyle(0x663311, alpha);
                        gfx.fillRect(foot.x - 4, foot.y - 2, 8, 6);
                        // Spur
                        gfx.lineStyle(1.5, 0xccaa44, alpha);
                        const spurDir = -facing;
                        gfx.lineBetween(foot.x + spurDir * 3, foot.y + 2, foot.x + spurDir * 7, foot.y + 4);
                        gfx.fillStyle(0xffcc44, alpha);
                        gfx.fillCircle(foot.x + spurDir * 7, foot.y + 4, 2);
                    });

                    // GUN: always shown in BACK hand (weapon hand), more prominent during gun attacks
                    const atkName = f.currentAttack?.name || '';
                    const isGunAttack = f.state === S.ATTACK && (atkName === 'Peacemaker' || atkName === 'Fan Shot' || atkName === 'Dead Eye');
                    const gunA = (L.armBackUpper + L.armBackLower) * facing + Math.PI / 2;
                    const gunBodyLen = 9;
                    const barrelLen = 10;
                    const gunAlpha = isGunAttack ? 1.0 : 0.7;

                    // Gun body (grip at back hand)
                    const gunBodyEndX = handB.x + Math.cos(gunA) * gunBodyLen;
                    const gunBodyEndY = handB.y + Math.sin(gunA) * gunBodyLen;
                    gfx.lineStyle(4.5, 0x333333, gunAlpha);
                    gfx.lineBetween(handB.x, handB.y, gunBodyEndX, gunBodyEndY);

                    // Gun barrel extends further out
                    const muzzleX = gunBodyEndX + Math.cos(gunA) * barrelLen;
                    const muzzleY = gunBodyEndY + Math.sin(gunA) * barrelLen;
                    gfx.lineStyle(2.5, 0x444444, gunAlpha);
                    gfx.lineBetween(gunBodyEndX, gunBodyEndY, muzzleX, muzzleY);

                    // Trigger guard
                    gfx.lineStyle(1.5, 0x555555, gunAlpha * 0.8);
                    gfx.lineBetween(handB.x, handB.y, handB.x - Math.cos(gunA) * 3, handB.y - Math.sin(gunA) * 3);

                    // Muzzle flash during active frames
                    if (isGunAttack &&
                        f.attackFrame > (f.currentAttack?.startup || 0) &&
                        f.attackFrame <= (f.currentAttack?.startup || 0) + (f.currentAttack?.active || 0)) {
                        gfx.fillStyle(0xffffff, 0.95);
                        gfx.fillCircle(muzzleX, muzzleY, 5);
                        gfx.fillStyle(0xffcc00, 0.85);
                        gfx.fillCircle(muzzleX, muzzleY, 4);
                        gfx.fillStyle(0xff8800, 0.6);
                        gfx.fillCircle(muzzleX, muzzleY, 7);
                        for (let fi = 0; fi < 5; fi++) {
                            const fa = gunA + (fi - 2) * 0.35;
                            gfx.lineStyle(1.5, 0xffdd44, 0.7);
                            gfx.lineBetween(muzzleX, muzzleY,
                                muzzleX + Math.cos(fa) * 9, muzzleY + Math.sin(fa) * 9);
                        }
                        const bulletX = muzzleX + Math.cos(gunA) * 8;
                        const bulletY = muzzleY + Math.sin(gunA) * 4;
                        gfx.fillStyle(0xddddaa, 0.9);
                        gfx.fillCircle(bulletX, bulletY, 2.5);
                    }
                }

                if (charKey === 'superguy') {
                    // CAPE: wider, flowing from both shoulders
                    // P1 = red cape, P2/CPU = blue cape
                    const capeCol    = f.playerIndex === 0 ? 0xcc2222 : 0x2244cc;
                    const capeHigh   = f.playerIndex === 0 ? 0xff4444 : 0x4466ff;
                    const capeSheen  = f.playerIndex === 0 ? 0xff6666 : 0x6688ff;
                    const capeLen = 28 * scale; // Longer cape
                    // Cape attachment spans both shoulders for width
                    const capeTopX = neckX - facing * 6;
                    const capeTopY = neckY + 1;
                    const capeTopRX = shoulderLX - facing * 2; // Extra width at back shoulder
                    const capeTopLX = shoulderRX - facing * 5;
                    // Cape flows behind movement (opposite to velocity direction)
                    const velFactor = f.body.velocity ? f.body.velocity.x * 0.005 : 0;
                    const sway = Math.sin(f.stateTimer * 0.08) * 0.15 + velFactor;
                    // Draw cape as a wider filled shape
                    const segs = 6;
                    let prevTopX = capeTopRX, prevTopY = capeTopY;
                    let prevBotX = capeTopLX, prevBotY = capeTopY;
                    for (let i = 1; i <= segs; i++) {
                        const t = i / segs;
                        const segAngle = Math.PI / 2 + (-facing) * 0.3 + sway * t + L.torsoLean * -0.5 * t;
                        const segLen = capeLen / segs;
                        const widthAtSeg = (1 - t * 0.3) * 8 * scale; // Cape tapers slightly
                        const topNx = prevTopX + Math.cos(segAngle) * segLen;
                        const topNy = prevTopY + Math.sin(segAngle) * segLen;
                        const botNx = prevBotX + Math.cos(segAngle) * segLen;
                        const botNy = prevBotY + Math.sin(segAngle) * segLen;
                        // Fill cape segment
                        gfx.fillStyle(capeCol, 0.75 - t * 0.1);
                        gfx.fillTriangle(prevTopX, prevTopY, topNx, topNy, botNx, botNy);
                        gfx.fillTriangle(prevTopX, prevTopY, prevBotX, prevBotY, botNx, botNy);
                        // Outline
                        gfx.lineStyle(4 - t * 1.5, capeCol, 0.9 - t * 0.1);
                        gfx.lineBetween(prevTopX, prevTopY, topNx, topNy);
                        gfx.lineStyle(2, capeHigh, 0.25);
                        gfx.lineBetween(prevBotX, prevBotY, botNx, botNy);
                        prevTopX = topNx; prevTopY = topNy;
                        prevBotX = botNx; prevBotY = botNy;
                    }
                    // Cape bottom edge highlight
                    gfx.lineStyle(1.5, capeSheen, 0.4);
                    gfx.lineBetween(prevTopX, prevTopY, prevBotX, prevBotY);

                    // LASER EYES during laser attacks
                    const atkName2 = f.currentAttack?.name || '';
                    if (f.state === S.ATTACK && (atkName2 === 'Laser Vision' || atkName2 === 'Heat Beam')) {
                        if (f.attackFrame > (f.currentAttack?.startup || 0) &&
                            f.attackFrame <= (f.currentAttack?.startup || 0) + (f.currentAttack?.active || 0)) {
                            // Glowing eye
                            gfx.fillStyle(0xff2200, 1);
                            gfx.fillCircle(eyeX, eyeY, 4);
                            gfx.fillStyle(0xff6600, 0.7);
                            gfx.fillCircle(eyeX, eyeY, 6);
                            // Laser beams from eye extending outward
                            gfx.lineStyle(3, 0xff2200, 0.95);
                            gfx.lineBetween(eyeX, eyeY, eyeX + eyeDir * 60, eyeY);
                            gfx.lineStyle(1.5, 0xff6600, 0.6);
                            gfx.lineBetween(eyeX, eyeY - 1, eyeX + eyeDir * 60, eyeY - 1);
                            gfx.lineBetween(eyeX, eyeY + 1, eyeX + eyeDir * 60, eyeY + 1);
                            // Beam glow
                            gfx.fillStyle(0xff4400, 0.3);
                            gfx.fillRect(Math.min(eyeX, eyeX + eyeDir * 60) - 2, eyeY - 4, 62, 8);
                        }
                    }
                }

                // -- BRUTE ACCESSORIES --
                if (charKey === 'brute') {
                    // Oversized knuckle-dusters / chunky fists on both hands
                    const fistR = 5 * scale;
                    gfx.fillStyle(0x333333, 0.9);
                    gfx.fillCircle(handF.x, handF.y, fistR);
                    gfx.lineStyle(2, 0x666666, 1);
                    gfx.strokeCircle(handF.x, handF.y, fistR);
                    gfx.fillStyle(0x333333, 0.6);
                    gfx.fillCircle(handB.x, handB.y, fistR);
                    gfx.lineStyle(1.5, 0x555555, 0.7);
                    gfx.strokeCircle(handB.x, handB.y, fistR);

                    // Digital glitch corruption marks on torso — distortion lines
                    const glitchT = f.stateTimer;
                    const glitch1 = Math.sin(glitchT * 0.13) > 0.6;
                    const glitch2 = Math.sin(glitchT * 0.19 + 2) > 0.7;
                    if (glitch1) {
                        gfx.lineStyle(1.5, 0x00ffff, 0.4);
                        const gy = neckY + torsoLen * 0.35;
                        gfx.lineBetween(neckX - 8, gy, neckX + 8, gy - 2);
                    }
                    if (glitch2) {
                        gfx.lineStyle(1.5, 0xff00ff, 0.3);
                        const gy2 = neckY + torsoLen * 0.65;
                        gfx.lineBetween(neckX - 6, gy2, neckX + 10, gy2 + 1);
                    }

                    // Active attack flash — seismic shockwave visualization
                    const bruteAtkName = f.currentAttack?.name || '';
                    if (f.state === S.ATTACK && bruteAtkName === 'Seismic') {
                        const inActive = f.attackFrame > (f.currentAttack?.startup || 0) &&
                            f.attackFrame <= (f.currentAttack?.startup || 0) + (f.currentAttack?.active || 0);
                        if (inActive) {
                            const wavePct = (f.attackFrame - (f.currentAttack?.startup || 0)) / (f.currentAttack?.active || 1);
                            gfx.lineStyle(2, 0xff8800, 0.7 - wavePct * 0.5);
                            gfx.strokeCircle(cx, cy, 20 + wavePct * 60);
                            gfx.lineStyle(1, 0xffcc00, 0.4 - wavePct * 0.3);
                            gfx.strokeCircle(cx, cy, 30 + wavePct * 80);
                        }
                    }

                    // No Cap Rush — charge trail
                    if (f.state === S.ATTACK && bruteAtkName === 'No Cap Rush') {
                        const isCharging = f.attackFrame > (f.currentAttack?.startup || 0);
                        if (isCharging) {
                            gfx.lineStyle(3, col, 0.35);
                            gfx.lineBetween(cx - facing * 20, cy, cx - facing * 38, cy + 5);
                            gfx.lineBetween(cx - facing * 16, cy - 8, cx - facing * 32, cy - 6);
                        }
                    }

                    // Skull emoji particle on hit — drawn near fist during active Ratio frames
                    if (f.state === S.ATTACK && bruteAtkName === 'Ratio') {
                        const inActive = f.attackFrame > (f.currentAttack?.startup || 0) &&
                            f.attackFrame <= (f.currentAttack?.startup || 0) + (f.currentAttack?.active || 0);
                        if (inActive) {
                            // Glow on front fist
                            gfx.fillStyle(0xffffff, 0.4);
                            gfx.fillCircle(handF.x, handF.y, 10);
                            gfx.lineStyle(2, 0xffffff, 0.6);
                            gfx.strokeCircle(handF.x, handF.y, 12);
                        }
                    }
                }

                // -- OSPREY ACCESSORIES --
                if (charKey === 'osprey') {
                    // BEAK: pointed triangle on the face side of head circle
                    const beakLen = headR * 1.1;
                    const beakW = headR * 0.35;
                    const beakBaseX = headDrawX + facing * headR * 0.85;
                    const beakBaseY = headY - headR * 0.05;
                    const beakTipX = headDrawX + facing * (headR + beakLen);
                    const beakTipY = headY - headR * 0.05;
                    gfx.fillStyle(0xddaa44, 1);
                    gfx.fillTriangle(
                        beakBaseX, beakBaseY - beakW,
                        beakBaseX, beakBaseY + beakW * 0.6,
                        beakTipX, beakTipY
                    );
                    gfx.lineStyle(1, 0xaa8833, 1);
                    gfx.strokeTriangle(
                        beakBaseX, beakBaseY - beakW,
                        beakBaseX, beakBaseY + beakW * 0.6,
                        beakTipX, beakTipY
                    );

                    // WING TIPS: extend from hands to show wingspan, with layered feathers
                    const wingTipLength = 18 * scale;
                    const wingAlpha = 0.7;

                    // Helper: draw one feathered wing segment from joint to tip
                    const drawFeatheredWing = (jx, jy, angle, tipLen, baseAlpha, numBarbs) => {
                        const tipX = jx + Math.cos(angle) * tipLen;
                        const tipY = jy + Math.sin(angle) * tipLen;

                        // Primary shaft — main wing edge line
                        gfx.lineStyle(2, col, baseAlpha);
                        gfx.lineBetween(jx, jy, tipX, tipY);

                        // Barb lines — angled lines branching off the shaft toward the trailing edge
                        // They fan slightly backward relative to flight direction
                        const barbCount = numBarbs;
                        const trailingAngle = angle + Math.PI * 0.55 * facing; // barbs sweep backward
                        for (let b = 0; b < barbCount; b++) {
                            const t = (b + 1) / (barbCount + 1);
                            // Each barb root sits along the primary shaft
                            const bRootX = jx + Math.cos(angle) * tipLen * t;
                            const bRootY = jy + Math.sin(angle) * tipLen * t;
                            // Barb length tapers: longer near base, shorter at tip
                            const barbLen = (1 - t * 0.55) * 7 * scale;
                            const barbTipX = bRootX + Math.cos(trailingAngle) * barbLen;
                            const barbTipY = bRootY + Math.sin(trailingAngle) * barbLen;
                            gfx.lineStyle(0.8 + (1 - t) * 0.6, col, baseAlpha * (0.5 + (1-t) * 0.35));
                            gfx.lineBetween(bRootX, bRootY, barbTipX, barbTipY);

                            // Second offset barb layer — slightly behind the first, gives depth/fluffiness
                            const barbLen2 = barbLen * 0.65;
                            const offsetAngle = trailingAngle + 0.25 * facing;
                            const bRootX2 = bRootX + Math.cos(angle) * 2 * scale; // shift root slightly along shaft
                            const bRootY2 = bRootY + Math.sin(angle) * 2 * scale;
                            const barbTipX2 = bRootX2 + Math.cos(offsetAngle) * barbLen2;
                            const barbTipY2 = bRootY2 + Math.sin(offsetAngle) * barbLen2;
                            gfx.lineStyle(0.5, col, baseAlpha * 0.28);
                            gfx.lineBetween(bRootX2, bRootY2, barbTipX2, barbTipY2);
                        }

                        // Trailing edge fill — thin line connecting barb tips for a solid wing membrane look
                        const firstBarbT = 1 / (barbCount + 1);
                        const lastBarbT  = barbCount / (barbCount + 1);
                        const firstRootX = jx + Math.cos(angle) * tipLen * firstBarbT;
                        const firstRootY = jy + Math.sin(angle) * tipLen * firstBarbT;
                        const lastRootX  = jx + Math.cos(angle) * tipLen * lastBarbT;
                        const lastRootY  = jy + Math.sin(angle) * tipLen * lastBarbT;
                        const firstBarbTipX = firstRootX + Math.cos(trailingAngle) * (1 - firstBarbT * 0.55) * 7 * scale;
                        const firstBarbTipY = firstRootY + Math.sin(trailingAngle) * (1 - firstBarbT * 0.55) * 7 * scale;
                        const lastBarbTipX  = lastRootX  + Math.cos(trailingAngle) * (1 - lastBarbT  * 0.55) * 7 * scale;
                        const lastBarbTipY  = lastRootY  + Math.sin(trailingAngle) * (1 - lastBarbT  * 0.55) * 7 * scale;
                        gfx.lineStyle(0.8, col, baseAlpha * 0.35);
                        gfx.lineBetween(firstBarbTipX, firstBarbTipY, lastBarbTipX, lastBarbTipY);
                        // Tip feather — small split at wing tip like a real raptor's primary feathers
                        gfx.lineStyle(1, col, baseAlpha * 0.5);
                        gfx.lineBetween(tipX, tipY, tipX + Math.cos(trailingAngle) * 4 * scale, tipY + Math.sin(trailingAngle) * 4 * scale);
                        gfx.lineBetween(tipX, tipY, tipX + Math.cos(trailingAngle - 0.35) * 5 * scale, tipY + Math.sin(trailingAngle - 0.35) * 5 * scale);
                    };

                    // Front wing
                    const wingFAngle = L.armFrontUpper * facing + Math.PI / 2;
                    drawFeatheredWing(handF.x, handF.y, wingFAngle, wingTipLength, wingAlpha, 4);
                    // Secondary covert — line from elbow to beyond tip (secondary wing feathers)
                    gfx.lineStyle(1, col, wingAlpha * 0.45);
                    gfx.lineBetween(elbowF.x, elbowF.y,
                        handF.x + Math.cos(wingFAngle) * wingTipLength * 1.15,
                        handF.y + Math.sin(wingFAngle) * wingTipLength * 1.15);

                    // Back wing (dimmer — further from camera)
                    const wingBAngle = L.armBackUpper * facing + Math.PI / 2;
                    drawFeatheredWing(handB.x, handB.y, wingBAngle, wingTipLength * 0.9, wingAlpha * 0.6, 3);

                    // TALONS on feet — small claws
                    [{ foot: footF, alpha: 1 }, { foot: footB, alpha: 0.55 }].forEach(({ foot, alpha }) => {
                        const talonLen = 5 * scale;
                        gfx.lineStyle(2, 0xddaa44, alpha);
                        // Three talons spread forward
                        for (let ti = -1; ti <= 1; ti++) {
                            const tAngle = Math.PI / 2 + ti * 0.4 + facing * 0.1;
                            gfx.lineBetween(
                                foot.x, foot.y,
                                foot.x + Math.cos(tAngle) * talonLen * facing,
                                foot.y + Math.sin(tAngle) * talonLen * 0.6 + talonLen * 0.6
                            );
                        }
                    });

                    // Death Spiral / Dive Bomb — motion trail
                    const ospreyAtkName = f.currentAttack?.name || '';
                    const isDiving = f.state === S.ATTACK &&
                        (ospreyAtkName === 'Death Spiral' || ospreyAtkName === 'Dive Bomb' || ospreyAtkName === 'Talon Spike');
                    if (isDiving) {
                        const inActive = f.attackFrame > (f.currentAttack?.startup || 0) &&
                            f.attackFrame <= (f.currentAttack?.startup || 0) + (f.currentAttack?.active || 0);
                        if (inActive) {
                            gfx.lineStyle(2, col, 0.4);
                            gfx.lineBetween(cx, cy - 10, cx, cy - 28);
                            gfx.lineBetween(cx - 5, cy - 6, cx - 14, cy - 20);
                            gfx.lineBetween(cx + 5, cy - 6, cx + 14, cy - 20);
                        }
                    }

                    // Thermal — rising air ring effect
                    if (f.state === S.ATTACK && ospreyAtkName === 'Thermal') {
                        const inActive = f.attackFrame > (f.currentAttack?.startup || 0) &&
                            f.attackFrame <= (f.currentAttack?.startup || 0) + (f.currentAttack?.active || 0);
                        if (inActive) {
                            const thermPct = (f.attackFrame - (f.currentAttack?.startup || 0)) / (f.currentAttack?.active || 1);
                            gfx.lineStyle(2, 0x88eeff, 0.6 - thermPct * 0.5);
                            gfx.strokeCircle(cx, cy + 10, 20 + thermPct * 35);
                            gfx.lineStyle(1, 0xaaffdd, 0.3);
                            gfx.strokeCircle(cx, cy + 10, 30 + thermPct * 50);
                        }
                    }
                }

                // -- INVINCIBILITY SHIMMER (spawn protection) --
                if (f.invincible > 0) {
                    const invPulse = Math.sin(f.stateTimer * 0.4) * 0.5 + 0.5; // 0–1 pulse
                    const invAlpha = (f.invincible / 120) * (0.5 + invPulse * 0.5);
                    const starR = (H / 2 + 8) * scale * 0.75; // Ring radius around figure
                    const starPoints = 8;
                    // Rotating halo of stars/sparkles
                    const rotOffset = f.stateTimer * 0.06;
                    for (let si = 0; si < starPoints; si++) {
                        const angle = (si / starPoints) * Math.PI * 2 + rotOffset;
                        const sx = cx + Math.cos(angle) * starR;
                        const sy = cy + Math.sin(angle) * starR * 0.7; // Elliptical
                        const sparkSize = 2 + invPulse * 2;
                        gfx.fillStyle(0xffffff, invAlpha * 0.9);
                        gfx.fillCircle(sx, sy, sparkSize);
                        // Inner colored spark
                        gfx.fillStyle(col, invAlpha);
                        gfx.fillCircle(sx, sy, sparkSize * 0.6);
                    }
                    // Glowing outline around torso
                    gfx.lineStyle(1.5, 0xffffff, invAlpha * 0.4);
                    gfx.strokeCircle(cx, headY, headR + 2);
                    gfx.lineStyle(1, col, invAlpha * 0.3);
                    gfx.strokeRect(cx - W * 0.35, headY + headR, W * 0.7, torsoLen * 0.9);
                }
            });
        }

        createHUD() {
            const ts = (c) => ({ fontFamily: 'Orbitron, sans-serif', fontSize: '42px', fontStyle: 'bold', color: c });
            const ss = (c) => ({ fontFamily: 'Share Tech Mono, monospace', fontSize: '18px', color: c });
            const xs = (c) => ({ fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: c });

            this.p1DmgTxt = this.add.text(180, 560, '0%', ts('#3399ff')).setOrigin(0.5).setDepth(20);
            this.p1StockTxt = this.add.text(180, 595, '●●●', ss('#3399ff')).setOrigin(0.5).setDepth(20);
            this.p1Label = this.add.text(180, 535, `${PROFILES.p1Name} · ${CHARACTERS[this.p1Char].name}`, {
                fontFamily: 'Orbitron, sans-serif', fontSize: '12px', fontStyle: 'bold', color: '#3388cc', letterSpacing: 2,
            }).setOrigin(0.5).setDepth(20);
            this.p1State = this.add.text(180, 618, '', xs('#445')).setOrigin(0.5).setDepth(20);

            this.p2DmgTxt = this.add.text(844, 562, '0%', ts('#ff4444')).setOrigin(0.5).setDepth(20);
            this.p2StockTxt = this.add.text(844, 597, '●●●', ss('#ff4444')).setOrigin(0.5).setDepth(20);
            this.p2Label = this.add.text(844, 537, `${PROFILES.p2Name} · ${CHARACTERS[this.p2Char].name}`, {
                fontFamily: 'Orbitron, sans-serif', fontSize: '12px', fontStyle: 'bold', color: '#cc3333', letterSpacing: 2,
            }).setOrigin(0.5).setDepth(20);
            this.p2State = this.add.text(844, 618, '', xs('#445')).setOrigin(0.5).setDepth(20);

            // Handicap / CPU badge row — above the label
            const hcStr = (lv) => lv > 0 ? `Handicap Lv${lv} (${Math.round(PROFILES.handicapMult(lv) * 100)}%)` : '';
            this.add.text(180, 523, hcStr(PROFILES.p1Handicap), {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#3388cc',
            }).setOrigin(0.5).setDepth(20);
            if (!cpuEnabled) {
                this.add.text(844, 523, hcStr(PROFILES.p2Handicap), {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '8px', color: '#aa2222',
                }).setOrigin(0.5).setDepth(20);
            } else {
                const CPU_DIFF_LABELS = ['','NOVICE','BEGINNER','CASUAL','INTERMEDIATE','STANDARD','ADVANCED','EXPERT','MASTER','LEGENDARY'];
                this.add.text(844, 523, `🤖 LV${cpuDifficulty} ${CPU_DIFF_LABELS[cpuDifficulty]}`, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '11px', fontStyle: 'bold', color: '#ff6644',
                }).setOrigin(0.5).setDepth(20);
            }

            this.comboTxt = this.add.text(512, 80, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '28px', fontStyle: 'bold', color: '#ffcc00',
            }).setOrigin(0.5).setDepth(20).setAlpha(0);
            this.gameOverTxt = this.add.text(512, 250, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '36px', fontStyle: 'bold', color: '#ffffff',
            }).setOrigin(0.5).setDepth(25).setAlpha(0);

            // Score display — always visible if there's a score
            const hasScore = SCORE.p1 + SCORE.p2 > 0;
            this.scoreTxt = this.add.text(512, 560, hasScore ? `${PROFILES.p1Name}  ${SCORE.p1} — ${SCORE.p2}  ${PROFILES.p2Name}` : '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '18px', fontStyle: 'bold', color: '#778',
            }).setOrigin(0.5).setDepth(25).setAlpha(hasScore ? 0.6 : 0);

            this.gameEnded = false;
        }

        updateHUD() {
            const updateDmg = (txt, f, bc, hc) => {
                const pct = Math.min(f.damage / 200, 1);
                const c = Phaser.Display.Color.Interpolate.ColorWithColor(
                    Phaser.Display.Color.ValueToColor(bc), Phaser.Display.Color.ValueToColor(hc), 100, pct * 100);
                txt.setText(`${Math.floor(f.damage)}%`);
                txt.setColor(Phaser.Display.Color.RGBToString(c.r, c.g, c.b));
                txt.setScale(Math.min(1 + f.damage / 400, 1.6));
            };
            updateDmg(this.p1DmgTxt, this.p1, '#3399ff', '#ff3333');
            updateDmg(this.p2DmgTxt, this.p2, '#ff4444', '#ffcc33');

            const stockStr = (s) => '●'.repeat(Math.max(0, s)) + '○'.repeat(Math.max(0, 3 - s));
            this.p1StockTxt.setText(stockStr(this.p1.stocks));
            this.p2StockTxt.setText(stockStr(this.p2.stocks));

            if (this.debugMode) {
                const stStr = (f) => {
                    let s = `${f.state}`;
                    if (f.shielding) s += ` 🛡${Math.floor(f.shieldHP)}`;
                    if (f.state === S.LEDGE_HANG) s += ' ⛓';
                    s += ` | ${Math.floor(f.damage)}% | vx:${Math.floor(f.body.velocity.x)}`;
                    return s;
                };
                this.p1State.setText(stStr(this.p1)).setVisible(true);
                this.p2State.setText(stStr(this.p2)).setVisible(true);
            } else { this.p1State.setVisible(false); this.p2State.setVisible(false); }

            [this.p1, this.p2].forEach((f, i) => {
                if (f.comboCount > 1) {
                    this.comboTxt.setText(`${f.comboCount} HIT COMBO!`);
                    this.comboTxt.setAlpha(1);
                    this.comboTxt.setColor(i === 0 ? '#3399ff' : '#ff4444');
                    // Track max combo per match
                    if (i === 0 && f.comboCount > this._p1MaxCombo) this._p1MaxCombo = f.comboCount;
                    if (i === 1 && f.comboCount > this._p2MaxCombo) this._p2MaxCombo = f.comboCount;
                }
            });
            if (this.comboTxt.alpha > 0) this.comboTxt.alpha -= 0.008;

            if (this.p1.stocks <= 0 || this.p2.stocks <= 0) {
                if (!this.gameEnded) {
                    this.gameEnded = true;
                    this.time.timeScale = 1; // Restore immediately — no more slow-mo
                    // Freeze both fighters — stop all physics
                    [this.p1, this.p2].forEach(f => {
                        f.body.setVelocity(0, 0);
                        f.body.setGravityY(0);
                        f.body.setImmovable(true);
                    });
                    if (this.p1.stocks <= 0) SCORE.p2++; else SCORE.p1++;
                    // Record to profiles
                    const _p1Won = this.p1.stocks > 0;
                    if (_p1Won) {
                        PROFILES.recordWin(PROFILES.p1Name, this.p1Char, PROFILES.p2Name, this.p2Char);
                    } else {
                        PROFILES.recordWin(PROFILES.p2Name, this.p2Char, PROFILES.p1Name, this.p1Char);
                    }
                    const _playtime = (Date.now() - (this._matchStart || Date.now())) / 1000;
                    const _p1DamageTaken = this._p2DmgDealt || 0;
                    const _p2DamageTaken = this._p1DmgDealt || 0;
                    PROFILES.recordMatchStats(PROFILES.p1Name, {
                        combo: this._p1MaxCombo || 0, smashes: this._p1Smashes || 0,
                        damageDealt: this._p1DmgDealt || 0, damageTaken: _p1DamageTaken,
                        perfect: _p1Won && _p1DamageTaken === 0,
                        stage: this.levelKey, playtime: _playtime, won: _p1Won,
                    });
                    if (PROFILES.p2Name !== 'CPU') {
                        PROFILES.recordMatchStats(PROFILES.p2Name, {
                            combo: this._p2MaxCombo || 0, smashes: this._p2Smashes || 0,
                            damageDealt: this._p2DmgDealt || 0, damageTaken: _p2DamageTaken,
                            perfect: !_p1Won && _p2DamageTaken === 0,
                            stage: this.levelKey, playtime: _playtime, won: !_p1Won,
                        });
                    }
                    const winner = this.p1.stocks <= 0 ? `${PROFILES.p2Name} WINS!` : `${PROFILES.p1Name} WINS!`;
                    this.gameOverTxt.setText(winner);
                    this.gameOverTxt.setColor(this.p1.stocks <= 0 ? '#ff4444' : '#3399ff');
                    this.gameOverTxt.setAlpha(1);
                    this.scoreTxt.setText(`${PROFILES.p1Name}  ${SCORE.p1} — ${SCORE.p2}  ${PROFILES.p2Name}`);
                    this.scoreTxt.setAlpha(1);
                    // Use real-time setTimeout so slow-mo can't stretch the delay
                    this.gameOverTimer = setTimeout(() => {
                        this.cleanupProjectiles();
                        this.time.timeScale = 1;
                        this.scene.start('SelectScene');
                    }, 2000);
                }
            }
        }

        spawnParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const p = this.add.circle(x, y, Phaser.Math.Between(2, 5), color, 0.8).setDepth(15);
                this.particles.push({ obj: p, vx: Phaser.Math.Between(-100, 100), vy: Phaser.Math.Between(-150, -50), life: 30, maxLife: 30, gravity: 300 });
            }
        }
        spawnHitEffect(x, y, mag) {
            const count = Math.min(Math.floor(mag / 50) + 4, 20);
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const spd = Phaser.Math.Between(60, 280) * (mag / 300);
                const c = Phaser.Math.RND.pick([0xffffff, 0xffcc00, 0xff8800, 0xff4400]);
                const p = this.add.circle(x, y, Phaser.Math.Between(2, 7), c, 0.9).setDepth(15);
                this.particles.push({ obj: p, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: Phaser.Math.Between(15, 35), maxLife: 35, gravity: 100 });
            }
            const fl = this.add.circle(x, y, Math.min(mag / 10, 50), 0xffffff, 0.7).setDepth(16);
            this.tweens.add({ targets: fl, scaleX: 2.5, scaleY: 2.5, alpha: 0, duration: 200, onComplete: () => fl.destroy() });
        }
        spawnKOEffect(x, y, color) {
            for (let i = 0; i < 20; i++) {
                const a = (i/20)*Math.PI*2; const spd = Phaser.Math.Between(150, 400);
                const p = this.add.circle(x, y, Phaser.Math.Between(3, 8), color, 1).setDepth(15);
                this.particles.push({ obj: p, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 40, maxLife: 40, gravity: 200 });
            }
        }
        updateParticles() {
            const dt = 1/60;
            for (let i = this.particles.length - 1; i >= 0; i--) {
                const p = this.particles[i]; p.life--;
                p.vy += p.gravity * dt; p.obj.x += p.vx * dt; p.obj.y += p.vy * dt;
                p.obj.setAlpha(p.life / p.maxLife); p.obj.setScale(p.life / p.maxLife);
                if (p.life <= 0) { p.obj.destroy(); this.particles.splice(i, 1); }
            }
        }
        drawBackgroundGrid() {
            const g = this.add.graphics().setDepth(-1); g.lineStyle(1, 0x111122, 0.3);
            for (let x = 0; x < 1024; x += 64) g.lineBetween(x, 0, x, 640);
            for (let y = 0; y < 640; y += 64) g.lineBetween(0, y, 1024, y);
        }
        drawBlastZones() {
            const g = this.blastGfx; g.clear(); g.lineStyle(2, COLORS.blastZone, 0.4);
            const bz = BLAST_ZONES;
            for (let y = bz.top; y < bz.bottom; y += 20) {
                g.lineBetween(bz.left, y, bz.left, Math.min(y+10, bz.bottom));
                g.lineBetween(bz.right, y, bz.right, Math.min(y+10, bz.bottom));
            }
            for (let x = bz.left; x < bz.right; x += 20) {
                g.lineBetween(x, bz.top, Math.min(x+10, bz.right), bz.top);
                g.lineBetween(x, bz.bottom, Math.min(x+10, bz.right), bz.bottom);
            }
            g.setDepth(5);
        }
        resetMatch() {
            if (this.gameOverTimer) { clearTimeout(this.gameOverTimer); this.gameOverTimer = null; }
            this.p1.fullReset(); this.p2.fullReset();
            // Reapply stick mode body size if active
            if (this.stickMode) {
                const sw = FIGHTER_CONFIG.width * 0.7;
                const sh = FIGHTER_CONFIG.height * 0.8;
                [this.p1, this.p2].forEach(f => {
                    f.sprite.setVisible(false); f.faceIndicator.setVisible(false);
                    f.body.setSize(sw, sh);
                    f.body.setOffset((FIGHTER_CONFIG.width - sw) / 2, (FIGHTER_CONFIG.height - sh));
                });
            }
            this.gameOverTxt.setAlpha(0); this.comboTxt.setAlpha(0);
            this.gameEnded = false;
            const hasScore = SCORE.p1 + SCORE.p2 > 0;
            this.scoreTxt.setText(hasScore ? `${PROFILES.p1Name}  ${SCORE.p1} — ${SCORE.p2}  ${PROFILES.p2Name}` : '');
            this.scoreTxt.setAlpha(hasScore ? 0.6 : 0);
            this.particles.forEach(p => p.obj.destroy()); this.particles = [];
            this.cleanupProjectiles(); this.time.timeScale = 1;
        }
    }

    // ============================================================
    const config = {
        type: Phaser.AUTO, width: 1024, height: 640,
        parent: 'game-container', backgroundColor: '#0a0a14',
        physics: {
            default: 'arcade',
            arcade: {
                gravity: { y: 0 }, debug: true,
                debugShowBody: true, debugShowStaticBody: true, debugShowVelocity: true,
                debugBodyColor: 0x333366, debugStaticBodyColor: 0x333366, debugVelocityColor: 0x00ff88,
            }
        },
        scene: [TitleScene, ProfileScene, SelectScene, LevelScene, GameScene],
        pixelArt: false, antialias: true,
    };
    // Load profiles from persistent storage, then start Phaser
    initGame().then(() => {
        const game = new Phaser.Game(config);
    });
    </script>
</body>
</html>
