                // Animate the flying sword
                const drawFlyingSword = () => {
                    if (!flyingSword.scene || !flyingSword.active) return;
                    flyingSword.clear();
                    if (flyingSword._life <= 0) { flyingSword.destroy(); return; }
                    flyingSword._life -= 0.012;
                    flyingSword._angle += flyingSword._spin;
                    flyingSword._vy += 4;
                    flyingSword._x += flyingSword._vx * (1/60);
                    flyingSword._y += flyingSword._vy * (1/60);
                    const a = flyingSword._angle;
                    const len = 28 * scale;
                    flyingSword.lineStyle(3, 0xcccccc, flyingSword._life);
                    flyingSword.lineBetween(
                        flyingSword._x - Math.cos(a)*len, flyingSword._y - Math.sin(a)*len,
                        flyingSword._x + Math.cos(a)*len, flyingSword._y + Math.sin(a)*len
                    );
                    flyingSword.lineStyle(2, 0x997733, flyingSword._life);
                    const gp2 = a + Math.PI/2;
                    flyingSword.lineBetween(
                        flyingSword._x + Math.cos(gp2)*5, flyingSword._y + Math.sin(gp2)*5,
                        flyingSword._x - Math.cos(gp2)*5, flyingSword._y - Math.sin(gp2)*5
                    );
                    this.scene.time.delayedCall(16, drawFlyingSword);
                };
                this.scene.time.delayedCall(50, drawFlyingSword);
            }

            // WIZARD — hat flies off and tumbles
            if (charKey === 'wizard') {
                const hatBase = squashedHR_x * 1.2;
                const hatH    = squashedHR_y * 2.2;
                const hatY_s  = hd.y - squashedHR_y;
                gfx.fillStyle(0x4422aa, 0.9);
                gfx.fillTriangle(hd.x - hatBase, hatY_s, hd.x + hatBase, hatY_s,
                    hd.x + splatFacing * 4 * squashX, hatY_s - hatH);
                gfx.lineStyle(1.5, 0x6644cc, 1);
                gfx.strokeTriangle(hd.x - hatBase, hatY_s, hd.x + hatBase, hatY_s,
                    hd.x + splatFacing * 4 * squashX, hatY_s - hatH);
                gfx.lineStyle(2.5, 0x4422aa, 1);
                gfx.lineBetween(hd.x - hatBase*1.4, hatY_s, hd.x + hatBase*1.4, hatY_s);
                // Flying hat
                const flyingHat = this.scene.add.graphics().setDepth(36);
                flyingHat._x = hd.x; flyingHat._y = hd.y - squashedHR_y * 2;
                flyingHat._vx = (Math.random() - 0.5) * 180;
                flyingHat._vy = -Math.random() * 220 - 60;
                flyingHat._spin = (Math.random() - 0.5) * 0.35;
                flyingHat._angle = 0; flyingHat._life = 1.0;
                this.splatExtras.push(flyingHat);
                const drawFlyingHat = () => {
                    if (!flyingHat.scene || !flyingHat.active) return;
                    flyingHat.clear();
                    if (flyingHat._life <= 0) { flyingHat.destroy(); return; }
                    flyingHat._life -= 0.011;
                    flyingHat._angle += flyingHat._spin;
                    flyingHat._vy += 5;
                    flyingHat._x += flyingHat._vx * (1/60);
                    flyingHat._y += flyingHat._vy * (1/60);
                    const a = flyingHat._angle;
                    const hbr = headR * 1.1;
                    const hh2 = headR * 2.0;
                    const c = Math.cos(a), s2 = Math.sin(a);
                    flyingHat.fillStyle(0x4422aa, flyingHat._life);
                    flyingHat.fillTriangle(
                        flyingHat._x - hbr*c, flyingHat._y - hbr*s2,
                        flyingHat._x + hbr*c, flyingHat._y + hbr*s2,
                        flyingHat._x - hh2*s2, flyingHat._y + hh2*c
                    );
                    flyingHat.lineStyle(1.5, 0x6644cc, flyingHat._life * 0.9);
                    flyingHat.strokeTriangle(
                        flyingHat._x - hbr*c, flyingHat._y - hbr*s2,
                        flyingHat._x + hbr*c, flyingHat._y + hbr*s2,
                        flyingHat._x - hh2*s2, flyingHat._y + hh2*c
                    );
                    this.scene.time.delayedCall(16, drawFlyingHat);
                };
                this.scene.time.delayedCall(50, drawFlyingHat);
            }

            // COWBOY — hat flies off
            if (charKey === 'cowboy') {
                const brimW  = squashedHR_x * 2.0;
                const brimY2 = hd.y - squashedHR_y * 0.7;
                const crownH = squashedHR_y * 0.9;
                gfx.fillStyle(0x885522, 0.9);
                gfx.fillRect(hd.x - squashedHR_x*0.7, brimY2 - crownH, squashedHR_x*1.4, crownH);
                gfx.fillRect(hd.x - brimW, brimY2, brimW*2, 3*squashY);
                gfx.lineStyle(1, 0x664411, 1);
                gfx.strokeRect(hd.x - brimW, brimY2, brimW*2, 3*squashY);
                // Cowboy boots stay on
                [[ftF, 1.0], [ftB, 0.5]].forEach(([foot, alpha]) => {
                    gfx.fillStyle(0x663311, alpha);
                    gfx.fillRect(foot.x - 4*squashX, foot.y - 2*squashY, 8*squashX, 6*squashY);
                });
                // Flying hat
                const flyingCHat = this.scene.add.graphics().setDepth(36);
                flyingCHat._x = hd.x; flyingCHat._y = brimY2 - crownH;
                flyingCHat._vx = (Math.random() - 0.5) * 200;
                flyingCHat._vy = -Math.random() * 230 - 70;
                flyingCHat._spin = (Math.random() - 0.5) * 0.3;
                flyingCHat._angle = 0; flyingCHat._life = 1.0;
                this.splatExtras.push(flyingCHat);
                const drawFlyingCHat = () => {
                    if (!flyingCHat.scene || !flyingCHat.active) return;
                    flyingCHat.clear();
                    if (flyingCHat._life <= 0) { flyingCHat.destroy(); return; }
                    flyingCHat._life -= 0.011;
                    flyingCHat._angle += flyingCHat._spin;
                    flyingCHat._vy += 5;
                    flyingCHat._x += flyingCHat._vx * (1/60);
                    flyingCHat._y += flyingCHat._vy * (1/60);
                    const a = flyingCHat._angle;
                    const hw = headR * 0.75, hbr2 = headR * 1.95;
                    flyingCHat.fillStyle(0x885522, flyingCHat._life);
                    flyingCHat.fillRect(flyingCHat._x - hw*Math.cos(a) - hw*Math.sin(a),
                        flyingCHat._y - hw*Math.sin(a) + hw*Math.cos(a), hw*2, hw);
                    flyingCHat.fillRect(flyingCHat._x - hbr2*Math.cos(a) - 1.5*Math.sin(a),
                        flyingCHat._y - hbr2*Math.sin(a) + 1.5*Math.cos(a), hbr2*2, 3);
                    this.scene.time.delayedCall(16, drawFlyingCHat);
                };
                this.scene.time.delayedCall(50, drawFlyingCHat);
            }

            // SUPERGUY — cape still attached but limp, star emblem glows
            if (charKey === 'superguy') {
                const splatCapeCol = this.playerIndex === 0 ? 0xcc2222 : 0x2244cc;
                const capeLen = 24 * scale;
                const capeEndX = neck.x - splatFacing * capeLen * squashX;
                const capeEndY = neck.y + capeLen * 0.6 * squashY;
                gfx.fillStyle(splatCapeCol, 0.7);
                gfx.fillTriangle(shL.x, shL.y, neck.x, neck.y, capeEndX, capeEndY);
                gfx.lineStyle(3, splatCapeCol, 0.85);
                gfx.lineBetween(neck.x, neck.y, capeEndX, capeEndY);
            }

            // BRUTE — fist knuckles stay on hands
            if (charKey === 'brute') {
                const fistR2 = 5 * scale;
                gfx.fillStyle(0x333333, 0.9);
                gfx.fillEllipse(hnF.x, hnF.y, fistR2*2*squashX, fistR2*2*squashY);
                gfx.lineStyle(2, 0x666666, 1);
                gfx.strokeEllipse(hnF.x, hnF.y, fistR2*2*squashX, fistR2*2*squashY);
                gfx.fillStyle(0x333333, 0.6);
                gfx.fillEllipse(hnB.x, hnB.y, fistR2*1.6*squashX, fistR2*1.6*squashY);
            }

            // BOWMAN — bow stays in hand
            if (charKey === 'bowman') {
                const bowHH = 16 * scale * squashY;
                const bowBulge = 7 * scale * squashX * splatFacing;
                gfx.lineStyle(2.5, 0x885522, 1);
                for (let i = 0; i < 8; i++) {
                    const t0 = i/8, t1 = (i+1)/8;
                    const y0 = hnB.y - bowHH + bowHH*2*t0;
                    const y1 = hnB.y - bowHH + bowHH*2*t1;
                    const bx0 = hnB.x + Math.sin(t0*Math.PI)*bowBulge;
                    const bx1 = hnB.x + Math.sin(t1*Math.PI)*bowBulge;
                    gfx.lineBetween(bx0, y0, bx1, y1);
                }
                gfx.lineStyle(1.5, 0xffffff, 0.8);
                gfx.lineBetween(hnB.x, hnB.y - bowHH, hnB.x, hnB.y + bowHH);
            }

            // OSPREY — beak squashed on head, talons on feet
            if (charKey === 'osprey') {
                const beakLen2 = squashedHR_x * 1.1;
                const beakW2   = squashedHR_y * 0.35;
                const beakBX   = hd.x + splatFacing * squashedHR_x * 0.85;
                const beakTX   = hd.x + splatFacing * (squashedHR_x + beakLen2);
                gfx.fillStyle(0xddaa44, 1);
                gfx.fillTriangle(beakBX, hd.y - beakW2, beakBX, hd.y + beakW2*0.6, beakTX, hd.y);
                // Talons
                [[ftF, 1.0], [ftB, 0.55]].forEach(([foot, alpha]) => {
                    for (let ti = -1; ti <= 1; ti++) {
                        const tAngle = Math.PI/2 + ti*0.4 + splatFacing*0.1;
                        gfx.lineStyle(2, 0xddaa44, alpha);
                        gfx.lineBetween(foot.x, foot.y,
                            foot.x + Math.cos(tAngle)*5*scale*squashX*splatFacing,
                            foot.y + Math.sin(tAngle)*5*scale*squashY*0.6 + 5*scale*squashY*0.6);
                    }
                });
            }

            // ---- DIZZY STARS orbiting the head ----
            for (let i = 0; i < 6; i++) {
                const a = (i / 6) * Math.PI * 2;
                const orbitR = squashedHR_x * 2.8;
                const starObj = this.scene.add.star(
                    hd.x + Math.cos(a) * orbitR,
                    hd.y + Math.sin(a) * orbitR * 0.6,
                    5, 3, 8, 0xffcc00, 0.95
                ).setDepth(36);
                this.splatExtras.push(starObj);
                // Orbit animation — each star tweens in a circle around the head
                const orbitDuration = 1800 + i * 120;
                this.scene.tweens.add({
                    targets: starObj,
                    angle: 360,
                    duration: orbitDuration,
                    repeat: 2,
                    onUpdate: (tw) => {
                        const t = tw.progress * Math.PI * 2 + a;
                        starObj.setPosition(hd.x + Math.cos(t) * orbitR,
                                            hd.y + Math.sin(t) * orbitR * 0.6);
                    },
                    onComplete: () => {
                        this.scene.tweens.add({ targets: starObj, alpha: 0, duration: 300,
                            onComplete: () => starObj.destroy() });
                    },
                });
            }

            // Particle burst disabled — volumetric figure makes this redundant

            this.splatGfx = gfx;
        }

        cleanupSplat() {
            if (this.splatGfx) { this.splatGfx.destroy(); this.splatGfx = null; }
            if (this.splatExtras) {
                this.splatExtras.forEach(e => { if (e && e.active) e.destroy(); });
                this.splatExtras = null;
            }
        }

        handleMovement(cursors) {
            if (cursors.left.isDown) {
                this.body.setVelocityX(-this.groundSpeed); this.facing = -1;
                if (this.state === S.IDLE) this.setState(S.RUN);
            } else if (cursors.right.isDown) {
                this.body.setVelocityX(this.groundSpeed); this.facing = 1;
                if (this.state === S.IDLE) this.setState(S.RUN);
            }
        }
        handleAirMovement(cursors) {
            if (cursors.left.isDown) {
                this.body.velocity.x = Math.max(this.body.velocity.x - 15, -this.airSpeed); this.facing = -1;
            } else if (cursors.right.isDown) {
                this.body.velocity.x = Math.min(this.body.velocity.x + 15, this.airSpeed); this.facing = 1;
            } else { this.body.velocity.x *= FIGHTER_CONFIG.airFriction; }
        }
        handleJump(cursors) {
            if (this.inputBuffer.consume('jump')) { this.setState(S.JUMP_SQUAT); this.jumpsRemaining = Math.max(0, this.jumpsRemaining - 1); }
        }
        handleAirJump(cursors) {
            if (this.inputBuffer.consume('jump') && this.jumpsRemaining > 0) {
                this.body.setVelocityY(this.jumpForce * 0.88);
                this.jumpsRemaining--; this.fastFalling = false;
                this.scene.spawnParticles(this.sprite.x, this.sprite.y + 20, 0xffffff, 5);
            }
        }
        handleFastFall(cursors) {
            if (this.inputBuffer.consume('fastfall') && this.body.velocity.y > 50) {
                this.fastFalling = true;
                this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFastFallSpeed);
                this.body.setVelocityY(FIGHTER_CONFIG.fastFallSpeed);
            }
        }
        handleShieldInput(cursors) {
            if (cursors.down.isDown && this.isGrounded && this.shieldHP > 0 &&
                !cursors.left.isDown && !cursors.right.isDown) {
                this.setState(S.SHIELD);
            }
        }
        applyGroundFriction() {
            this.body.velocity.x *= FIGHTER_CONFIG.groundFriction;
            if (Math.abs(this.body.velocity.x) < 5) this.body.setVelocityX(0);
        }
        handleAttackInput(cursors) {
            const air = !this.isGrounded;
            if (this.inputBuffer.consume('move4')) {
                this.startAttack(air ? this.charData.airMove4 : this.charData.move4);
                return;
            }
            if (this.inputBuffer.consume('attack'))
                this.startAttack(air ? this.charData.airJab : this.charData.jab);
            else if (this.inputBuffer.consume('strong'))
                this.startAttack(air ? this.charData.airStrong : this.charData.strong);
            else if (this.inputBuffer.consume('move3'))
                this.startAttack(air ? this.charData.airMove3 : this.charData.move3);
        }
        startAttack(atk) {
            if (atk.flyUp && this.hasUsedFly) return;
            if (atk.projectile) {
                const myProjs = this.scene.projectiles.filter(p => p.alive && p.ownerIndex === this.playerIndex);
                if (myProjs.length >= atk.projMaxCount) return;
            }
            if (atk.flyUp) this.hasUsedFly = true;
            // Osprey: air attacks trigger a dive bomb after completion
            if (this.charKey === 'osprey' && !this.isGrounded && !atk.divePunishOnMiss && !atk.flyUp && !atk.slamDown) {
                this._ospreyQueueDive = true;
            } else {
                this._ospreyQueueDive = false;
            }
            this.currentAttack = atk; this.attackFrame = 0;
            this.hasHitThisAttack = false; this.hitboxActive = false;
            this.setState(S.ATTACK);
        }
        updateAttack(cursors) {
            if (!this.currentAttack) { this.hitboxActive = false; this.setState(this.isGrounded ? S.IDLE : S.AIRBORNE); return; }
            const atk = this.currentAttack;
            const total = atk.startup + atk.active + atk.recovery;
            this.attackFrame++;

            if (atk.projectile) {
                if (this.attackFrame === atk.startup + 1) {
                    const count = atk.multiShot || 1;
                    const spread = atk.multiSpread || 0;
                    for (let i = 0; i < count; i++) {
                        let angle = atk.projAngle || 0;
                        if (count > 1) angle += -spread + (spread * 2 * i / (count - 1));
                        let spX, spY;
                        if (atk.projSpawnAbove) {
                            spX = this.sprite.x;
                            spY = this.sprite.y - 250;
                            // Arrow Rain: spread projectiles horizontally
                            if (atk.projRainSpread && count > 1) {
                                spX += -atk.projRainSpread + (atk.projRainSpread * 2 * i / (count - 1));
                            }
                        }
                        else { 
                            // For bowman, spawn from the bow tip (front hand position offset forward)
                            if (this.charKey === 'bowman') {
                                // Spawn from where the back hand (bow hand) is during draw pose
                                // Back shoulder at cx - shoulderW*facing, arm raised and extended forward
                                // Approximates handB position: behind center but pushed forward by arm angles
                                spX = this.sprite.x - (6 * this.facing); // Back shoulder offset, arm reaches forward
                                spY = this.sprite.y - 10; // Aligned with bow center
                            } else if (this.charKey === 'cowboy' && (atk.name === 'Peacemaker' || atk.name === 'Fan Shot' || atk.name === 'Dead Eye')) {
                                // Muzzle tip: back shoulder → back hand → gun barrel end
                                // Back shoulder is ~8px behind center, arm aimed forward at fire frame
                                // armBackUpper ≈ -0.6 at active → hand is forward and slightly up
                                const scale = 1.3;
                                const shoulderW = 6 * scale;
                                const upperArm = 10 * scale;
                                const lowerArm = 10 * scale;
                                const gunBodyLen = 9;
                                const barrelLen = 10;
                                const backShoulderX = this.sprite.x - shoulderW * this.facing;
                                const backShoulderY = this.sprite.y - 25; // approximate shoulder height
                                // Arm aimed forward: angle ≈ -0.6 upper + -0.1 lower
                                const armAngle = (-0.6 + -0.1) * this.facing + Math.PI / 2;
                                const elbowX = backShoulderX + Math.cos(armAngle) * upperArm;
                                const elbowY = backShoulderY + Math.sin(armAngle) * upperArm;
                                const handX = elbowX + Math.cos(armAngle) * lowerArm;
                                const handY = elbowY + Math.sin(armAngle) * lowerArm;
                                const gunDir = armAngle;
                                spX = handX + Math.cos(gunDir) * (gunBodyLen + barrelLen);
                                spY = handY + Math.sin(gunDir) * (gunBodyLen + barrelLen);
                            } else if (this.charKey === 'superguy' && (atk.name === 'Laser Vision' || atk.name === 'Heat Beam')) {
                                // Laser comes from eyes
                                spX = this.sprite.x + (22 * this.facing); // From eye level
                                spY = this.sprite.y - 38; // Eye Y
                            } else {
                                spX = this.sprite.x + (40 * this.facing); spY = this.sprite.y - 5;
                            }
                        }
                        const proj = new Projectile(this.scene, spX, spY, atk, this.playerIndex, this.facing, angle);
                        this.scene.projectiles.push(proj);
                    }
                    const sparkX = (this.charKey === 'superguy' && (atk.name === 'Laser Vision' || atk.name === 'Heat Beam'))
                        ? this.sprite.x + 22 * this.facing : this.sprite.x + 20 * this.facing;
                    const sparkY = (this.charKey === 'superguy' && (atk.name === 'Laser Vision' || atk.name === 'Heat Beam'))
                        ? this.sprite.y - 38 : this.sprite.y - 5;
                    this.scene.spawnParticles(sparkX, sparkY, 0xffcc00, 4);
                }
                this.hitboxActive = false;
                if (this.attackFrame > total) { this.currentAttack = null; this.setState(this.isGrounded ? S.IDLE : S.AIRBORNE); }
            } else {
                if (atk.teleport && this.attackFrame === atk.startup + 1) {
                    this.sprite.x += atk.teleport * this.facing;
                    this.body.x = this.sprite.x - FIGHTER_CONFIG.width / 2;
                    this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0xaa66ff, 8);
                }
                // Slam down: drive fighter downward during active frames
                if (atk.slamDown && this.attackFrame > atk.startup && this.attackFrame <= atk.startup + atk.active) {
                    this.body.setVelocityY(Math.max(this.body.velocity.y, 500));
                }
                // Fly up: launch fighter upward during active frames
                if (atk.flyUp && this.attackFrame > atk.startup && this.attackFrame <= atk.startup + atk.active) {
                    this.body.setVelocityY(-480);
                    this.scene.spawnParticles(this.sprite.x, this.sprite.y + 25, 0x66ccff, 1);
                }
                if (this.attackFrame <= atk.startup) {
                    this.hitboxActive = false;
                } else if (this.attackFrame <= atk.startup + atk.active) {
                    this.hitboxActive = true;
                    this.hitboxRect.x = this.sprite.x + (atk.hitboxOffsetX * this.facing);
                    this.hitboxRect.y = this.sprite.y + atk.hitboxOffsetY - 3;
                    this.hitboxRect.w = atk.hitboxWidth; this.hitboxRect.h = atk.hitboxHeight + 6;
                } else if (this.attackFrame <= total) {
                    this.hitboxActive = false;
                } else {
                    this.hitboxActive = false; this.currentAttack = null;
                    // Osprey: dive bomb at 45° forward after any air attack — with active hitbox
                    if (this._ospreyQueueDive && !this.isGrounded) {
                        this._ospreyQueueDive = false;
                        const diveSpeed = this.airSpeed * 1.3;
                        this.body.setVelocityX(this.facing * diveSpeed * Math.cos(Math.PI / 4));
                        this.body.setVelocityY(diveSpeed * Math.sin(Math.PI / 4));
                        this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0x88eeff, 6);
                        // Inject a synthetic dive attack so hitbox stays active during plunge
                        this.currentAttack = {
                            name: 'DivePlunge', damage: 9, startup: 0, active: 60, recovery: 4,
                            hitboxWidth: 38, hitboxHeight: 44, hitboxOffsetX: 18, hitboxOffsetY: 13,
                            knockbackAngle: -60, baseKnockback: 220, knockbackGrowth: 3.2, hitstun: 12,
                            _divePlunge: true,
                        };
                        this.attackFrame = 0;
                        this.hasHitThisAttack = false;
                        this.setState(S.ATTACK);
                        return;
                    }
                    this.setState(this.isGrounded ? S.IDLE : S.AIRBORNE);
                }
            }
        }

        // ---- TAKING DAMAGE ----
        applyKnockback(atkData, dir, attackerIndex) {
            // SSB-style handicap: attacker's level multiplies damage dealt
            const hcap = attackerIndex === 0 ? PROFILES.p1Handicap : PROFILES.p2Handicap;
            const hMult = PROFILES.handicapMult(hcap);
            const dmg = atkData.damage * hMult;
            this.damage += dmg;
            this.comboCount++;
            // ── DEBUG HIT LOG ──
            const defLabel  = this.playerIndex === 1 ? 'CPU' : 'P1';
            const atkLabel  = attackerIndex   === 0 ? 'P1'  : 'CPU';
            console.log(`[HIT] ${atkLabel} → ${defLabel} | move="${atkData.name||'?'}" dmg=${dmg.toFixed(1)} total=${this.damage.toFixed(1)}% | pos=(${Math.round(this.sprite.x)},${Math.round(this.sprite.y)})`);
            // Accumulate damage stats for post-match recording
            if (attackerIndex === 0 && this.scene._p1DmgDealt !== undefined) this.scene._p1DmgDealt += dmg;
            if (attackerIndex === 1 && this.scene._p2DmgDealt !== undefined) this.scene._p2DmgDealt += dmg;
            // Calculate KB using post-hit damage so rage scales consistently for all characters
            const kb = calcKnockback(atkData, this.damage);
            const angleRad = (atkData.knockbackAngle * Math.PI) / 180;
            const kvx = Math.cos(angleRad) * kb * dir;
            const kvy = -Math.sin(angleRad) * kb;

            // Check for SCREEN SPLAT — sliding KB threshold:
            // At 140% need 500 KB (only the biggest hits), at 250%+ need only 200 KB (even pokes)
            const splatKBNeeded = Math.max(200, FIGHTER_CONFIG.splatKBThreshold - (this.damage - FIGHTER_CONFIG.splatThreshold) * 1.5);
            if (this.damage >= FIGHTER_CONFIG.splatThreshold && kb >= splatKBNeeded) {
                this.splatVx = kvx; this.splatVy = kvy;
                this.splatOriginX = this.sprite.x; // Where the player was when hit
                this.splatOriginY = this.sprite.y;
                this.body.setVelocity(0, 0);
                this.setState(S.SCREEN_SPLAT);
                return;
            }

            this.body.setVelocity(kvx, kvy);
            this.body.setMaxVelocityY(2000);
            this.hitstunDuration = Math.floor(atkData.hitstun + (this.damage * 0.15));
            this.setState(kb > 400 ? S.LAUNCHED : S.HITSTUN);

            // ---- HIT STOP (defender side) ----
            // Save the just-set knockback velocity so it's restored after freeze
            if (this._pendingHitStop > 0) {
                this.hitStop = this._pendingHitStop;
                this._hitStopVx = kvx;
                this._hitStopVy = kvy;
                this._pendingHitStop = 0;
                // Immediately freeze body until hit stop expires
                this.body.setVelocity(0, 0);
                this.body.setGravityY(0);
            }

            // ---- CAMERA SHAKE (scaled to knockback) ----
            // Light hits: subtle nudge. Heavy hits: real rumble. KO-level: full screen shake.
            const shakeIntensity = kb < 200  ? 0.004 :   // jab / light poke
                                   kb < 350  ? 0.009 :   // medium hit
                                   kb < 550  ? 0.016 :   // strong hit
                                               0.026;    // kill-level blow
            const shakeDuration  = kb < 200  ? 60  :
                                   kb < 350  ? 90  :
                                   kb < 550  ? 130 :
                                               200;
            this.scene.cameras.main.shake(shakeDuration, shakeIntensity);

            this.scene.spawnHitEffect(this.sprite.x, this.sprite.y, kb);
            this.scene.time.delayedCall(300, () => {
                if (this.state !== S.LAUNCHED) this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed);
            });
        }

        onHit(atkData, attacker) {
            if (this.invincible > 0 || this.state === S.DEAD || this.state === S.SCREEN_SPLAT) return;
            if (this.state === S.SHIELD || this.state === S.SHIELDSTUN) {
                this.shieldHP -= atkData.damage * 1.5;
                this.setState(S.SHIELDSTUN);
                this.scene.spawnParticles(this.sprite.x, this.sprite.y, COLORS.shield, 4);
                return;
            }
            // Release from ledge if hit
            if (this.state === S.LEDGE_HANG) {
                this.releaseLedge();
            }
            const dir = attacker ? attacker.facing : 1;
            this.applyKnockback(atkData, dir, attacker ? attacker.playerIndex : (1 - this.playerIndex));
        }

        onProjectileHit(atkData, projVx, projOwnerIndex) {
            if (this.invincible > 0 || this.state === S.DEAD || this.state === S.SCREEN_SPLAT) return;
            if (this.state === S.LEDGE_HANG) {
                this.releaseLedge();
            }
            if (atkData.randomKnockback) {
                // Tornado: fling in a random angle, confusing the opponent
                const randAngle = Math.random() * 360;
                const fakeAtk = Object.assign({}, atkData, { knockbackAngle: randAngle });
                const dir = Math.random() < 0.5 ? 1 : -1;
                this.applyKnockback(fakeAtk, dir, projOwnerIndex !== undefined ? projOwnerIndex : (1 - this.playerIndex));
                return;
            }
            const dir = projVx >= 0 ? 1 : -1;
            this.applyKnockback(atkData, dir, projOwnerIndex !== undefined ? projOwnerIndex : (1 - this.playerIndex));
        }

        // Lasso pull: set target velocity toward the cowboy
        onLassoPull(attacker, atkData) {
            if (this.invincible > 0 || this.state === S.DEAD || this.state === S.SCREEN_SPLAT) return;
            if (this.state === S.SHIELD || this.state === S.SHIELDSTUN) return; // Shield blocks lasso
            if (this.state === S.LEDGE_HANG) {
                this.releaseLedge();
            }
            this.damage += atkData.damage * PROFILES.handicapMult(attacker.playerIndex === 0 ? PROFILES.p1Handicap : PROFILES.p2Handicap);
            this.comboCount++;
            // Store lasso pull target — will pull toward attacker and stop nearby
            this.lassoPullTarget = { x: attacker.sprite.x, y: attacker.sprite.y };
            this.lassoPullSpeed = atkData.pullSpeed || 500;
            this.hitstunDuration = atkData.hitstun;
            this.setState(S.HITSTUN);
            // Set initial velocity toward attacker
            const dx = attacker.sprite.x - this.sprite.x;
            const dy = attacker.sprite.y - this.sprite.y;
            const dist = Math.max(Math.sqrt(dx*dx + dy*dy), 1);
            this.body.setVelocity((dx / dist) * this.lassoPullSpeed, (dy / dist) * this.lassoPullSpeed - 60);
            this.body.setMaxVelocityY(2000);
            this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0xddaa44, 6);
        }

        onFreeze(atkData, attackerIndex) {
            if (this.invincible > 0 || this.state === S.DEAD || this.state === S.SCREEN_SPLAT) return;
            if (this.state === S.FROZEN) return; // Can't double-freeze
            if (this.state === S.SHIELD || this.state === S.SHIELDSTUN) {
                this.shieldHP -= atkData.damage * 1.5;
                this.scene.spawnParticles(this.sprite.x, this.sprite.y, COLORS.shield, 3);
                return;
            }
            if (this.state === S.LEDGE_HANG) this.releaseLedge();
            const aIdx = attackerIndex !== undefined ? attackerIndex : (1 - this.playerIndex);
            this.damage += atkData.damage * PROFILES.handicapMult(aIdx === 0 ? PROFILES.p1Handicap : PROFILES.p2Handicap);
            this.body.setVelocity(0, 0);
            this.freezeDuration = atkData.freezeDuration || 60;
            // Freeze duration scales down with button mashing (handled in state)
            this.freezeMashCount = 0;
            this.setState(S.FROZEN);
            this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0x88ddff, 8);
            this.scene.cameras.main.shake(80, 0.01);
        }

        onKO() {
            this.cleanupSplat();
            this.stocks--;
            console.log(`[KO] ${this.playerIndex === 1 ? 'CPU' : 'P1'} KO'd | stocks left=${this.stocks} | pos=(${Math.round(this.sprite.x)},${Math.round(this.sprite.y)}) | dmg=${this.damage.toFixed(1)}%`);
            // Track smash for the player who scored the KO
            if (this.scene._p1Smashes !== undefined) {
                if (this.playerIndex === 1) this.scene._p1Smashes++;  // p1 KO'd p2
                else this.scene._p2Smashes++;
            }
            this.setState(S.DEAD);
            this.sprite.setVisible(false); this.faceIndicator.setVisible(false);
            this.shieldGfx.setVisible(false); this.hitboxActive = false;
            this.body.setVelocity(0, 0);
            this.body.enable = false; // Hide from physics debug renderer
            // KO: big flash + sustained rumble (two-stage shake for extra impact)
            this.scene.cameras.main.flash(300, 255, 255, 255, false);
            this.scene.cameras.main.shake(180, 0.035);
            this.scene.time.delayedCall(220, () => {
                this.scene.cameras.main.shake(280, 0.018);
            });
            this.scene.spawnKOEffect(this.sprite.x, this.sprite.y, this.color);
        }
        respawn() {
            this.body.enable = true;
            this.sprite.setPosition(this.spawnX, 100);
            this.body.setVelocity(0, 0); this.body.setGravityY(FIGHTER_CONFIG.gravity);
            this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed);
            this.damage = 0; this.jumpsRemaining = FIGHTER_CONFIG.maxJumps;
            this.fastFalling = false; this.invincible = 120; this.comboCount = 0;
            this.shieldHP = FIGHTER_CONFIG.shieldMaxHP; this.currentLedge = null;
            this.lassoPullTarget = null;
            this.hasUsedFly = false;
            this.airdodgeCooldown = 0;
            this.hitStop = 0; this._pendingHitStop = 0;
            this.dropThrough = false; this.dropThroughTimer = 0;
            this.spawnProtected = true;
            this.sprite.setVisible(true); this.faceIndicator.setVisible(true);
            this.setState(S.AIRBORNE);
        }
        fullReset() {
            this.cleanupSplat();
            this.body.enable = true;
            this.stocks = 3; this.damage = 0; this.comboCount = 0;
            this.sprite.setPosition(this.spawnX, this.spawnY);
            this.body.setVelocity(0, 0); this.body.setGravityY(FIGHTER_CONFIG.gravity);
            this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed);
            this.jumpsRemaining = FIGHTER_CONFIG.maxJumps;
            this.fastFalling = false; this.invincible = 60; this.hitboxActive = false;
            this.shieldHP = FIGHTER_CONFIG.shieldMaxHP; this.currentLedge = null;
            this.lassoPullTarget = null;
            this.hasUsedFly = false;
            this.airdodgeCooldown = 0;
            this.hitStop = 0; this._pendingHitStop = 0;
            this.dropThrough = false; this.dropThroughTimer = 0;
            this.spawnProtected = true;
            this.shieldGfx.setVisible(false);
            this.sprite.setVisible(true); this.faceIndicator.setVisible(true);
            this.setState(S.IDLE);
        }
    }

    // ============================================================
    // GAME SCENE
    // ============================================================
    // ============================================================
    // LEVEL SELECT SCENE
    // ============================================================
    class LevelScene extends Phaser.Scene {
        constructor() { super({ key: 'LevelScene' }); }
        init(data) {
            this.p1Char = data.p1Char;
            this.p2Char = data.p2Char;
            this.sel = LEVEL_KEYS.indexOf(selectedLevel);
            if (this.sel < 0) this.sel = 0;
        }

        create() {
            this.cameras.main.setBackgroundColor(0x0a0a14);
            createMenuBG(this);

            // Header
            this.add.text(512, 32, 'SELECT STAGE', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '22px', fontStyle: 'bold',
                color: '#ffffff', letterSpacing: 8,
            }).setOrigin(0.5);
            this.add.text(512, 56, '← → to browse  ·  ENTER to fight  ·  ESC to go back', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '9px', color: '#334',
            }).setOrigin(0.5);

            // 2 rows × 3 cols
            const cols = 3, rows = 2;
            const cardW = 296, cardH = 240;
            const colGap = 16, rowGap = 16;
            const gridW = cols * cardW + (cols - 1) * colGap;
            const gridH = rows * cardH + (rows - 1) * rowGap;
            const gridX0 = 512 - gridW / 2 + cardW / 2;
            const gridY0 = 80 + cardH / 2;

            this.cards = [];
            LEVEL_KEYS.forEach((key, i) => {
                const lv = LEVELS[key];
                const col = i % cols, row = Math.floor(i / cols);
                const cx = gridX0 + col * (cardW + colGap);
                const cy = gridY0 + row * (cardH + rowGap);

                const cardBg = this.add.rectangle(cx, cy, cardW, cardH, 0x0d0d20).setDepth(1);
                cardBg.setStrokeStyle(1.5, 0x1a1a40);

                // Thumbnail — top portion of card
                const thumbH = cardH * 0.58;
                const thumbGfx = this.add.graphics().setDepth(2);
                this.drawThumbnail(thumbGfx, key, cx, cy - cardH/2, cardW - 4, thumbH);

                // Level name
                const nameTxt = this.add.text(cx, cy - cardH/2 + thumbH + 14, lv.name, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '14px', fontStyle: 'bold', color: '#bbccdd',
                }).setOrigin(0.5).setDepth(2);

                // Subtitle
                const subTxt = this.add.text(cx, cy - cardH/2 + thumbH + 30, lv.subtitle, {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#667',
                }).setOrigin(0.5).setDepth(2);

                // Index number
                this.add.text(cx - cardW/2 + 8, cy - cardH/2 + 8, `${i + 1}`, {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#556',
                }).setOrigin(0, 0).setDepth(2);

                this.cards.push({ key, cardBg, nameTxt, subTxt, thumbGfx, cx, cy });
            });

            // Bottom bar
            this.selLabel = this.add.text(512, 590, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '16px', fontStyle: 'bold', color: '#ffcc00',
            }).setOrigin(0.5).setDepth(3);
            this.selSub = this.add.text(512, 610, '', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#667',
            }).setOrigin(0.5).setDepth(3);
            this.confirmTxt = this.add.text(512, 630, 'PRESS ENTER TO FIGHT', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '13px', fontStyle: 'bold', color: '#ffcc00',
            }).setOrigin(0.5).setDepth(3);

            this.leftKey  = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT);
            this.rightKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT);
            this.upKey    = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
            this.downKey  = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN);
            this.aKey     = this.input.keyboard.addKey('A');
            this.dKey     = this.input.keyboard.addKey('D');
            this.wKey     = this.input.keyboard.addKey('W');
            this.sKey     = this.input.keyboard.addKey('S');
            this.enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
            this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC).on('down', () => {
                this.scene.start('SelectScene');
            });
            // Number keys 1–6
            for (let n = 1; n <= 6; n++) {
                this.input.keyboard.addKey(`${n}`).on('down', () => {
                    if (n - 1 < LEVEL_KEYS.length) { this.sel = n - 1; this.updateSelection(); }
                });
            }

            // Glint + active border glow layer
            this.glintGfx = this.add.graphics().setDepth(5);
            this._glintT = -1;
            this._glintCooldown = 180;

            this.updateSelection();
        }

        drawThumbnail(g, levelKey, cx, topY, tw, th) {
            const lv = LEVELS[levelKey];
            const stageL = 80, stageR = 944, stageT = 150, stageB = 545;
            const sw = stageR - stageL, sh = stageB - stageT;
            const scaleX = tw / sw, scaleY = th / sh;
            const offX = cx - tw / 2, offY = topY + 2;

            const mapX = (rx) => offX + (rx - stageL) * scaleX;
            const mapY = (ry) => offY + (ry - stageT) * scaleY;

            // BG
            g.fillStyle(0x05050e, 1);
            g.fillRect(offX, offY, tw, th);

            // Subtle scanlines for retro feel
            g.lineStyle(0.5, 0x0a0a1a, 0.6);
            for (let sy = offY; sy < offY + th; sy += 5) {
                g.lineBetween(offX, sy, offX + tw, sy);
            }

            // Draw platforms — thumbnail-scale version of the game texture
            // isSolid: true=main/split (blue), false=floating (teal), matches game colours
            const drawThumbPlatform = (p, isSolid) => {
                const px = mapX(p.x - p.width/2), py = mapY(p.y - p.height/2);
                const pw = p.width * scaleX;
                // Ensure minimum visible height; floating platforms get a bit extra so
                // their top edge reads clearly at small scale
                const ph = Math.max(p.height * scaleY, isSolid ? 5 : 4);
                const pcx = px + pw / 2;

                const baseCol  = isSolid ? 0x12121f : 0x0f1a22;
                const midCol   = isSolid ? 0x1c1c30 : 0x132030;
                const topEdge  = isSolid ? 0x5c6aaa : 0x3a8fa8;
                const glowCol  = isSolid ? 0x3355cc : 0x1a99bb;
                const rimCol   = isSolid ? 0x7a8fd0 : 0x55ccdd;

                // 1. Drop shadow
                g.fillStyle(0x000000, 0.5);
                g.fillRect(px + 2, py + ph + 1, pw - 2, 3);

                // 2. Dark body
                g.fillStyle(baseCol, 1);
                g.fillRect(px, py, pw, ph);

                // 3. Lighter upper half (gradient suggestion)
                g.fillStyle(midCol, 0.9);
                g.fillRect(px, py, pw, Math.ceil(ph * 0.55));

                // 4. Circuit trace — one centre line if tall enough
                if (ph >= 8) {
                    g.lineStyle(0.5, glowCol, 0.2);
                    g.lineBetween(px + 4, py + ph * 0.55, px + pw - 4, py + ph * 0.55);
                }

                // 5. Tick marks — every ~20px of platform width, max 8
                const tickStep = Math.max(16, pw / 8);
                const tickCount = Math.floor(pw / tickStep) - 1;
                for (let ti = 1; ti <= tickCount; ti++) {
                    const tx = px + ti * tickStep;
                    g.lineStyle(0.5, rimCol, 0.25);
                    g.lineBetween(tx, py + 1, tx, py + Math.min(3, ph - 1));
                }

                // 6. Underside glow strip
                g.fillStyle(glowCol, 0.25);
                g.fillRect(px + 1, py + ph - 2, pw - 2, 2);

                // 7. Top surface — base glow + bright edge + centre hotspot
                g.lineStyle(2.5, glowCol, 0.2);
                g.lineBetween(px, py, px + pw, py);
                g.lineStyle(1.5, topEdge, 1);
                g.lineBetween(px, py, px + pw, py);
                // Centre specular hotspot (60% of width)
                const hlW = pw * 0.55;
                g.lineStyle(1, rimCol, 0.8);
                g.lineBetween(pcx - hlW/2, py, pcx + hlW/2, py);
                // Tiny centre bright pixel
                g.fillStyle(0xffffff, 0.6);
                g.fillRect(pcx - 2, py, 4, 1);

                // 8. Corner accents — only if wide enough
                if (pw >= 14) {
                    const cl = Math.min(5, ph - 1);
                    g.lineStyle(1, rimCol, 0.6);
                    g.lineBetween(px,      py, px + cl,     py + cl);
                    g.lineBetween(px + pw, py, px + pw - cl, py + cl);
                    g.lineStyle(0.5, glowCol, 0.3);
                    g.lineBetween(px,      py + ph, px + cl,     py + ph - cl);
                    g.lineBetween(px + pw, py + ph, px + pw - cl, py + ph - cl);
                }

                // 9. Outer stroke
                g.lineStyle(0.5, glowCol, 0.45);
                g.strokeRect(px, py, pw, ph);
            };

            if (lv.mainPlatform) drawThumbPlatform(lv.mainPlatform, true);
            if (lv.splitPlatforms) lv.splitPlatforms.forEach(p => drawThumbPlatform(p, true));
            if (lv.floatingPlatforms) lv.floatingPlatforms.forEach(p => drawThumbPlatform(p, false));

            // Spawn markers — render at exact spawn position (players drop in from there)
            // Find the nearest platform surface below each spawn so we can draw
            // a small drop-line from spawn to landing, reinforcing the intent.
            const allPlats = [
                ...(lv.mainPlatform ? [lv.mainPlatform] : []),
                ...(lv.splitPlatforms || []),
                ...(lv.floatingPlatforms || []),
            ];
            const nearestFloorBelow = (spawnX, spawnY) => {
                // Find the highest platform top that is at or below the spawn Y
                let best = null;
                for (const p of allPlats) {
                    const top = p.y - p.height / 2;
                    if (top >= spawnY) {
                        const left = p.x - p.width / 2 - 16, right = p.x + p.width / 2 + 16;
                        if (spawnX >= left && spawnX <= right) {
                            if (best === null || top < best) best = top;
                        }
                    }
                }
                return best !== null ? mapY(best) : null;
            };

            [
                [lv.p1SpawnX, lv.p1SpawnY, 0x3399ff],
                [lv.p2SpawnX, lv.p2SpawnY, 0xff4444],
            ].forEach(([sx, sy, col]) => {
                const fx = mapX(sx);
                const fy = mapY(sy);          // actual spawn Y in thumbnail space
                const floorY = nearestFloorBelow(sx, sy);
                const hr = 3, ts = 8;         // head radius, torso size

                // Dashed drop-line from spawn to platform (shows intent)
                if (floorY !== null && floorY > fy + ts + hr + 2) {
                    g.lineStyle(0.5, col, 0.3);
                    const dashLen = 3, gapLen = 3;
                    for (let dy = fy + ts + hr + 2; dy < floorY; dy += dashLen + gapLen) {
                        g.lineBetween(fx, dy, fx, Math.min(dy + dashLen, floorY));
                    }
                }

                // Stick figure at spawn position
                g.fillStyle(col, 0.95);
                g.fillCircle(fx, fy - hr, hr);          // head
                g.lineStyle(1.5, col, 0.85);
                g.lineBetween(fx, fy, fx, fy + ts);     // torso
                g.lineBetween(fx - 3, fy + 2, fx + 3, fy + 2); // arms
                // Legs
                g.lineBetween(fx, fy + ts, fx - 3, fy + ts + 4);
                g.lineBetween(fx, fy + ts, fx + 3, fy + ts + 4);
            });

            // Thumbnail border glow
            g.lineStyle(1, 0x223366, 1);
            g.strokeRect(offX, offY, tw, th);
        }

        updateSelection() {
            const lv = LEVELS[LEVEL_KEYS[this.sel]];
            this.selLabel.setText(lv.name);
            this.selSub.setText(lv.subtitle);

            this.cards.forEach((card, i) => {
                const sel = i === this.sel;
                card.cardBg.setStrokeStyle(sel ? 2 : 1, sel ? 0xffcc00 : 0x1a1a40);
                card.cardBg.setFillStyle(sel ? 0x151528 : 0x0d0d20);
                card.nameTxt.setColor(sel ? '#ffcc00' : '#aabbcc');
                card.subTxt.setColor(sel ? '#998844' : '#334455');
            });
        }

        update() {
            updateMenuBG(this);
            const cols = 3;
            if (Phaser.Input.Keyboard.JustDown(this.leftKey) || Phaser.Input.Keyboard.JustDown(this.aKey)) {
                this.sel = (this.sel - 1 + LEVEL_KEYS.length) % LEVEL_KEYS.length;
                this.updateSelection();
            }
            if (Phaser.Input.Keyboard.JustDown(this.rightKey) || Phaser.Input.Keyboard.JustDown(this.dKey)) {
                this.sel = (this.sel + 1) % LEVEL_KEYS.length;
                this.updateSelection();
            }
            if (Phaser.Input.Keyboard.JustDown(this.upKey) || Phaser.Input.Keyboard.JustDown(this.wKey)) {
                this.sel = (this.sel - cols + LEVEL_KEYS.length) % LEVEL_KEYS.length;
                this.updateSelection();
            }
            if (Phaser.Input.Keyboard.JustDown(this.downKey) || Phaser.Input.Keyboard.JustDown(this.sKey)) {
                this.sel = (this.sel + cols) % LEVEL_KEYS.length;
                this.updateSelection();
            }

            this.confirmTxt.setAlpha(0.6 + Math.sin(this.time.now * 0.005) * 0.4);

            // Glint sweep across selected card — fires every 12–18 s
            this.glintGfx.clear();
            if (this._glintT < 0) {
                this._glintCooldown--;
                if (this._glintCooldown <= 0) {
                    this._glintT = 0;
                    this._glintCooldown = 720 + Math.floor(Math.random() * 360);
                }
            } else {
                this._glintT += 1 / 65;
                if (this._glintT >= 1) this._glintT = -1;
            }
            const selCard = this.cards[this.sel];
            if (selCard) {
                const bx = selCard.cx, by = selCard.cy;
                const bw = 296, bh = 240;
                if (this._glintT >= 0) {
                    const L = bx - bw/2, R = bx + bw/2;
                    const T = by - bh/2, B = by + bh/2;
                    const sw = 70, skew = bh * 0.38;
                    const cx = (L - sw/2) + this._glintT * (bw + sw);
                    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
                    const txL = clamp(cx - sw/2, L, R);
                    const txR = clamp(cx + sw/2, L, R);
                    const bxL = clamp(cx - sw/2 - skew, L, R);
                    const bxR = clamp(cx + sw/2 - skew, L, R);
                    if (txR > txL || bxR > bxL) {
                        this.glintGfx.fillStyle(0xffffff, 0.04);
                        this.glintGfx.fillTriangle(txL, T, txR, T, bxR, B);
                        this.glintGfx.fillTriangle(txL, T, bxR, B, bxL, B);
                        const leX1 = clamp(cx + sw/2, L, R);
                        const leX2 = clamp(cx + sw/2 - skew, L, R);
                        this.glintGfx.lineStyle(1, 0xffffff, 0.15);
                        this.glintGfx.lineBetween(leX1, T, leX2, B);
                    }
                }
                // Animated corner accents on selected card — energy corners that pulse
                const pulse = 0.4 + Math.sin(this.time.now * 0.006) * 0.35;
                const cLen = 18;
                this.glintGfx.lineStyle(2, 0xffcc00, pulse * 0.9);
                const x0 = bx - bw/2, y0 = by - bh/2, x1 = bx + bw/2, y1 = by + bh/2;
                // TL
                this.glintGfx.lineBetween(x0, y0, x0 + cLen, y0);
                this.glintGfx.lineBetween(x0, y0, x0, y0 + cLen);
                // TR
                this.glintGfx.lineBetween(x1, y0, x1 - cLen, y0);
                this.glintGfx.lineBetween(x1, y0, x1, y0 + cLen);
                // BL
                this.glintGfx.lineBetween(x0, y1, x0 + cLen, y1);
                this.glintGfx.lineBetween(x0, y1, x0, y1 - cLen);
                // BR
                this.glintGfx.lineBetween(x1, y1, x1 - cLen, y1);
                this.glintGfx.lineBetween(x1, y1, x1, y1 - cLen);
            }

            if (Phaser.Input.Keyboard.JustDown(this.enterKey)) {
                selectedLevel = LEVEL_KEYS[this.sel];
                this.scene.start('GameScene', { p1Char: this.p1Char, p2Char: this.p2Char, level: selectedLevel });
            }
        }
    }

    // ============================================================
    // GAME SCENE
    // ============================================================
    class GameScene extends Phaser.Scene {
        constructor() { super({ key: 'GameScene' }); this.debugMode = false; this.stickMode = true; }
        init(data) {
            this.p1Char = data.p1Char || 'swordsman';
            this.p2Char = data.p2Char || 'swordsman';
            this.levelKey = data.level || selectedLevel || 'proving_grounds';
            const lv = LEVELS[this.levelKey];
            const allSolid = [];
            if (lv.mainPlatform) allSolid.push(lv.mainPlatform);
            if (lv.splitPlatforms) allSolid.push(...lv.splitPlatforms);
            const allPlats = [...allSolid, ...(lv.floatingPlatforms || [])];
            STAGE.mainPlatform = allSolid[0] || { x: 512, y: 500, width: 500, height: 24 };
            STAGE.splitPlatforms = lv.splitPlatforms || [];
            STAGE.floatingPlatforms = lv.floatingPlatforms || [];
            STAGE.allPlatforms = allPlats; // convenience cache used by CPU gap detection
            const newLedges = [
                ...computeLedgesFrom(allSolid),                                          // base platforms: full range
                ...computeLedgesFrom(lv.floatingPlatforms || [], Math.round(FIGHTER_CONFIG.ledgeGrabRange * 0.5)), // floating: half range
            ];
            LEDGES.length = 0;
            newLedges.forEach(l => LEDGES.push(l));
        }

        getOtherFighter(fighter) {
            return fighter === this.p1 ? this.p2 : this.p1;
        }

        create() {
            const lv = LEVELS[this.levelKey];
            this.cameras.main.setBackgroundColor(COLORS.background);
            this.drawBackgroundGrid();

            // Solid platforms (main or split halves)
            this.solidPlatforms = this.physics.add.staticGroup();
            const addSolid = (platData) => {
                const p = this.add.rectangle(platData.x, platData.y,
                    platData.width, platData.height, 0x000000, 0);
                p.setStrokeStyle(0);
                this.physics.add.existing(p, true);
                this.solidPlatforms.add(p);
            };
            if (lv.mainPlatform) addSolid(lv.mainPlatform);
            if (lv.splitPlatforms) lv.splitPlatforms.forEach(addSolid);

            // Floating pass-through platforms
            this.floatingPlatforms = this.physics.add.staticGroup();
            (lv.floatingPlatforms || []).forEach(plat => {
                const p = this.add.rectangle(plat.x, plat.y, plat.width, plat.height, 0x000000, 0);
                p.setStrokeStyle(0);
                this.physics.add.existing(p, true);
                p.body.checkCollision.down = false;
                p.body.checkCollision.left = false;
                p.body.checkCollision.right = false;
                this.floatingPlatforms.add(p);
            });

            // ── Platform Visual Renderer ─────────────────────────────────────
            // Draws rich shaded platforms using a Graphics layer.
            // Physics rectangles above are invisible — all visuals live here.
            const platGfx = this.add.graphics().setDepth(2);

            // Helper: hex int → {r,g,b}
            const hexRGB = (hex) => ({ r:(hex>>16)&0xff, g:(hex>>8)&0xff, b:hex&0xff });
            // Helper: blend two hex colours at ratio t (0=a, 1=b)
            const blendHex = (a, b, t) => {
                const A = hexRGB(a), B = hexRGB(b);
                const r = Math.round(A.r + (B.r - A.r) * t);
                const gv = Math.round(A.g + (B.g - A.g) * t);
                const bv = Math.round(A.b + (B.b - A.b) * t);
                return (r << 16) | (gv << 8) | bv;
            };

            // Draws one platform with full shading treatment.
            // isSolid = true for main/split platforms, false for floating pass-throughs.
            const drawPlatform = (pd, isSolid) => {
                const x = pd.x - pd.width / 2;
                const y = pd.y - pd.height / 2;
                const w = pd.width;
                const h = pd.height;
                const cx = pd.x;

                // ── Colours ───────────────────────────────────────────────────
                // Solid platforms: deeper, more anchored blues. Floating: slightly warmer teal.
                const baseCol   = isSolid ? 0x12121f : 0x0f1a22;
                const midCol    = isSolid ? 0x1c1c30 : 0x132030;
                const topEdge   = isSolid ? 0x5c6aaa : 0x3a8fa8;   // lit surface
                const glowCol   = isSolid ? 0x3355cc : 0x1a99bb;   // energy colour
                const rimCol    = isSolid ? 0x7a8fd0 : 0x55ccdd;   // bright rim
                const underCol  = isSolid ? 0x0d0d1a : 0x091520;   // underside shadow

                // ── 1. Drop shadow ─────────────────────────────────────────────
                platGfx.fillStyle(0x000000, 0.45);
                platGfx.fillRect(x + 4, y + h + 2, w - 4, 6);

                // ── 2. Main body — dark base fill ──────────────────────────────
                platGfx.fillStyle(baseCol, 1);
                platGfx.fillRect(x, y, w, h);

                // ── 3. Body gradient — lighter strip in upper third ────────────
                platGfx.fillStyle(midCol, 0.9);
                platGfx.fillRect(x, y, w, Math.ceil(h * 0.55));

                // ── 4. Circuit traces — thin horizontal scan lines inside body ─
                // Evenly spaced, very subtle.
                const traceCount = Math.max(1, Math.floor(h / 5) - 1);
                for (let i = 1; i <= traceCount; i++) {
                    const ty = y + Math.round(h * i / (traceCount + 1));
                    platGfx.lineStyle(0.5, glowCol, 0.12);
                    platGfx.lineBetween(x + 8, ty, x + w - 8, ty);
                }

                // ── 5. Vertical tick marks on top surface ──────────────────────
                // Small inset notches along the top edge, like a data grid.
                const tickSpacing = 32;
                const tickCount = Math.floor(w / tickSpacing) - 1;
                for (let i = 1; i <= tickCount; i++) {
                    const tx = x + i * tickSpacing;
                    platGfx.lineStyle(1, rimCol, 0.18);
                    platGfx.lineBetween(tx, y + 1, tx, y + 5);
                }

                // ── 6. Side panel lines — vertical edges ───────────────────────
                platGfx.lineStyle(1, glowCol, 0.25);
                platGfx.lineBetween(x,     y, x,     y + h);
                platGfx.lineBetween(x + w, y, x + w, y + h);

                // ── 7. Underside glow strip ────────────────────────────────────
                // Soft band along the bottom edge in the energy colour.
                platGfx.fillStyle(glowCol, 0.18);
                platGfx.fillRect(x + 2, y + h - 3, w - 4, 3);

                // ── 8. TOP SURFACE — multi-layer energy edge ───────────────────
                // Layer a: wide soft base glow
                platGfx.lineStyle(4, glowCol, 0.22);
                platGfx.lineBetween(x, y, x + w, y);
                // Layer b: main bright surface line
                platGfx.lineStyle(2, topEdge, 0.95);
                platGfx.lineBetween(x, y, x + w, y);
                // Layer c: specular hotspot — brightest at centre, fades to edges
                const hlW = Math.round(w * 0.55);
                platGfx.lineStyle(1.5, rimCol, 0.75);
                platGfx.lineBetween(cx - hlW / 2, y, cx + hlW / 2, y);
                // Layer d: tiny pixel-bright centre dot
                platGfx.fillStyle(0xffffff, 0.55);
                platGfx.fillRect(cx - 3, y, 6, 1);

                // ── 9. Corner accents — angled cut marks at platform ends ───────
                const cornerLen = Math.min(10, h - 1);
                platGfx.lineStyle(1.5, rimCol, 0.55);
                // top-left
                platGfx.lineBetween(x,              y, x + cornerLen,    y + cornerLen);
                // top-right
                platGfx.lineBetween(x + w,          y, x + w - cornerLen, y + cornerLen);
                // Subtle bottom corners
                platGfx.lineStyle(1, glowCol, 0.3);
                platGfx.lineBetween(x,              y + h, x + cornerLen,    y + h - cornerLen);
                platGfx.lineBetween(x + w,          y + h, x + w - cornerLen, y + h - cornerLen);

                // ── 10. Outer stroke ───────────────────────────────────────────
                platGfx.lineStyle(1, glowCol, 0.4);
                platGfx.strokeRect(x, y, w, h);
            };

            // Draw all platforms
            if (lv.mainPlatform) drawPlatform(lv.mainPlatform, true);
            if (lv.splitPlatforms) lv.splitPlatforms.forEach(p => drawPlatform(p, true));
            (lv.floatingPlatforms || []).forEach(p => drawPlatform(p, false));

            // Stage name watermark
            this.add.text(512, STAGE.mainPlatform.y + 16, lv.name.toUpperCase(), {
                fontFamily: 'Orbitron, sans-serif', fontSize: '8px', color: '#111128', letterSpacing: 4,
            }).setOrigin(0.5).setDepth(1);

            this.blastGfx = this.add.graphics();
            this.drawBlastZones();

            const defaultSpawnY = STAGE.mainPlatform.y - 80;
            const p1X = lv.p1SpawnX || 380, p2X = lv.p2SpawnX || 644;
            const p1Y = lv.p1SpawnY || defaultSpawnY, p2Y = lv.p2SpawnY || defaultSpawnY;
            this.p1 = new Fighter(this, p1X, p1Y, 0, COLORS.p1Body, this.p1Char);
            this.p2 = new Fighter(this, p2X, p2Y, 1, COLORS.p2Body, this.p2Char);
            this.cpuCtrl = new CPUController(this.p2, this.p1);

            this.physics.add.collider(this.p1.sprite, this.solidPlatforms);
            this.physics.add.collider(this.p2.sprite, this.solidPlatforms);
            this.physics.add.collider(this.p1.sprite, this.floatingPlatforms, null, (ps, pl) => this.passThroughCheck(this.p1, ps, pl));
            this.physics.add.collider(this.p2.sprite, this.floatingPlatforms, null, (ps, pl) => this.passThroughCheck(this.p2, ps, pl));

            // Apply default stick mode (on) — hide sprites, shrink hitboxes
            if (this.stickMode) {
                const sw = FIGHTER_CONFIG.width * 0.7;
                const sh = FIGHTER_CONFIG.height * 0.8;
                [this.p1, this.p2].forEach(f => {
                    f.sprite.setVisible(false);
                    f.faceIndicator.setVisible(false);
                    f.body.setSize(sw, sh);
                    f.body.setOffset((FIGHTER_CONFIG.width - sw) / 2, (FIGHTER_CONFIG.height - sh));
                });
            }
            this.physics.world.drawDebug = this.debugMode;
            if (!this.debugMode && this.physics.world.debugGraphic) this.physics.world.debugGraphic.clear();
            this.blastGfx.setVisible(this.debugMode);

            this.projectiles = [];
            // Per-match stat accumulators
            this._matchStart = Date.now();
            this._p1MaxCombo = 0; this._p2MaxCombo = 0;
            this._p1Smashes  = 0; this._p2Smashes  = 0;
            this._p1DmgDealt = 0; this._p2DmgDealt = 0;
            // CPU difficulty badge — shown when CPU is active
            // CPU info shown in label row — no separate badge needed
            this.debugGfx = this.add.graphics().setDepth(20);
            this.stickGfx = this.add.graphics().setDepth(10); // Between sprite(5) and debug(20)

            this.p1Keys = {
                left: this.input.keyboard.addKey('A'), right: this.input.keyboard.addKey('D'),
                up: this.input.keyboard.addKey('W'), down: this.input.keyboard.addKey('S'),
                attack: this.input.keyboard.addKey('F'), strong: this.input.keyboard.addKey('G'),
                move3: this.input.keyboard.addKey('H'), ultimate: this.input.keyboard.addKey('J'),
            };
            this.p2Keys = {
                left: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
                right: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
                up: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
                down: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN),
                attack: this.input.keyboard.addKey('M'),
                strong: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.COMMA),
                move3: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.PERIOD),
                ultimate: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.FORWARD_SLASH),
            };

            // Wire buffered inputs: event-driven press registration via Phaser key objects.
            // Using .on('down') instead of polling JustDown means presses are never dropped
            // on heavy frames. The 'if (e.repeat) return' guard blocks OS key-repeat from
            // flooding the buffer when a key is held.
            const wireBuffer = (keys, fighter) => {
                keys.up.on('down',     (e) => { if (e.repeat) return; fighter.inputBuffer.press('jump'); });
                keys.attack.on('down', (e) => { if (e.repeat) return; fighter.inputBuffer.press('attack'); });
                keys.strong.on('down', (e) => { if (e.repeat) return; fighter.inputBuffer.press('strong'); });
                keys.move3.on('down',    (e) => { if (e.repeat) return; fighter.inputBuffer.press('move3'); });
                keys.ultimate.on('down', (e) => { if (e.repeat) return; fighter.inputBuffer.press('move4'); });
                keys.down.on('down',   (e) => {
                    if (e.repeat) return;
                    fighter.inputBuffer.press('fastfall');
                    // Airdodge: shield key while airborne triggers a directional dodge
                    if (fighter.state === S.AIRBORNE) fighter.inputBuffer.press('airdodge');
                });
            };
            wireBuffer(this.p1Keys, this.p1);
            wireBuffer(this.p2Keys, this.p2);

            this.input.keyboard.addKey('T').on('down', () => {
                this.debugMode = !this.debugMode;
                this.physics.world.drawDebug = this.debugMode;
                if (!this.debugMode) this.physics.world.debugGraphic.clear();
                this.blastGfx.setVisible(this.debugMode);
            });
            this.input.keyboard.addKey('Y').on('down', () => {
                this.stickMode = !this.stickMode;
                [this.p1, this.p2].forEach(f => {
                    f.sprite.setVisible(!this.stickMode);
                    f.faceIndicator.setVisible(!this.stickMode);
                    if (this.stickMode) {
                        // Shrink hurtbox: 30% narrower, 20% shorter
                        const sw = FIGHTER_CONFIG.width * 0.7;
                        const sh = FIGHTER_CONFIG.height * 0.8;
                        f.body.setSize(sw, sh);
                        // Offset to keep body centered on sprite
                        f.body.setOffset((FIGHTER_CONFIG.width - sw) / 2, (FIGHTER_CONFIG.height - sh));
                    } else {
                        // Restore original hitbox
                        f.body.setSize(FIGHTER_CONFIG.width, FIGHTER_CONFIG.height);
                        f.body.setOffset(0, 0);
                    }
                });
            });
            this.input.keyboard.addKey('R').on('down', () => this.resetMatch());
            this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC).on('down', () => {
                if (this.gameOverTimer) clearTimeout(this.gameOverTimer);
                this.cleanupProjectiles(); this.time.timeScale = 1;
                this.scene.start('LevelScene', { p1Char: this.p1Char, p2Char: this.p2Char });
            });

            this.createHUD(); this.particles = [];
        }

        passThroughCheck(fighter, playerSprite, platform) {
            if (fighter.dropThrough) return false;
            // Osprey passes through floating platforms while airborne attacking
            if (fighter.charKey === 'osprey' && !fighter.isGrounded && fighter.state === S.ATTACK) return false;
            const pBot = playerSprite.body.bottom;
            const pTop = platform.body.top;
            const vy   = playerSprite.body.velocity.y;
            // Allow landing only if the player's feet were above (or at) the platform top this frame.
            // Use a tolerance scaled to velocity so fast-falling never tunnels through.
            const tolerance = Math.max(8, Math.abs(vy) * (1/60) + 2);
            const canLand = pBot <= pTop + tolerance && vy >= -10;
            if (this.debugMode && !canLand) {
                const label = fighter.playerIndex === 0 ? 'P1' : 'P2';
                // console.log(`[passThrough] ${label} BLOCKED land — pBot:${pBot.toFixed(1)} pTop:${pTop.toFixed(1)} tol:${tolerance.toFixed(1)} vy:${vy.toFixed(1)} dropThrough:${fighter.dropThrough}`);
            }
            return canLand;
        }

        update(time, delta) {
            const dt = delta / 1000;

            // Game over — freeze gameplay, only run visuals
            if (this.gameEnded) {
                this.updateParticles();
                return;
            }

            this.p1.update(this.p1Keys);
            if (cpuEnabled) {
                this.cpuCtrl.update();
                this.p2.update(this.cpuCtrl.vKeys);
            } else {
                this.p2.update(this.p2Keys);
            }

            // Enforce sprite visibility and body size for stick figure mode
            if (this.stickMode) {
                const sw = FIGHTER_CONFIG.width * 0.7;
                const sh = FIGHTER_CONFIG.height * 0.8;
                [this.p1, this.p2].forEach(f => {
                    if (f.state !== S.DEAD && f.state !== S.SCREEN_SPLAT) {
                        f.sprite.setVisible(false);
                        f.faceIndicator.setVisible(false);
                    }
                    // Ensure body stays at stick mode size (catches respawns)
                    if (f.body.width !== Math.floor(sw)) {
                        f.body.setSize(sw, sh);
                        f.body.setOffset((FIGHTER_CONFIG.width - sw) / 2, (FIGHTER_CONFIG.height - sh));
                    }
                });
            }

            // Melee hits
            this.checkMeleeHit(this.p1, this.p2);
            this.checkMeleeHit(this.p2, this.p1);

            // Projectiles
            for (let i = this.projectiles.length - 1; i >= 0; i--) {
                const proj = this.projectiles[i];
                proj.update(dt);
                if (!proj.alive) { this.projectiles.splice(i, 1); continue; }

                const defender = proj.ownerIndex === 0 ? this.p2 : this.p1;
                const attacker = proj.ownerIndex === 0 ? this.p1 : this.p2;
                if (defender.state === S.DEAD || defender.state === S.SCREEN_SPLAT || defender.invincible > 0) continue;

                if (rectsOverlap(proj.x, proj.y, proj.w, proj.h,
                        defender.sprite.x, defender.sprite.y - 3,
                        FIGHTER_CONFIG.width, FIGHTER_CONFIG.height + 6)) {

                    // Shield reflect
                    if (defender.state === S.SHIELD || defender.state === S.SHIELDSTUN) {
                        proj.reflect(defender.playerIndex);
                        defender.setState(S.SHIELDSTUN);
                        defender.shieldHP -= proj.attackData.damage * 0.5;
                        continue;
                    }

                    // Lasso pull
                    if (proj.isLasso) {
                        defender.onLassoPull(attacker, proj.attackData);
                        proj.destroy(); this.projectiles.splice(i, 1);
                        continue;
                    }

                    // Freeze breath
                    if (proj.isFreeze) {
                        defender.onFreeze(proj.attackData, proj.ownerIndex);
                        proj.destroy(); this.projectiles.splice(i, 1);
                        continue;
                    }

                    defender.onProjectileHit(proj.attackData, proj.vx, proj.ownerIndex);
                    proj.destroy(); this.projectiles.splice(i, 1);
                }
            }

            this.drawDebug(); this.drawStickFigures(); this.updateHUD(); this.updateParticles();
        }

        checkMeleeHit(attacker, defender) {
            if (!attacker.hitboxActive || attacker.hasHitThisAttack || !attacker.currentAttack) return;
            if (defender.invincible > 0 || defender.state === S.DEAD || defender.state === S.SCREEN_SPLAT) return;
            const hb = attacker.hitboxRect;
            if (rectsOverlap(hb.x, hb.y, hb.w, hb.h,
                    defender.sprite.x, defender.sprite.y - 3,
                    FIGHTER_CONFIG.width, FIGHTER_CONFIG.height + 6)) {
                attacker.hasHitThisAttack = true;

                // ---- HIT STOP ----
                // Calculate raw knockback to scale freeze duration (3–8 frames)
                const atkData = attacker.currentAttack;
                const previewKb = calcKnockback(atkData, defender.damage + atkData.damage);
                const stopFrames = Math.round(Phaser.Math.Clamp(previewKb / 80, 3, 8));

                // Attacker freezes in their attack pose
                attacker.hitStop = stopFrames;
                attacker._hitStopVx = attacker.body.velocity.x;
                attacker._hitStopVy = attacker.body.velocity.y;

                // Defender will have hitStop applied after applyKnockback sets their velocity
                // We store it and apply it in onHit after knockback is calculated
                defender._pendingHitStop = stopFrames;

                // Brute screen shake on hit
                if (attacker.charKey === 'brute' && attacker.currentAttack.screenShake) {
                    this.cameras.main.shake(120, 0.025);
                }
                defender.onHit(attacker.currentAttack, attacker);
            }
        }

        cleanupProjectiles() { this.projectiles.forEach(p => p.destroy()); this.projectiles = []; }

        drawDebug() {
            this.debugGfx.clear();
            if (!this.debugMode) return;

            // Draw ledge grab zones
            LEDGES.forEach(l => {
                this.debugGfx.fillStyle(COLORS.ledge, 0.3);
                this.debugGfx.fillCircle(l.x, l.y, 6);
                this.debugGfx.lineStyle(1, COLORS.ledge, 0.5);
                this.debugGfx.strokeCircle(l.x, l.y, l.grabRange !== undefined ? l.grabRange : FIGHTER_CONFIG.ledgeGrabRange);
            });

            [this.p1, this.p2].forEach((f, i) => {
                // Don't draw debug boxes for dead/splatting fighters
                if (f.state === S.DEAD || f.state === S.SCREEN_SPLAT) return;
                const hbColor = i === 0 ? COLORS.p1Hitbox : COLORS.p2Hitbox;
                this.debugGfx.lineStyle(1, COLORS.hurtbox, 0.4);
                this.debugGfx.strokeRect(f.sprite.x - FIGHTER_CONFIG.width/2 - 2, f.sprite.y - FIGHTER_CONFIG.height/2 - 2 - 6, FIGHTER_CONFIG.width + 4, FIGHTER_CONFIG.height + 4 + 6);
                if (f.hitboxActive) {
                    const hb = f.hitboxRect;
                    this.debugGfx.fillStyle(hbColor, 0.3);
                    this.debugGfx.fillRect(hb.x - hb.w/2, hb.y - hb.h/2, hb.w, hb.h);
                    this.debugGfx.lineStyle(2, hbColor, 0.9);
                    this.debugGfx.strokeRect(hb.x - hb.w/2, hb.y - hb.h/2, hb.w, hb.h);
                }
                if (f.state === S.SHIELD || f.state === S.SHIELDSTUN) {
                    const bx = f.sprite.x - 20; const by = f.sprite.y - 42;
                    this.debugGfx.fillStyle(0x222244, 0.8); this.debugGfx.fillRect(bx, by, 40, 4);
                    this.debugGfx.fillStyle(COLORS.shield, 0.8);
                    this.debugGfx.fillRect(bx, by, 40 * (f.shieldHP / FIGHTER_CONFIG.shieldMaxHP), 4);
                }
                if (f.state === S.LEDGE_HANG) {
                    this.debugGfx.lineStyle(2, COLORS.ledge, 0.9);
                    this.debugGfx.strokeCircle(f.sprite.x, f.sprite.y - 20, 8);
                }
            });

            this.projectiles.forEach(p => {
                if (!p.alive) return;
                const col = p.isLasso ? 0xddaa44 : (p.ownerIndex === 0 ? COLORS.p1Hitbox : COLORS.p2Hitbox);
                this.debugGfx.lineStyle(1, col, 0.7);
                this.debugGfx.strokeRect(p.x - p.w/2, p.y - p.h/2, p.w, p.h);
            });
        }

        drawStickFigures() {
            this.stickGfx.clear();
            if (!this.stickMode) return;

            [this.p1, this.p2].forEach((f) => {
                if (f.state === S.DEAD || f.state === S.SCREEN_SPLAT) return;

                const cx = f.sprite.x; // Center of hitbox
                const cy = f.sprite.y;
                const W = FIGHTER_CONFIG.width;
                const H = FIGHTER_CONFIG.height;
                const facing = f.facing;
                const col = f.color;
                const L = f.limbs;

                // Stick figure is 30% larger than hitbox
                const scale = 1.3;
                const headR = 8 * scale;        // Head radius
                const torsoLen = 22 * scale;     // Shoulder to hip
                const upperArm = 10 * scale;     // Shoulder to elbow
                const lowerArm = 10 * scale;     // Elbow to hand
                const upperLeg = 12 * scale;     // Hip to knee
                const lowerLeg = 12 * scale;     // Knee to foot
                const shoulderW = 6 * scale;     // Half shoulder width

                // Anchor: shift figure up 13px so feet sit on platform surface
                const headY = cy - H / 2 * scale + headR - 13;
                const headX = cx;

                // Torso lean
                const neckX = headX + Math.sin(L.torsoLean * facing) * 2;
                const neckY = headY + headR;
                const hipX = neckX + Math.sin(L.torsoLean * facing) * torsoLen * 0.3;
                const hipY = neckY + torsoLen;

                // Shoulders (offset from neck)
                const shoulderLX = neckX - shoulderW * facing; // Back shoulder
                const shoulderRX = neckX + shoulderW * facing; // Front shoulder
                const shoulderY = neckY + 3 * scale;

                // Helper: draw limb segment from joint at angle, return end position
                const limbEnd = (jx, jy, angle, length) => {
                    const a = angle * facing + Math.PI / 2; // Convert: 0=down, positive=forward
                    return {
                        x: jx + Math.cos(a) * length,
                        y: jy + Math.sin(a) * length,
                    };
                };

                const gfx = this.stickGfx;

                // ── Colour helpers ──────────────────────────────────────────
                // Decompose the Phaser integer colour into r/g/b so we can
                // derive lighter / darker shades for shading passes.
                const colR = (col >> 16) & 0xff;
                const colG = (col >> 8)  & 0xff;
                const colB =  col        & 0xff;
                const lighten = (hex, amt) => {
                    const r = Math.min(255, ((hex >> 16) & 0xff) + amt);
                    const g = Math.min(255, ((hex >>  8) & 0xff) + amt);
                    const b = Math.min(255,  (hex        & 0xff) + amt);
                    return (r << 16) | (g << 8) | b;
                };
                const darken = (hex, amt) => {
