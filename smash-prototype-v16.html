        .controls-bar .label {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 10px;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px;

        .controls-bar .p2 .label { color: #f55; }

            background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 3px;

        return ledges;

    const CHAR_KEYS = Object.keys(CHARACTERS);

    let selectedLevel = 'proving_grounds';

    // ============================================================
    // CPU CONTROLLER
    // ============================================================
    let cpuEnabled   = false;  // P2 is CPU
    let cpuDifficulty = 5;     // 1–9

    // Difficulty presets — all values scale linearly between levels.
    // reactionFrames : frames of delay before the CPU "sees" a state change
    // aggressionRate : 0–1, how often it tries to attack vs hang back
    // comboChance    : 0–1, probability of following up a hit
    // recoverySkill  : 0–1, how well it recovers off-stage
    // jumpFreq       : frames between opportunistic jumps
    // projectileRate : 0–1, how freely it uses projectiles
    // DIstrength     : 0–1, how well it uses directional influence
    const CPU_LEVELS = [
        null, // index 0 unused
        { reactionFrames:60, aggression:0.10, comboChance:0.06, recoverySkill:0.18, jumpFreq:100, projectileRate:0.08, DI:0.05 }, // 1 - braindead
        { reactionFrames:46, aggression:0.20, comboChance:0.16, recoverySkill:0.32, jumpFreq: 78, projectileRate:0.15, DI:0.18 }, // 2

    class CPUController {
        constructor(cpu, opponent) {
            this.cpu = cpu;
            this.opp = opponent;
            this.frame = 0;
            this.reactionDelay = 0;
            this.seenOppX = 0; this.seenOppY = 0; this.seenOppState = S.IDLE;
            this.actionCooldown  = 0;
            this.jumpCooldown    = 0;
            this.retreatFrames   = 0;
            this.stuckTimer      = 0;   // detects being stuck facing wrong way
            this.lastCpuX        = 0;
            this.stuckCountdown  = 0;   // forced reorient frames
            this.edgeguardMode   = false;
            this.shieldHoldFrames = 0;  // how many more frames to keep shield up
            this.shieldCooldown   = 0;  // frames before CPU can shield again (prevent spam)
            this.lastOppX         = 0;  // for predicting opponent movement
            this.vKeys = {
                left:   { isDown: false }, right: { isDown: false },
                up:     { isDown: false }, down:  { isDown: false },
                attack: { isDown: false }, strong: { isDown: false }, move3: { isDown: false },
            };
        }

        get cfg() { return CPU_LEVELS[cpuDifficulty]; }

        _clear() { for (const k of Object.keys(this.vKeys)) this.vKeys[k].isDown = false; }

        // Returns the nearest platform in the given direction (1=right, -1=left) from cpuX,
        // or null if none found within 500px. Used for gap-crossing navigation.
        _nearestPlatformInDirection(cpuX, cpuY, dir) {
            const allPlats = STAGE.allPlatforms || [
                ...(STAGE.mainPlatform ? [STAGE.mainPlatform] : []),
                ...(STAGE.splitPlatforms || []),
                ...(STAGE.floatingPlatforms || []),
            ];
            let nearest = null, nearestDist = Infinity;
            for (const p of allPlats) {
                const halfW = p.width / 2;
                const platLeft = p.x - halfW, platRight = p.x + halfW;
                // Platform must be to our side and roughly reachable vertically
                const inDir = dir > 0 ? platLeft > cpuX - 20 : platRight < cpuX + 20;
                if (!inDir) continue;
                const horizDist = dir > 0 ? Math.max(0, platLeft - cpuX) : Math.max(0, cpuX - platRight);
                if (horizDist > 500) continue;
                // Prefer platforms that are below us or at similar height (landing targets)
                const vertDist = Math.abs(p.y - cpuY);
                const score = horizDist + vertDist * 0.5;
                if (score < nearestDist) { nearestDist = score; nearest = p; }
            }
            return nearest;
        }

        // Returns true if there is a platform whose X range covers x AND
        // (if aboveY is given) whose surface is below aboveY.
        // aboveY = CPU's current y; omit for grounded edge-scan (X-only is fine there).
        _hasPlatformBelow(x, aboveY) {
            const allPlats = STAGE.allPlatforms || [
                ...(STAGE.mainPlatform ? [STAGE.mainPlatform] : []),
                ...(STAGE.splitPlatforms || []),
                ...(STAGE.floatingPlatforms || []),
            ];
            for (const p of allPlats) {
                const halfW = p.width / 2;
                if (x < p.x - halfW || x > p.x + halfW) continue;
                // If caller provides their Y, only count platforms that are at or below them
                if (aboveY !== undefined && p.y < aboveY - 10) continue;
                return true;
            }
            return false;
        }

        // Returns true if moving in direction dir (1=right, -1=left) from cpuX
        // will step off the edge into a gap within lookahead pixels.
        // Lookahead scales with difficulty — lower CPU is slightly less cautious
        // but still avoids obvious pits at all levels.
        _pitAheadInDirection(cpuX, dir) {
            // Start scan close to feet; max scales with difficulty
            // Minimum 32px so we don't trigger on the platform the CPU is standing on
            const maxLook = 40 + cpuDifficulty * 4; // LV1=44, LV9=76
            for (let d = 16; d <= maxLook; d += 6) {
                if (!this._hasPlatformBelow(cpuX + dir * d)) return true;
            }
            return false;
        }

        _press(action) {
            const f = this.cpu;
            if (action === 'jump')    f.inputBuffer.press('jump');
            if (action === 'attack')  f.inputBuffer.press('attack');
            if (action === 'strong')  f.inputBuffer.press('strong');
            if (action === 'move3')   f.inputBuffer.press('move3');
            if (action === 'fastfall')f.inputBuffer.press('fastfall');
            if (action === 'airdodge')f.inputBuffer.press('airdodge');
        }

        // Always face toward opponent before attacking — prevents firing wrong way
        _faceOpp(dx) {
            this.vKeys[dx > 0 ? 'right' : 'left'].isDown = true;
        }

        update() {
            if (!cpuEnabled) return;
            const cfg = this.cfg;
            const cpu = this.cpu;
            const opp = this.opp;
            this.frame++;
            this._clear();

            // ── Reaction delay ────────────────────────────────────────────────
            this.reactionDelay--;
            if (this.reactionDelay <= 0) {
                this.seenOppX     = opp.sprite.x;
                this.seenOppY     = opp.sprite.y;
                this.seenOppState = opp.state;
                this.reactionDelay = cfg.reactionFrames + Math.floor(Math.random() * 6);
            }
            this.actionCooldown = Math.max(0, this.actionCooldown - 1);
            this.jumpCooldown   = Math.max(0, this.jumpCooldown   - 1);
            this.retreatFrames  = Math.max(0, this.retreatFrames  - 1);
            this.stuckCountdown = Math.max(0, this.stuckCountdown - 1);

            const cpuX = cpu.sprite.x, cpuY = cpu.sprite.y;
            const oppX = this.seenOppX, oppY = this.seenOppY || opp.sprite.y;
            const dx   = oppX - cpuX;   // positive = opp is to the right
            const adx  = Math.abs(dx);
            const dy   = oppY - cpuY;
            const grounded   = cpu.isGrounded;
            const cpuDmg     = cpu.damagePercent || 0;
            const oppDmg     = opp.damagePercent || 0;
            const cpuFacing  = cpu.facing;         // 1=right, -1=left
            const shouldFace = dx > 0 ? 1 : -1;   // direction we NEED to face
            const facingWrong = cpuFacing !== shouldFace;

            // ── Stuck/facing detection — if we haven't moved and face wrong ───
            if (Math.abs(cpuX - this.lastCpuX) < 1 && facingWrong && grounded) {
                this.stuckTimer++;
            } else {
                this.stuckTimer = 0;
            }
            this.lastCpuX = cpuX;
            // After ~20 frames stuck facing wrong direction, force a reorient step
            const stuckThresh = Math.max(8, 28 - cpuDifficulty * 2);
            if (this.stuckTimer > stuckThresh) {
                this.stuckCountdown = 12;
                this.stuckTimer = 0;
            }
            if (this.stuckCountdown > 0) {
                // Walk one step toward opponent to flip facing
                this._faceOpp(dx);
                return;
            }

            // ── Dead / splat / frozen ─────────────────────────────────────────
            if (cpu.state === S.DEAD || cpu.state === S.SCREEN_SPLAT || cpu.state === S.FROZEN) return;

            // ── Hitstun DI ───────────────────────────────────────────────────
            if (cpu.state === S.HITSTUN) {
                if (Math.random() < cfg.DI) this.vKeys[dx > 0 ? 'left' : 'right'].isDown = true;
                return;
            }

            // ── RECOVERY ─────────────────────────────────────────────────────
            const offLeft  = cpuX < BLAST_ZONES.left  + 260;
            const offRight = cpuX > BLAST_ZONES.right - 260;
            const offStage = !grounded && (offLeft || offRight || cpuY < 120 || cpuY > 480);
            if (offStage) {
                const toCenter = 512 - cpuX;
                if (Math.abs(toCenter) > 20) this.vKeys[toCenter > 0 ? 'right' : 'left'].isDown = true;
                if (cpu.jumpsRemaining > 0 && this.jumpCooldown <= 0) {
                    this._press('jump'); this.jumpCooldown = 8;
                }
                // Use flyUp recovery if sinking
                if (cpuY > 350 && cpu.state === S.AIRBORNE) {
                    const ch = CHARACTERS[cpu.charKey];
                    if (ch && ch.airMove3 && ch.airMove3.flyUp) { this._press('move3'); }
                    else if (cpuDifficulty >= 4) this._press('airdodge');
                }
                return;
            }

            // ── LEDGE HANG ────────────────────────────────────────────────────
            if (cpu.state === S.LEDGE_HANG) {
                const thresh = Math.floor(50 * (1 - cfg.recoverySkill * 0.7));
                if ((cpu.stateTimer || 0) > thresh) {
                    // Higher levels: attack from ledge
                    if (cpuDifficulty >= 7 && Math.random() < 0.4) {
                        this._faceOpp(dx); this._press('attack');
                    } else {
                        Math.random() < 0.5 ? this._faceOpp(dx) : this._press('jump');
                    }
                }
                return;
            }

            // ── EDGEGUARD at high difficulty ──────────────────────────────────
            const oppOffStage = opp.sprite.x < BLAST_ZONES.left + 200 || opp.sprite.x > BLAST_ZONES.right - 200;
            if (cpuDifficulty >= 7 && oppOffStage && grounded && adx < 300) {
                // Chase to edge and press
                this._faceOpp(dx);
                if (adx < 80 && this.actionCooldown <= 0) {
                    this._faceOpp(dx); this._press('strong');
                    this.actionCooldown = 20;
                }
                return;
            }

            // ── SHIELD / DODGE ────────────────────────────────────────────────
            const oppAttacking = this.seenOppState === S.ATTACK;
            this.shieldCooldown = Math.max(0, this.shieldCooldown - 1);
            this.shieldHoldFrames = Math.max(0, this.shieldHoldFrames - 1);

            // Track opponent velocity for prediction
            const oppApproaching = this.seenOppX !== this.lastOppX && Math.sign(this.seenOppX - cpuX) === Math.sign(this.seenOppX - this.lastOppX);
            this.lastOppX = this.seenOppX;

            // ── Incoming projectile detection (LV7+) ──────────────────────────
            // Scan live projectiles owned by opponent heading toward CPU.
            // Triggers shield if CPU is grounded OR very close to landing (within 40px).
            let incomingProjThreat = false;
            if (cpuDifficulty >= 7 && this.shieldCooldown <= 0 && cpu.shieldHP > 15) {
                const nearGround = grounded || (!grounded && cpu.body.velocity.y > 0 && cpuY > 350);
                if (nearGround) {
                    const scene = cpu.scene;
                    for (let i = 0; i < scene.projectiles.length; i++) {
                        const p = scene.projectiles[i];
                        if (!p.alive) continue;
                        if (p.ownerIndex === cpu.playerIndex) continue; // own projectile
                        // Is it heading toward us? vx sign pointing at CPU
                        const projHeadingRight = p.vx > 0;
                        const cpuIsRight = p.x < cpuX;
                        if (projHeadingRight !== cpuIsRight) continue; // moving away
                        // Is it close enough to matter? Use time-to-arrive estimate
                        const distX = Math.abs(p.x - cpuX);
                        if (distX > 400) continue; // too far
                        const speed = Math.abs(p.vx) || 1;
                        const framesAway = distX / speed;
                        // React with enough time to get shield up (~10 frames)
                        const reactionWindow = 8 + (9 - cpuDifficulty) * 2; // LV7=10f, LV9=8f
                        if (framesAway < reactionWindow) {
                            incomingProjThreat = true;
                            break;
                        }
                    }
                }
            }

            // Shield trigger conditions — scale with difficulty
            // Base shield chance: scales from ~13% at LV1 to ~90% at LV9
            const shieldChance = 0.04 + cpuDifficulty * 0.095;
            const threatDist = 70 + cpuDifficulty * 8; // LV1=78, LV9=142

            const incomingMeleeThreat = oppAttacking && adx < threatDist && grounded;
            const oppRushingIn        = oppApproaching && adx < threatDist + 30 && grounded;
            // Old heuristic proj threat for LV5-6 (no real projectile scan yet)
            const projHeuristic = cpuDifficulty >= 5 && cpuDifficulty < 7 && adx < 320 &&
                                  grounded && oppAttacking && !incomingMeleeThreat;

            const shouldConsiderShield = (incomingMeleeThreat ||
                                          (oppRushingIn && cpuDifficulty >= 4) ||
                                          projHeuristic ||
                                          incomingProjThreat) &&
                                         this.shieldCooldown <= 0 && cpu.shieldHP > 15;

            if (shouldConsiderShield && Math.random() < (incomingProjThreat ? shieldChance * 1.4 : shieldChance)) {
                if (Math.random() < (0.3 + cpuDifficulty * 0.05)) {
                    // Shield — hold for scaled duration: LV1 ~6f, LV9 ~24f
                    // Projectile shield held a bit longer to ensure full absorption
                    const baseDur = Math.floor(6 + cpuDifficulty * 1.8 + Math.random() * 4);
                    const holdDur = incomingProjThreat ? baseDur + 6 : baseDur;
                    this.shieldHoldFrames = holdDur;
                    this.shieldCooldown = holdDur + 20 + Math.floor(Math.random() * 15);
                } else {
                    // Roll / dodge away (but not for projectiles — better to shield those)
                    if (!incomingProjThreat) {
                        this.retreatFrames = 12 + Math.floor(Math.random() * 10);
                    } else {
                        // Still shield for projectile even if rolled the dodge path
                        const holdDur = Math.floor(10 + cpuDifficulty * 1.5);
                        this.shieldHoldFrames = holdDur;
                    }
                    this.shieldCooldown = 30;
                }
            }

            // If currently in shield-hold, press down (no left/right so shield activates)
            if (this.shieldHoldFrames > 0 && grounded && cpu.shieldHP > 0) {
                this.vKeys.down.isDown = true;
                this.vKeys.left.isDown = false;
                this.vKeys.right.isDown = false;
                // Out-of-shield punish at LV7+ — attack the instant shield absorbs a hit
                if (cpuDifficulty >= 7 && cpu.state === S.SHIELDSTUN && this.actionCooldown <= 0) {
                    this.shieldHoldFrames = 0;
                    this._faceOpp(dx);
                    this._press('attack');
                    this.actionCooldown = 14;
                }
                return;
            }

            // ── RETREAT ───────────────────────────────────────────────────────
            if (this.retreatFrames > 0) {
                const retreatDir = dx > 0 ? -1 : 1;
                if (!grounded || !this._pitAheadInDirection(cpuX, retreatDir)) {
                    this.vKeys[retreatDir > 0 ? 'right' : 'left'].isDown = true;
                }
                return;
            }

            // ── MOVEMENT & APPROACH ───────────────────────────────────────────
            const closeRange  = adx < 85;
            const meleeRange  = adx < 60;
            const farRange    = adx > 260;
            const wantsApproach = Math.random() < cfg.aggression;

            // Pit/gap awareness — direction toward opponent
            const moveDir = dx > 0 ? 1 : -1;
            const pitAhead  = grounded && this._pitAheadInDirection(cpuX, moveDir);
            const pitBehind = grounded && this._pitAheadInDirection(cpuX, -moveDir);

            // ── PIT-FALL DETECTOR ─────────────────────────────────────────────
            // Log once when CPU drops below the lowest platform surface — indicates a real fall-in
            const stageFloorY = STAGE.mainPlatform ? STAGE.mainPlatform.y : 520;
            const belowFloor = cpuY > stageFloorY + 30;
            if (belowFloor && !this._wasBelow) {
                console.warn(`[PIT-FALL] CPU fell below stage floor! x=${Math.round(cpuX)} y=${Math.round(cpuY)} grounded=${grounded} jumps=${cpu.jumpsRemaining} vY=${Math.round(cpu.body?.velocity?.y||0)} hasPlatBelow=${this._hasPlatformBelow(cpuX,cpuY)}`);
            }
            this._wasBelow = belowFloor;

            if (this.frame % 60 === 0) {
                const branch = pitAhead ? (pitBehind ? 'PIT_BOTH' : 'PIT_AHEAD')
                             : (!grounded && !this._hasPlatformBelow(cpuX, cpuY)) ? 'AIR_GAP'
                             : !closeRange ? (wantsApproach ? 'APPROACH' : 'IDLE')
                             : meleeRange ? 'MELEE' : 'CLOSE';
                console.log(
                    `[CPU f=${this.frame}] x=${Math.round(cpuX)} y=${Math.round(cpuY)}`,
                    `gr=${grounded ? 1:0} adx=${Math.round(adx)} dy=${Math.round(dy)}`,
                    `pitA=${pitAhead?1:0} pitB=${pitBehind?1:0}`,
                    `jumps=${cpu.jumpsRemaining} vY=${Math.round(cpu.body?.velocity?.y||0)}`,
                    `jCd=${this.jumpCooldown} aCd=${this.actionCooldown}`,
                    `→ ${branch}`
                );
            }

            if (pitAhead && grounded) {
                // NEVER walk toward the pit.
                // Case A: pit ahead only — back up, then run-jump over
                // Case B: pit both directions (narrow platform) — just jump across toward opp
                if (!pitBehind) {
                    // Back away from the pit edge (away from moveDir = toward -moveDir)
                    this.vKeys[moveDir > 0 ? 'left' : 'right'].isDown = true;
                    // Run-jump: back up a bit then jump toward opponent
                    const safeToJump = this._hasPlatformBelow(cpuX - moveDir * 28);
                    if (safeToJump && this.jumpCooldown <= 0 && !closeRange) {
                        this._press('jump');
                        this.jumpCooldown = cfg.jumpFreq;
                        this.vKeys[moveDir > 0 ? 'right' : 'left'].isDown = true;
                    }
                } else {
                    // Trapped on a narrow platform — just jump directly toward opponent
                    this._faceOpp(dx);
                    if (this.jumpCooldown <= 0) {
                        this._press('jump');
                        this.jumpCooldown = cfg.jumpFreq;
                        this.vKeys[moveDir > 0 ? 'right' : 'left'].isDown = true;
                    }
                }
            } else if (!grounded && !this._hasPlatformBelow(cpuX, cpuY)) {
                // ── Airborne over a gap — aggressively recover to nearest platform ──
                const nearPlatLeft  = this._nearestPlatformInDirection(cpuX, cpuY, -1);
                const nearPlatRight = this._nearestPlatformInDirection(cpuX, cpuY,  1);
                let targetDir = moveDir;
                if (nearPlatLeft && nearPlatRight) {
                    const distL = Math.abs(nearPlatLeft.x - cpuX);
                    const distR = Math.abs(nearPlatRight.x - cpuX);
                    targetDir = distL < distR ? -1 : 1;
                } else if (nearPlatLeft) {
                    targetDir = -1;
                } else if (nearPlatRight) {
                    targetDir = 1;
                }
                this.vKeys[targetDir > 0 ? 'right' : 'left'].isDown = true;
                // Use jump immediately when over a gap — don't wait
                if (cpu.jumpsRemaining > 0 && this.jumpCooldown <= 0) {
                    this._press('jump'); this.jumpCooldown = 14;
                }
                // Use flyUp recovery move if sinking and available
                if (cpu.body.velocity.y > 80 && cpu.state === S.AIRBORNE) {
                    const ch = CHARACTERS[cpu.charKey];
                    if (ch && ch.airMove3 && ch.airMove3.flyUp) { this._press('move3'); }
                }
            } else if (!closeRange && wantsApproach) {
                // When airborne, only walk toward opponent if we're over solid ground
                // AND the edge in that direction is far enough away — prevents drifting off
                const safeToWalk = grounded
                    ? !pitAhead
                    : this._hasPlatformBelow(cpuX + moveDir * 40, cpuY); // lookahead while airborne
                if (safeToWalk) this._faceOpp(dx);
                // Jump to reach higher platforms — only when grounded
                if (dy < -55 && this.jumpCooldown <= 0 && grounded && !pitAhead) {
                    this._press('jump'); this.jumpCooldown = cfg.jumpFreq;
                }
                // High levels: dash-jump approach — only when grounded and no pit ahead
                if (!pitAhead && cpuDifficulty >= 7 && adx > 120 && grounded && this.jumpCooldown <= 0 && Math.random() < 0.15) {
                    this._press('jump'); this.jumpCooldown = 20;
                }
            } else if (!closeRange && !wantsApproach && !pitAhead && grounded) {
                // Inch forward only when grounded — airborne idle just lets physics settle
                if (Math.random() < 0.4) this._faceOpp(dx);
            } else if (closeRange && !meleeRange && Math.random() < 0.25) {
                // Space out slightly — but check we're not backing into a pit
                const retreatDir = dx > 0 ? -1 : 1;
                if (!this._pitAheadInDirection(cpuX, retreatDir)) {
                    this.vKeys[dx > 0 ? 'left' : 'right'].isDown = true;
                }
            } else if (meleeRange) {
                // Always face opponent when in melee range — core fix for facing bug
                this._faceOpp(dx);
            }

            // Fast-fall when airborne and below opponent — but only when over solid ground
            if (!grounded && dy > 50 && Math.random() < 0.45) {
                if (this._hasPlatformBelow(cpuX, cpuY)) {
                    this._press('fastfall');
                }
                // (if over a gap, the gap-crossing block above handles steering)
            }

            // ── ATTACK DECISION ───────────────────────────────────────────────
            if (this.actionCooldown > 0) return;

            // ALWAYS face opponent before attacking
            if (grounded) {
                if (meleeRange) {
                    this._faceOpp(dx);
                    const roll = Math.random();
                    if (oppDmg > 90 && cpuDifficulty >= 5 && roll < 0.45) {
                        this._press('strong'); this.actionCooldown = 24;
                    } else if (oppDmg > 60 && cpuDifficulty >= 7 && roll < 0.3) {
                        this._press('move3'); this.actionCooldown = 22;
                    } else if (roll < cfg.comboChance) {
                        this._press('attack'); this.actionCooldown = 16;
                    } else if (roll < cfg.comboChance + 0.18) {
                        this._press('move3'); this.actionCooldown = 22;
                    }
                    if (cpuDifficulty >= 8 && Math.random() < 0.5) this.actionCooldown = Math.max(8, this.actionCooldown - 6);
                } else if (farRange && Math.random() < cfg.projectileRate) {
                    const ch = CHARACTERS[cpu.charKey];
                    const hasProjectile = ch && (ch.strong.projectile || ch.move3.projectile);
                    if (hasProjectile) {
                        this._faceOpp(dx);
                        this._press(ch.strong.projectile ? 'strong' : 'move3');
                        this.actionCooldown = 36;
                    }
                    // No projectile: don't jump in place — just keep approaching (handled above)
                }
                // Only jump toward opponent when not blocked by a pit and actively approaching
            } else {
                // Airborne — only attack when actually close to opponent
                if (adx < 90 && Math.abs(dy) < 80) {
                    this._faceOpp(dx);
                    const roll = Math.random();
                    if (roll < cfg.aggression * 0.7) {
                        if (cpuDifficulty >= 6 && dy > 30 && Math.random() < 0.4) {
                            this._press('strong'); this.actionCooldown = 28;
                        } else if (roll < cfg.comboChance * 0.65) {
                            this._press('attack'); this.actionCooldown = 20;
                        } else {
                            this._press('strong'); this.actionCooldown = 28;
                        }
                    }
                }
                // Don't attack at all when far away airborne — use that time to move toward opp
                if (oppAttacking && adx < 95 && Math.random() < cfg.DI * 0.55) this._press('airdodge');
            }
        }
    }



    // ============================================================
    // PROFILE SYSTEM (multi-layer persistence: Claude storage → localStorage → cookie)
    // ============================================================
    const STORAGE_KEY = 'smash_profiles';

    const StorageLayer = {
        // ── Cookie helpers ──────────────────────────────────────────
        cookieSet(key, val) {
            try {
                const enc = encodeURIComponent(val);
                // 400-day expiry; SameSite=Lax for local use
                document.cookie = `${key}=${enc};max-age=34560000;path=/;SameSite=Lax`;
            } catch(e) {}
        },
        cookieGet(key) {
            try {
                const match = document.cookie.split(';').map(c => c.trim())
                    .find(c => c.startsWith(key + '='));
                return match ? decodeURIComponent(match.slice(key.length + 1)) : null;
            } catch(e) { return null; }
        },
        // ── localStorage helpers ────────────────────────────────────
        lsSet(key, val) {
            try { localStorage.setItem(key, val); } catch(e) {}
        },
        lsGet(key) {
            try { return localStorage.getItem(key); } catch(e) { return null; }
        },
        // ── Write to all layers ─────────────────────────────────────
        async save(key, val) {
            if (window.storage) {
                try { await window.storage.set(key, val); } catch(e) {}
            }
            this.lsSet(key, val);
            this.cookieSet(key, val);
        },
        // ── Read from first layer that has data ─────────────────────
        async load(key) {
            // 1. Claude artifact storage (most reliable in claude.ai)
            if (window.storage) {
                try {
                    const r = await window.storage.get(key);
                    if (r && r.value) return r.value;
                } catch(e) {}
            }
            // 2. localStorage
            const ls = this.lsGet(key);
            if (ls) return ls;
            // 3. Cookie fallback
            return this.cookieGet(key);
        },
    };

    const PROFILES = {
        data: [], // Array of { name, wins, losses, chars: { swordsman: {played,wins,losses}, ... } }
        p1Name: 'Player 1',
        p2Name: 'Player 2',
        p1Handicap: 0, // 0 = OFF, 1-9 = SSB-style scaling
        p2Handicap: 0,
        save() {
            const d = JSON.stringify(this.data);
            StorageLayer.save(STORAGE_KEY, d).catch(() => {});
        },
        async load() {
            try {
                const val = await StorageLayer.load(STORAGE_KEY);
                if (val) this.data = JSON.parse(val);
            } catch(e) { this.data = []; }
            // Ensure all profiles have entries for all characters + new stat fields
            this.data.forEach(p => {
                if (!p.chars) p.chars = {};
                if (!p.emoji) p.emoji = '⚔️';
                CHAR_KEYS.forEach(k => {
                    if (!p.chars[k]) p.chars[k] = { played: 0, wins: 0, losses: 0 };
                });
                // Extended stats — migrate old profiles safely
                if (p.maxCombo          === undefined) p.maxCombo = 0;
                if (p.maxComboCount     === undefined) p.maxComboCount = 0;
                if (p.totalSmashes      === undefined) p.totalSmashes = 0;
                if (p.totalDamageDealt  === undefined) p.totalDamageDealt = 0;
                if (p.totalDamageTaken  === undefined) p.totalDamageTaken = 0;
                if (p.perfectRounds     === undefined) p.perfectRounds = 0;
                if (p.longestStreak     === undefined) p.longestStreak = 0;
                if (p.currentStreak     === undefined) p.currentStreak = 0;
                if (p.totalPlaytime     === undefined) p.totalPlaytime = 0;
                if (p.stagePlays        === undefined) p.stagePlays = {};
                if (p.favoriteChar      === undefined) p.favoriteChar = null;
                if (p.gamesPlayed       === undefined) p.gamesPlayed = (p.wins||0) + (p.losses||0);
            });
        },
        addProfile(name) {
            name = name.trim();
            if (!name || this.data.find(p => p.name.toLowerCase() === name.toLowerCase())) return false;
            const chars = {};
            CHAR_KEYS.forEach(k => { chars[k] = { played: 0, wins: 0, losses: 0 }; });
            this.data.push({
                name, wins: 0, losses: 0, emoji: '⚔️', chars,
                maxCombo: 0, maxComboCount: 0,
                totalSmashes: 0, totalDamageDealt: 0, totalDamageTaken: 0,
                perfectRounds: 0, longestStreak: 0, currentStreak: 0,
                totalPlaytime: 0, stagePlays: {}, favoriteChar: null, gamesPlayed: 0,
            });
            this.save();
            return true;
        },
        deleteProfile(idx) {
            if (idx >= 0 && idx < this.data.length) {
                this.data.splice(idx, 1);
                this.save();
            }
        },
        recordWin(winnerName, winnerChar, loserName, loserChar) {
            const w = this.data.find(p => p.name === winnerName);
            const l = this.data.find(p => p.name === loserName);
            if (w) { w.wins++; w.gamesPlayed = (w.gamesPlayed||0) + 1; if (w.chars[winnerChar]) { w.chars[winnerChar].played++; w.chars[winnerChar].wins++; } }
            if (l) { l.losses++; l.gamesPlayed = (l.gamesPlayed||0) + 1; if (l.chars[loserChar]) { l.chars[loserChar].played++; l.chars[loserChar].losses++; } }
            this.save();
        },
        getProfile(name) { return this.data.find(p => p.name === name); },
        winRate(p) { return p.wins + p.losses > 0 ? Math.round((p.wins / (p.wins + p.losses)) * 100) : 0; },
        recordMatchStats(name, { combo, smashes, damageDealt, damageTaken, perfect, stage, playtime, won }) {
            const p = this.data.find(q => q.name === name);
            if (!p) return;
            // Combo
            if (combo > p.maxCombo) { p.maxCombo = combo; p.maxComboCount = 1; }
            else if (combo === p.maxCombo && combo > 0) p.maxComboCount++;
            // KOs / smashes
            p.totalSmashes = (p.totalSmashes || 0) + smashes;
            // Damage
            p.totalDamageDealt = (p.totalDamageDealt || 0) + Math.round(damageDealt);
            p.totalDamageTaken = (p.totalDamageTaken || 0) + Math.round(damageTaken);
            // Perfect rounds
            if (perfect) p.perfectRounds = (p.perfectRounds || 0) + 1;
            // Stage plays
            if (stage) { p.stagePlays = p.stagePlays || {}; p.stagePlays[stage] = (p.stagePlays[stage] || 0) + 1; }
            // Streak
            if (won) {
                p.currentStreak = (p.currentStreak || 0) + 1;
                if (p.currentStreak > (p.longestStreak || 0)) p.longestStreak = p.currentStreak;
            } else {
                p.currentStreak = 0;
            }
            // Playtime (seconds)
            p.totalPlaytime = (p.totalPlaytime || 0) + Math.round(playtime);
            // Favorite char — most wins with
            let bestChar = null, bestWins = -1;
            CHAR_KEYS.forEach(k => { const c = p.chars[k]; if (c && c.wins > bestWins) { bestWins = c.wins; bestChar = k; } });
            p.favoriteChar = bestChar;
            this.save();
        },
        // SSB-style handicap: 0 = OFF (1.0x), 1-9 scales damage dealt
        // Lv1 = 0.7x, Lv5 = 1.05x, Lv9 = 1.4x (approx +0.0875 per level)
        handicapMult(level) { return level === 0 ? 1.0 : 0.6125 + level * 0.0875; },
    };
    // Load profiles then start game
    async function initGame() {
        await PROFILES.load();
    }

    // ============================================================
    // MENU BACKGROUND — shared animated platform-slab parallax
    // Call createMenuBG(scene) in each menu scene's create(),
    // then call updateMenuBG(scene) once per update().
    // ============================================================
    function createMenuBG(scene) {
        const W = 1024, H = 640;
        // Static deep background — two depth layers of grid
        const bgGfx = scene.add.graphics().setDepth(-10);
        bgGfx.fillStyle(0x0a0a14, 1);
        bgGfx.fillRect(0, 0, W, H);
        // Fine grid
        bgGfx.lineStyle(1, 0x111122, 0.25);
        for (let x = 0; x < W; x += 48) bgGfx.lineBetween(x, 0, x, H);
        for (let y = 0; y < H; y += 48) bgGfx.lineBetween(0, y, W, y);
        // Coarser accent grid
        bgGfx.lineStyle(1, 0x151530, 0.18);
        for (let x = 0; x < W; x += 192) bgGfx.lineBetween(x, 0, x, H);
        for (let y = 0; y < H; y += 192) bgGfx.lineBetween(0, y, W, y);

        // Corner vignette — dark radial fade to draw focus to center
        const vigGfx = scene.add.graphics().setDepth(-9);
        for (let r = 0; r < 8; r++) {
            const alpha = 0.055 * (1 - r / 8);
            const rW = W * (0.3 + r * 0.1), rH = H * (0.3 + r * 0.1);
            vigGfx.lineStyle(Math.max(60 - r * 7, 1), 0x000000, alpha);
            vigGfx.strokeRect(W/2 - rW/2, H/2 - rH/2, rW, rH);
        }

        // ── Animated platform slabs ───────────────────────────────────────────
        // Each slab is a platform cross-section (same styling as game platforms)
        // racing from off-screen left → right at varying speeds/depths.
        const SLAB_LAYERS = [
            // { speed, y, h, w, alpha, col, rimCol, depth } — 3 depth layers
            { speed: 0.38, alpha: 0.13, col: 0x1c1c30, rim: 0x5c6aaa, depth: -8 },
            { speed: 0.62, alpha: 0.22, col: 0x1a2035, rim: 0x3a8fa8, depth: -7 },
            { speed: 1.05, alpha: 0.32, col: 0x12121f, rim: 0x6a7ec0, depth: -6 },
        ];

        scene._menuSlabs = [];

        // Seed several slabs per layer so screen is never empty
        SLAB_LAYERS.forEach((layer, li) => {
            const count = 5 + li * 2; // more slabs for faster layers
            for (let i = 0; i < count; i++) {
                const h = 14 + Math.random() * 12;          // 14–26px tall
                const w = 80 + Math.random() * 260;         // 80–340px wide
                const y = 40 + Math.random() * (H - 80);
                const x = Math.random() * W;                // start anywhere
                const speed = layer.speed * (0.75 + Math.random() * 0.5);
                const gfx = scene.add.graphics().setDepth(layer.depth);
                scene._menuSlabs.push({ gfx, x, y, w, h, speed, alpha: layer.alpha, col: layer.col, rim: layer.rim });
            }
        });

        // ── Data-pulse bands — horizontal light bands that sweep downward ─────
        // Inspired by 2024 "aurora scan" UI trend: a thin bright horizontal
        // gradient band that drifts slowly down, as if data is being read.
        scene._pulseGfx = scene.add.graphics().setDepth(-5);
        scene._pulseY = -80;
        scene._pulseSpeed = 0.55; // px per frame — subtle drift

        scene._menuBgCreated = true;
    }

    function _drawSlab(gfx, x, y, w, h, alpha, col, rimCol) {
        gfx.clear();
        // Body
        gfx.fillStyle(col, alpha);
        gfx.fillRect(x, y, w, h);
        // Inner lighter top half
        gfx.fillStyle(rimCol, alpha * 0.35);
        gfx.fillRect(x, y, w, Math.ceil(h * 0.5));
        // Circuit trace lines inside
        const traces = Math.max(1, Math.floor(h / 5) - 1);
        for (let i = 1; i <= traces; i++) {
            const ty = y + Math.round(h * i / (traces + 1));
            gfx.lineStyle(0.5, rimCol, alpha * 0.5);
            gfx.lineBetween(x + 6, ty, x + w - 6, ty);
        }
        // Tick marks on top
        const ticks = Math.floor(w / 32);
        for (let t = 1; t < ticks; t++) {
            const tx = x + t * 32;
            gfx.lineStyle(1, rimCol, alpha * 0.9);
            gfx.lineBetween(tx, y + 1, tx, y + 4);
        }
        // Underside glow
        gfx.fillStyle(rimCol, alpha * 0.4);
        gfx.fillRect(x + 2, y + h - 3, w - 4, 3);
        // Top edge — energy line
        gfx.lineStyle(3, rimCol, alpha * 0.7);
        gfx.lineBetween(x, y, x + w, y);
        gfx.lineStyle(1.5, 0xffffff, alpha * 0.45);
        gfx.lineBetween(x + w * 0.2, y, x + w * 0.8, y);
        // Corner accents
        const cl = Math.min(8, h - 1);
        gfx.lineStyle(1.5, rimCol, alpha * 0.8);
        gfx.lineBetween(x,     y, x + cl,    y + cl);
        gfx.lineBetween(x + w, y, x + w - cl, y + cl);
        // Outline
        gfx.lineStyle(1, rimCol, alpha * 0.4);
        gfx.strokeRect(x, y, w, h);
    }

    function updateMenuBG(scene) {
        if (!scene._menuBgCreated) return;
        const W = 1024;

        // Move slabs rightward, wrap when they leave the right edge
        scene._menuSlabs.forEach(s => {
            s.x += s.speed;
            if (s.x > W + 20) s.x = -s.w - 20;
            _drawSlab(s.gfx, s.x, s.y, s.w, s.h, s.alpha, s.col, s.rim);
        });

        // Data-pulse band sweep
        scene._pulseY += scene._pulseSpeed;
        if (scene._pulseY > 720) scene._pulseY = -80;
        const pg = scene._pulseGfx;
        pg.clear();
        // Soft gradient band: several translucent rectangles fading inward
        const bandH = 60;
        for (let r = 0; r < 8; r++) {
            const t = r / 8;
            const lineY = scene._pulseY + t * bandH;
            const a = Math.sin(t * Math.PI) * 0.06; // peaks in middle of band
            pg.lineStyle(2, 0x4466cc, a);
            pg.lineBetween(0, lineY, W, lineY);
        }
        // Extra bright hairline at peak
        pg.lineStyle(1, 0x88aaff, 0.09);
        pg.lineBetween(0, scene._pulseY + bandH * 0.5, W, scene._pulseY + bandH * 0.5);
    }

    // TITLE SCENE — entry point: 1P vs 2P, Leaderboard
    // ============================================================
    class TitleScene extends Phaser.Scene {
        constructor() { super({ key: 'TitleScene' }); }
        create() {
            document.querySelector('.controls-bar').style.display = 'none';
            document.querySelector('.debug-toggle').style.display = 'none';
            this.cameras.main.setBackgroundColor(0x0a0a14);
            createMenuBG(this);
            this._sel = 0; // 0=1P, 1=2P, 2=Leaderboard
            this._lbOpen = false;
            this._lbSortCol = 'wins'; // current sort column
            this._buildTitle();
            this._buildMenu();
            this._buildLeaderboard();
            // Glint on title bar
            this._glintGfx = this.add.graphics().setDepth(3);
            this._glintT = -1;
            this._glintCooldown = 200;
            this.input.keyboard.on('keydown', (e) => {
                if (this._lbOpen) { this._handleLBKey(e); return; }
                if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                    this._sel = (this._sel - 1 + 3) % 3;
                } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                    this._sel = (this._sel + 1) % 3;
                } else if (e.key === 'Enter' || e.key === ' ') {
                    this._choose();
                }
                this._refreshMenu();
            });
        }
        update() {
            updateMenuBG(this);
            // Title bar glint sweep
            this._glintGfx.clear();
            if (this._glintT < 0) {
                this._glintCooldown--;
                if (this._glintCooldown <= 0) {
                    this._glintT = 0;
                    this._glintCooldown = 660 + Math.floor(Math.random() * 420);
                }
            } else {
                this._glintT += 1 / 60;
                if (this._glintT >= 1) this._glintT = -1;
            }
            if (this._glintT >= 0) {
                // Title bar rect: x=112, y=55, w=800, h=90
                const L = 112, T = 55, bw = 800, bh = 90, R = L + bw, B = T + bh;
                const sw = 60, skew = bh * 0.35;
                const cx = (L - sw/2) + this._glintT * (bw + sw);
                const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
                const txL = clamp(cx - sw/2, L, R);
                const txR = clamp(cx + sw/2, L, R);
                const bxL = clamp(cx - sw/2 - skew, L, R);
                const bxR = clamp(cx + sw/2 - skew, L, R);
                if (txR > txL || bxR > bxL) {
                    this._glintGfx.fillStyle(0xffffff, 0.06);
                    this._glintGfx.fillTriangle(txL, T, txR, T, bxR, B);
                    this._glintGfx.fillTriangle(txL, T, bxR, B, bxL, B);
                    const leX1 = clamp(cx + sw/2, L, R);
                    const leX2 = clamp(cx + sw/2 - skew, L, R);
                    this._glintGfx.lineStyle(1, 0xffffff, 0.28);
                    this._glintGfx.lineBetween(leX1, T, leX2, B);
                }
            }
        }

        _doLBImport() {
            if (!this._lbImTA) return;
            const raw = this._lbImTA.value.trim();
            if (!raw) { if (this._lbImStatusTxt) this._lbImStatusTxt.setText('Nothing pasted!').setColor('#ff6644'); return; }
            let parsed;
            try { parsed = JSON.parse(raw); } catch(e) {
                if (this._lbImStatusTxt) this._lbImStatusTxt.setText('Invalid JSON — check your paste').setColor('#ff4444');
                return;
            }
            if (!Array.isArray(parsed)) { if (this._lbImStatusTxt) this._lbImStatusTxt.setText('Expected an array of profiles').setColor('#ff4444'); return; }
            let added = 0, updated = 0;
            parsed.forEach(incoming => {
                if (!incoming.name) return;
                if (!incoming.chars) incoming.chars = {};
                CHAR_KEYS.forEach(k => { if (!incoming.chars[k]) incoming.chars[k] = { played: 0, wins: 0, losses: 0 }; });
                const existing = PROFILES.data.find(p => p.name === incoming.name);
                if (existing) { Object.assign(existing, incoming); updated++; }
                else { PROFILES.data.push(incoming); added++; }
            });
            PROFILES.save();
            const msg = `✓ Imported! ${added} added, ${updated} updated`;
            if (this._lbImStatusTxt) this._lbImStatusTxt.setText(msg).setColor('#44ff88');
            setTimeout(() => { this._hideLBImportModal(); this._renderLeaderboard(); }, 1600);
        }

            if (this._lbImBtn) { this._lbImBtn.remove(); this._lbImBtn = null; }
            if (this._lbImEscListener) { document.removeEventListener('keydown', this._lbImEscListener); this._lbImEscListener = null; }
            this._lbImStatusTxt = null;
        }

        _openLeaderboard() {
