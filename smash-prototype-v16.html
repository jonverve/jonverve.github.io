                    if (!cursors.left.isDown && !cursors.right.isDown) this.setState(S.IDLE);
                    if (!this.isGrounded) { this.setState(S.AIRBORNE); this.jumpsRemaining = Math.max(0, this.jumpsRemaining - 1); }
                    break;
                case S.JUMP_SQUAT:
                    if (this.stateTimer >= 3) {
                        this.body.setVelocityY(this.jumpForce);
                        this.fastFalling = false; this.setState(S.AIRBORNE);
                    }
                    break;
                case S.AIRBORNE:
                    this.handleAirMovement(cursors); this.handleAirJump(cursors);
                    this.handleAttackInput(cursors); this.handleFastFall(cursors);
                    this.hitboxActive = false;
                    // ---- AIRDODGE ----
                    // Triggered by pressing the shield key (down) while airborne + direction held.
                    // Neutral airdodge (no direction) goes straight up.
                    if (this.inputBuffer.consume('airdodge') && this.airdodgeCooldown === 0) {
                        const dx = cursors.right.isDown ? 1 : cursors.left.isDown ? -1 : 0;
                        const dy = cursors.down.isDown  ? 1 : cursors.up.isDown   ? -1 : 0;
                        const spd = FIGHTER_CONFIG.airdodgeSpeed;
                        // Normalise diagonal so total speed is always airdodgeSpeed
                        const mag = Math.sqrt(dx*dx + dy*dy) || 1;
                        this.airdodgeVx = (dx / mag) * spd;
                        this.airdodgeVy = (dy === 0 && dx === 0) ? -spd * 0.6 : (dy / mag) * spd;
                        this.airdodgeCooldown = FIGHTER_CONFIG.airdodgeCooldown;
                        this.setState(S.AIRDODGE);
                        break;
                    }
                    // Osprey float: holding UP in air suspends gravity temporarily
                    if (this.charKey === 'osprey' && cursors.up.isDown && !this.isGrounded &&
                        this.floatTimer < this.maxFloatFrames && this.body.velocity.y > -100) {
                        this.body.setVelocityY(this.body.velocity.y * 0.82); // drag upward
                        this.body.setGravityY(0); // suspend gravity while held
                        this.floatTimer++;
                        this.scene.spawnParticles(this.sprite.x, this.sprite.y + 18, 0x88eeff, 1);
                    } else if (this.charKey === 'osprey') {
                        this.body.setGravityY(FIGHTER_CONFIG.gravity);
                    }
                    // Try ledge grab
                    this.tryLedgeGrab();
                    if (this.isGrounded) {
                        this.jumpsRemaining = FIGHTER_CONFIG.maxJumps; this.fastFalling = false;
                        this.hasUsedFly = false;
                        if (this.charKey === 'osprey') this.floatTimer = 0; // reset float on land
                        this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed); this.setState(S.IDLE);
                    }
                    break;
                case S.ATTACK:
                    this.updateAttack(cursors);
                    if (this.isGrounded) {
                        // Kill horizontal momentum quickly when attacking on the ground
                        this.body.velocity.x *= 0.776;
                        if (Math.abs(this.body.velocity.x) < 5) this.body.setVelocityX(0);
                    } else {
                        if (cursors.left.isDown) this.body.velocity.x -= 6;
                        if (cursors.right.isDown) this.body.velocity.x += 6;
                    }
                    // Osprey dive plunge: end attack immediately on landing
                    if (this.currentAttack && this.currentAttack._divePlunge && this.isGrounded) {
                        this.hitboxActive = false;
                        this.currentAttack = null;
                        this.setState(S.IDLE);
                    }
                    break;

                // ---- AIRDODGE ----
                case S.AIRDODGE: {
                    this.hitboxActive = false;
                    // Apply burst velocity on first frame
                    if (this.stateTimer === 1) {
                        this.body.setVelocity(this.airdodgeVx, this.airdodgeVy);
                        this.body.setGravityY(0); // Suppress gravity during dodge
                    }
                    // Invincible during active frames, then helpless lag at end
                    const inInvincible = this.stateTimer <= FIGHTER_CONFIG.airdodgeDuration;
                    const inLag = this.stateTimer > FIGHTER_CONFIG.airdodgeDuration &&
                                  this.stateTimer <= FIGHTER_CONFIG.airdodgeDuration + 14;
                    if (inInvincible) {
                        this.invincible = 2; // Keep refreshing invincibility
                        // Bleed velocity smoothly — decelerates to ~0 at end of active frames
                        this.body.velocity.x *= 0.84;
                        this.body.velocity.y *= 0.84;
                    }
                    if (!inInvincible) {
                        // Re-enable gravity once dodge is done
                        this.body.setGravityY(FIGHTER_CONFIG.gravity);
                    }
                    if (this.isGrounded) {
                        // Landing cancels airdodge
                        this.body.setGravityY(FIGHTER_CONFIG.gravity);
                        this.jumpsRemaining = FIGHTER_CONFIG.maxJumps;
                        this.airdodgeCooldown = 0; // Landing resets the dodge
                        this.setState(S.IDLE);
                        break;
                    }
                    if (!inInvincible && !inLag) {
                        // End of lag — back to airborne (still can't dodge again until landing)
                        this.setState(S.AIRBORNE);
                    }
                    break;
                }

                // ---- LEDGE HANG ----
                case S.LEDGE_HANG:
                    // Body is disabled — fighter stays put at the position set in tryLedgeGrab
                    this.hitboxActive = false;
                    // Keep body position synced to sprite for debug renderer
                    this.body.x = this.sprite.x - FIGHTER_CONFIG.width / 2;
                    this.body.y = this.sprite.y - FIGHTER_CONFIG.height / 2;

                    // Actions from ledge
                    if (this.inputBuffer.consume('jump')) {
                        // Ledge jump
                        this.releaseLedge();
                        this.body.setVelocityY(FIGHTER_CONFIG.jumpForce * 0.8);
                        this.jumpsRemaining = FIGHTER_CONFIG.maxJumps - 1;
                        this.invincible = 8;
                        this.setState(S.AIRBORNE);
                    } else if (this.inputBuffer.consume('attack') || this.inputBuffer.consume('strong')) {
                        // Ledge getup attack
                        const climbDir = this.currentLedge.side === 'left' ? 1 : -1;
                        const upX = this.currentLedge.x + climbDir * 30;
                        const upY = this.currentLedge.y - 30;
                        this.releaseLedge();
                        this.sprite.setPosition(upX, upY);
                        this.body.reset(upX - FIGHTER_CONFIG.width/2, upY - FIGHTER_CONFIG.height/2);
                        this.startAttack(this.charData.jab);
                    } else if (cursors.down.isDown) {
                        // Drop from ledge
                        this.releaseLedge();
                        this.setState(S.AIRBORNE);
                    } else if (cursors.left.isDown || cursors.right.isDown) {
                        // Only climb if pressing INWARD (toward stage)
                        const inward = this.currentLedge.side === 'left' ? cursors.right.isDown : cursors.left.isDown;
                        if (inward) {
                            // Climb onto stage — just barely on the edge
                            // Position body so fighter edge is 1px inside platform edge
                            const side = this.currentLedge.side;
                            const ledgeX = this.currentLedge.x;
                            const ledgeY = this.currentLedge.y;
                            // body.reset on origin-0.5 sprite takes CENTER coords, not top-left
                            let bodyX, bodyY;
                            bodyY = ledgeY - FIGHTER_CONFIG.height / 2 - 1;
                            if (side === 'left') {
                                // Left ledge: half hanging off left edge
                                bodyX = ledgeX + FIGHTER_CONFIG.width / 2 - 20;
                            } else {
                                // Right ledge: half hanging off right edge
                                bodyX = ledgeX - FIGHTER_CONFIG.width / 2 + 20;
                            }
                            this.releaseLedge();
                            this.body.reset(bodyX, bodyY);
                            this.body.setVelocity(0, 0);
                            this.invincible = 15;
                            this.jumpsRemaining = FIGHTER_CONFIG.maxJumps;
                            this.setState(S.LEDGE_GETUP);
                        } else {
                            // Pressing outward — drop from ledge
                            this.releaseLedge();
                            this.setState(S.AIRBORNE);
                        }
                    }
                    // Auto-drop after max hang time
                    if (this.state === S.LEDGE_HANG && this.stateTimer >= FIGHTER_CONFIG.ledgeHangMax) {
                        this.releaseLedge();
                        this.setState(S.AIRBORNE);
                    }
                    break;

                case S.LEDGE_GETUP:
                    // Brief getup animation — no movement, velocity locked to 0
                    this.body.setVelocity(0, 0);
                    this.hitboxActive = false;
                    if (this.stateTimer >= 12) {
                        this.setState(S.IDLE);
                    }
                    break;

                case S.SHIELD:
                    this.body.setVelocityX(0); this.shielding = true;
                    this.shieldHP -= FIGHTER_CONFIG.shieldDecayRate; this.hitboxActive = false;
                    const pct = this.shieldHP / FIGHTER_CONFIG.shieldMaxHP;
                    this.shieldGfx.setVisible(true); this.shieldGfx.setScale(0.5 + pct * 0.5);
                    this.shieldGfx.setAlpha(0.15 + pct * 0.2);
                    if (this.shieldHP <= 0) {
                        this.shieldHP = 0; this.shieldGfx.setVisible(false);
                        this.setState(S.SHIELDBREAK);
                        this.scene.cameras.main.shake(150, 0.015);
                        this.scene.spawnParticles(this.sprite.x, this.sprite.y, COLORS.shield, 10);
                        break;
                    }
                    if (!cursors.down.isDown || !this.isGrounded) this.setState(S.IDLE);
                    break;
                case S.SHIELDSTUN:
                    this.shieldGfx.setVisible(true); this.shieldGfx.setAlpha(0.3); this.hitboxActive = false;
                    if (this.stateTimer >= FIGHTER_CONFIG.shieldStunOnHit) {
                        if (cursors.down.isDown && this.isGrounded) this.setState(S.SHIELD);
                        else this.setState(S.IDLE);
                    }
                    break;
                case S.SHIELDBREAK:
                    this.hitboxActive = false; this.shieldGfx.setVisible(false);
                    this.sprite.setFillStyle(this.stateTimer % 6 < 3 ? 0x888888 : this.color);
                    if (this.stateTimer >= FIGHTER_CONFIG.shieldBreakStun) {
                        this.shieldHP = FIGHTER_CONFIG.shieldMaxHP * 0.3; this.setState(S.IDLE);
                    }
                    break;
                case S.HITSTUN:
                case S.LAUNCHED:
                    if (this.state === S.LAUNCHED) {
                        this.body.velocity.x *= FIGHTER_CONFIG.knockbackDecay;
                        this.body.velocity.y *= FIGHTER_CONFIG.knockbackDecay;
                        if (cursors.left.isDown) this.body.velocity.x -= 5;
                        if (cursors.right.isDown) this.body.velocity.x += 5;
                    }
                    // Lasso pull: brake when reaching the cowboy
                    if (this.state === S.HITSTUN && this.lassoPullTarget) {
                        const tx = this.lassoPullTarget.x;
                        const dx = tx - this.sprite.x;
                        const dist = Math.abs(dx);
                        if (dist < 45) {
                            // Close enough — stop and park next to cowboy
                            this.body.setVelocityX(0);
                            this.body.setVelocityY(Math.min(this.body.velocity.y, 50));
                            this.lassoPullTarget = null;
                        } else {
                            // Still pulling — steer toward target, decelerate as we approach
                            const dir = dx > 0 ? 1 : -1;
                            const speed = Math.min(this.lassoPullSpeed, dist * 8);
                            this.body.setVelocityX(dir * speed);
                        }
                    }
                    this.hitboxActive = false;
                    if (this.stateTimer >= this.hitstunDuration) {
                        this.comboCount = 0; this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed);
                        this.setState(this.isGrounded ? S.IDLE : S.AIRBORNE);
                    }
                    this.sprite.setFillStyle(this.stateTimer % 4 < 2 ? 0xffffff : this.color);
                    break;

                // ---- SCREEN SPLAT ----
                case S.SCREEN_SPLAT:
                    this.hitboxActive = false;
                    this.body.setVelocity(0, 0); this.body.setGravityY(0);
                    this.body.enable = false;
                    this.sprite.setVisible(false); this.faceIndicator.setVisible(false);

                    if (this.stateTimer === 1) {
                        this.createSplatEffect();
                    }
                    // 2.5x slower: stick for 100 frames, then slide for 100 frames
                    if (this.stateTimer > 100 && this.stateTimer <= 200) {
                        if (this.splatGfx) {
                            const t = (this.stateTimer - 100) / 100; // 0 to 1
                            this.splatGfx.y += 2;
                            this.splatGfx.setAlpha(Math.max(0, 1 - t));
                            this.splatGfx.setScale(1, 1 + t * 1.2);
                        }
                        // Also fade out extra splat elements
                        if (this.splatExtras) {
                            this.splatExtras.forEach(e => {
                                if (e && e.active) e.setAlpha(Math.max(0, 1 - (this.stateTimer - 100) / 80));
                            });
                        }
                    }
                    if (this.stateTimer > 200) {
                        this.cleanupSplat();
                        this.body.setGravityY(FIGHTER_CONFIG.gravity);
                        this.onKO();
                    }
                    break;

                // ---- FROZEN ----
                case S.FROZEN:
                    this.hitboxActive = false;
                    this.body.setVelocityX(0);
                    // Icy visual: tint blue, flicker
                    this.sprite.setFillStyle(this.stateTimer % 8 < 5 ? 0x88ccee : 0xaaeeff);
                    // Button mashing reduces freeze time
                    if (this.inputBuffer.consume('attack') ||
                        this.inputBuffer.consume('strong') ||
                        this.inputBuffer.consume('move3') ||
                        this.inputBuffer.consume('jump')) {
                        this.freezeMashCount += 8;
                        this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0xccffff, 1);
                    }
                    if (this.stateTimer + this.freezeMashCount >= this.freezeDuration) {
                        // Break free
                        this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0xffffff, 6);
                        this.setState(this.isGrounded ? S.IDLE : S.AIRBORNE);
                    }
                    break;

                case S.DEAD:
                    this.hitboxActive = false; this.shieldGfx.setVisible(false);
                    if (this.stateTimer > 60) this.respawn();
                    break;
            }

            if (this.state !== S.HITSTUN && this.state !== S.LAUNCHED &&
                this.state !== S.SHIELDBREAK && this.state !== S.SCREEN_SPLAT && this.state !== S.FROZEN &&
                this.state !== S.AIRDODGE) {
                this.sprite.setFillStyle(this.color);
            }
            // Airdodge visuals: ghost white flash during invincible frames, dim during lag
            if (this.state === S.AIRDODGE) {
                const invFrames = FIGHTER_CONFIG.airdodgeDuration;
                if (this.stateTimer <= invFrames) {
                    // Rapid white/color flicker to signal invincibility
                    this.sprite.setFillStyle(this.stateTimer % 3 < 2 ? 0xffffff : this.color);
                    // Spawn afterimage ghost particle trail
                    if (this.stateTimer % 3 === 0) {
                        this.scene.spawnParticles(this.sprite.x, this.sprite.y, 0xffffff, 2);
                    }
                } else {
                    // Lag phase: dim tint
                    this.sprite.setFillStyle(0x888888);
                }
            }

            // Update stick figure limb poses based on state
            this.updateLimbs();
        }

        // Sets limb angles based on current state. Each angle is in radians.
        // Convention: 0 = straight down, positive = forward (toward facing direction)
        // These hooks are ready for per-frame animation (walk cycles, attack swings, etc.)
        updateLimbs() {
            const L = this.limbs;
            const t = this.stateTimer;
            const f = this.facing;
            const isSwordsman = this.charKey === 'swordsman';

            // Reset to neutral
            L.armFrontUpper = -0.3; L.armBackUpper = 0.3;
            L.armFrontLower = 0;    L.armBackLower = 0;
            L.legFrontUpper = 0;    L.legBackUpper = 0;
            L.legFrontLower = 0;    L.legBackLower = 0;
            L.headTilt = 0;         L.torsoLean = 0;
            L.swordVisible = isSwordsman;
            L.swordAngle = -((-0.3) + Math.PI / 2);    // Default: sword angled slightly down-forward
            L.swordLength = isSwordsman ? 30 : 0;

            switch (this.state) {
                case S.IDLE:
                    if (isSwordsman) {
                        // Ready stance: sword held forward-low, back hand on hip
                        L.armFrontUpper = 0.4 + Math.sin(t * 0.04) * 0.03;
                        L.armFrontLower = -0.5;
                        L.armBackUpper = 0.6;
                        L.armBackLower = 0.4;
                        L.swordAngle = -((-0.2 + Math.sin(t * 0.04) * 0.05) + Math.PI / 2);
                        L.swordLength = 32;
                        L.legFrontUpper = 0.22; L.legBackUpper = -0.22;
                        L.legFrontLower = 0.08; L.legBackLower = 0.08;
                    } else if (this.charKey === 'brute') {
                        // Hunched, menacing stance — fists low, weight forward
                        L.armFrontUpper = 0.6 + Math.sin(t * 0.03) * 0.04;
                        L.armFrontLower = 0.5;
                        L.armBackUpper = 0.4 + Math.sin(t * 0.03 + 1) * 0.04;
                        L.armBackLower = 0.4;
                        L.torsoLean = 0.15 + Math.sin(t * 0.03) * 0.02;
                        L.legFrontUpper = 0.3; L.legBackUpper = -0.3;
                        L.legFrontLower = 0.15; L.legBackLower = 0.15;
                    } else if (this.charKey === 'osprey') {
                        // Wings half-spread, perched ready to launch
                        L.armFrontUpper = -0.8 + Math.sin(t * 0.06) * 0.12;
                        L.armFrontLower = 0.3;
                        L.armBackUpper = -0.6 + Math.sin(t * 0.06 + 1) * 0.12;
                        L.armBackLower = 0.2;
                        L.legFrontUpper = 0.3; L.legBackUpper = -0.2;
                        L.legFrontLower = 0.3; L.legBackLower = 0.2;
                        L.headTilt = Math.sin(t * 0.04) * 0.08;
                    } else {
                        L.armFrontUpper = -0.2 + Math.sin(t * 0.05) * 0.05;
                        L.armBackUpper = 0.2 + Math.sin(t * 0.05 + 1) * 0.05;
                        // Feet visibly apart in idle stance
                        L.legFrontUpper = 0.22; L.legBackUpper = -0.22;
                        L.legFrontLower = 0.08; L.legBackLower = 0.08;
                    }
                    break;

                case S.RUN: {
                    const cycle = Math.sin(t * 0.25);
                    const halfCycle = Math.sin(t * 0.25 + Math.PI);
                    L.legFrontUpper = 0.7 * cycle;
                    L.legBackUpper = 0.7 * halfCycle;
                    L.legFrontLower = Math.max(0, -cycle) * 0.6;
                    L.legBackLower = Math.max(0, cycle) * 0.6;
                    L.torsoLean = 0.15;
                    if (isSwordsman) {
                        // Sword trails behind while running
                        L.armFrontUpper = -0.3 + cycle * 0.2;
                        L.armFrontLower = -0.4;
                        L.armBackUpper = 0.8 * cycle;
                        L.armBackLower = -0.3;
                        L.swordAngle = -((-1.0 + cycle * 0.15) + Math.PI / 2); // Sword angled back
                        L.swordLength = 32;
                    } else {
                        L.armFrontUpper = -0.8 * cycle;
                        L.armBackUpper = 0.8 * cycle;
                        L.armFrontLower = -0.3;
                        L.armBackLower = -0.3;
                    }
                    break;
                }

                case S.JUMP_SQUAT:
                    L.legFrontUpper = 0.4; L.legBackUpper = -0.4;
                    L.legFrontLower = 0.5; L.legBackLower = 0.5;
                    L.torsoLean = 0.1;
                    L.armFrontUpper = -0.5; L.armBackUpper = 0.5;
                    if (isSwordsman) { L.swordAngle = -((-0.8) + Math.PI / 2); L.swordLength = 30; }
                    break;

                case S.AIRBORNE:
                    L.legFrontUpper = 0.2; L.legBackUpper = -0.2;
                    L.legFrontLower = 0.3; L.legBackLower = 0.3;
                    if (isSwordsman) {
                        // Sword held ready in the air
                        L.armFrontUpper = -0.6; L.armFrontLower = -0.4;
                        L.armBackUpper = -0.8; L.armBackLower = -0.2;
                        L.swordAngle = -((-0.5) + Math.PI / 2); L.swordLength = 32;
                    } else if (this.charKey === 'osprey') {
                        // OSPREY dominates the air — wings fully spread, talons ready
                        const glide = Math.sin(t * 0.07) * 0.15;
                        L.armFrontUpper = -2.0 + glide; L.armFrontLower = 0.1;
                        L.armBackUpper = -1.8 + glide; L.armBackLower = 0.1;
                        L.legFrontUpper = 0.4; L.legBackUpper = -0.1;
                        L.legFrontLower = 0.5; L.legBackLower = 0.2;
                    } else {
                        L.armFrontUpper = -1.2; L.armBackUpper = -1.0;
                        L.armFrontLower = -0.4; L.armBackLower = -0.3;
                    }
                    if (this.fastFalling) {
                        L.armFrontUpper = 0.5; L.armBackUpper = 0.5;
                        L.legFrontUpper = 0; L.legBackUpper = 0;
                        L.legFrontLower = 0; L.legBackLower = 0;
                        if (isSwordsman) { L.swordAngle = -((0.3) + Math.PI / 2); }
                    }
                    break;

                case S.ATTACK: {
                    const atk = this.currentAttack;
                    if (!atk) break;
                    const startup = atk.startup;
                    const active = atk.active;
                    const recovery = atk.recovery;
                    const frame = this.attackFrame;
                    const inStartup = frame <= startup;
                    const inActive = frame > startup && frame <= startup + active;
                    const inRecovery = frame > startup + active;
                    const sp = inStartup ? frame / startup : 1;
                    const ap = inActive ? (frame - startup) / active : 0;
                    const rp = inRecovery ? (frame - startup - active) / recovery : 0;

                    if (isSwordsman && atk.name) {
                        this.updateSwordsmanAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else if (this.charKey === 'bowman' && atk.name) {
                        this.updateBowmanAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else if (this.charKey === 'wizard' && atk.name) {
                        this.updateWizardAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else if (this.charKey === 'cowboy' && atk.name) {
                        this.updateCowboyAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else if (this.charKey === 'superguy' && atk.name) {
                        this.updateSuperguyAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else if (this.charKey === 'brute' && atk.name) {
                        this.updateBruteAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else if (this.charKey === 'osprey' && atk.name) {
                        this.updateOspreyAttack(atk.name, L, sp, ap, rp, inStartup, inActive, inRecovery, t);
                    } else {
                        // Generic attack for non-swordsman
                        if (inStartup) {
                            L.armFrontUpper = -2.0; L.armFrontLower = -0.8; L.torsoLean = -0.2;
                        } else if (inActive) {
                            L.armFrontUpper = 1.5; L.armFrontLower = 0.3; L.torsoLean = 0.3;
                        } else {
                            L.armFrontUpper = 0.5; L.armFrontLower = 0; L.torsoLean = 0.1;
                        }
                    }
                    break;
                }

                case S.HITSTUN:
                case S.LAUNCHED:
                    L.armFrontUpper = -1.5 + Math.sin(t * 0.4) * 0.3;
                    L.armBackUpper = -1.2 + Math.sin(t * 0.4 + 1) * 0.3;
                    L.armFrontLower = -0.5; L.armBackLower = -0.5;
                    L.legFrontUpper = 0.5; L.legBackUpper = -0.3;
                    L.legFrontLower = 0.4; L.legBackLower = 0.4;
                    L.torsoLean = -0.3;
                    L.headTilt = Math.sin(t * 0.3) * 0.2;
                    if (isSwordsman) { L.swordAngle = -((-1.5 + Math.sin(t * 0.5) * 0.5) + Math.PI / 2); L.swordLength = 28; }
                    break;

                case S.SHIELD:
                case S.SHIELDSTUN:
                    L.armFrontUpper = -1.5; L.armBackUpper = -1.3;
                    L.armFrontLower = -1.0; L.armBackLower = -0.8;
                    L.legFrontUpper = 0.2; L.legBackUpper = -0.2;
                    L.torsoLean = -0.1;
                    if (isSwordsman) { L.swordAngle = -((-2.0) + Math.PI / 2); L.swordLength = 28; }
                    break;

                case S.SHIELDBREAK:
                    L.armFrontUpper = 0.3 + Math.sin(t * 0.15) * 0.5;
                    L.armBackUpper = -0.3 + Math.sin(t * 0.15 + 2) * 0.5;
                    L.headTilt = Math.sin(t * 0.1) * 0.3;
                    L.torsoLean = Math.sin(t * 0.08) * 0.15;
                    if (isSwordsman) { L.swordAngle = -((1.5) + Math.PI / 2); L.swordLength = 30; } // Sword drooping
                    break;

                case S.LEDGE_HANG:
                    L.armFrontUpper = -2.8; L.armBackUpper = -2.5;
                    L.armFrontLower = 0; L.armBackLower = 0;
                    L.legFrontUpper = 0.1 + Math.sin(t * 0.08) * 0.1;
                    L.legBackUpper = -0.1 + Math.sin(t * 0.08 + 1) * 0.1;
                    if (isSwordsman) { L.swordVisible = false; } // Can't see sword while hanging
                    break;

                case S.LEDGE_GETUP:
                    L.armFrontUpper = -1.5; L.armBackUpper = -1.0;
                    L.legFrontUpper = 0.8; L.legBackUpper = 0.4;
                    L.legFrontLower = 0.6; L.legBackLower = 0.3;
                    L.torsoLean = 0.3;
                    if (isSwordsman) { L.swordAngle = -((-1.0) + Math.PI / 2); L.swordLength = 28; }
                    break;

                case S.FROZEN:
                    L.armFrontUpper = -0.8; L.armBackUpper = 0.5;
                    L.armFrontLower = -0.2; L.armBackLower = 0.1;
                    L.legFrontUpper = 0.15; L.legBackUpper = -0.15;
                    if (isSwordsman) { L.swordAngle = -((-0.5) + Math.PI / 2); L.swordLength = 30; }
                    break;
            }
        }

        // Swordsman-specific per-attack animations
        // sp/ap/rp = progress (0-1) within startup/active/recovery phases
        updateSwordsmanAttack(name, L, sp, ap, rp, inStartup, inActive, inRecovery, t) {
            L.swordVisible = true;

            switch (name) {
                case 'Slash': // Jab: quick horizontal slash forward
                    L.swordLength = 36;
                    if (inStartup) {
                        // Quick pull back
                        L.armFrontUpper = -1.2 * sp; L.armFrontLower = -0.6 * sp;
                        L.torsoLean = -0.1 * sp;
                        L.swordAngle = -((-1.5 * sp) + Math.PI / 2);
                    } else if (inActive) {
                        // Swing forward horizontally
                        L.armFrontUpper = -1.2 + 2.8 * ap;
                        L.armFrontLower = -0.6 + 0.8 * ap;
                        L.torsoLean = -0.1 + 0.4 * ap;
                        L.swordAngle = -((-1.5 + 2.0 * ap) + Math.PI / 2); // Sweeps from back to front
                        L.legFrontUpper = 0.2; L.legBackUpper = -0.1;
                    } else {
                        // Return
                        L.armFrontUpper = 1.6 - 1.2 * rp; L.armFrontLower = 0.2 - 0.2 * rp;
                        L.torsoLean = 0.3 - 0.3 * rp;
                        L.swordAngle = -((0.5 - 0.7 * rp) + Math.PI / 2);
                    }
                    break;

                case 'Heavy Slash': // Strong: big overhead two-handed cleave
                    L.swordLength = 42;
                    if (inStartup) {
                        // Slow wind-up: raise sword overhead, both arms up
                        L.armFrontUpper = -0.5 - 2.0 * sp;
                        L.armFrontLower = -0.3 - 0.8 * sp;
                        L.armBackUpper = -0.5 - 1.8 * sp; // Back arm follows (two-handed)
                        L.armBackLower = -0.3 - 0.6 * sp;
                        L.torsoLean = -0.2 * sp;
                        L.swordAngle = -((-2.5 * sp) + Math.PI / 2); // Sword goes way overhead/behind
                        L.legFrontUpper = -0.1; L.legBackUpper = 0.1;
                    } else if (inActive) {
                        // Massive downward swing
                        L.armFrontUpper = -2.5 + 4.0 * ap;
                        L.armFrontLower = -1.1 + 1.5 * ap;
                        L.armBackUpper = -2.3 + 3.5 * ap;
                        L.armBackLower = -0.9 + 1.2 * ap;
                        L.torsoLean = -0.2 + 0.6 * ap;
                        L.swordAngle = -((-2.5 + 3.5 * ap) + Math.PI / 2); // Sweeps from overhead to forward-down
                        L.legFrontUpper = 0.3 * ap; L.legBackUpper = -0.2;
                    } else {
                        // Heavy recovery — stuck in follow-through
                        L.armFrontUpper = 1.5 - 0.5 * rp; L.armFrontLower = 0.4;
                        L.armBackUpper = 1.2 - 0.4 * rp; L.armBackLower = 0.3;
                        L.torsoLean = 0.4 - 0.3 * rp;
                        L.swordAngle = -((1.0 - 0.5 * rp) + Math.PI / 2);
                    }
                    break;

                case 'Spin Attack': // Move3: 360 spin with sword extended
                    L.swordLength = 45;
                    if (inStartup) {
                        // Crouch and coil
                        L.armFrontUpper = -0.5; L.armFrontLower = -0.3;
                        L.legFrontUpper = 0.3; L.legBackUpper = -0.3;
                        L.legFrontLower = 0.4; L.legBackLower = 0.4;
                        L.torsoLean = -0.1;
                        L.swordAngle = -((-1.0) + Math.PI / 2);
                    } else if (inActive) {
                        // Spin! Sword sweeps full circle
                        const spinAngle = ap * Math.PI * 3; // 1.5 full rotations
                        L.armFrontUpper = -0.5 + Math.sin(spinAngle) * 1.5;
                        L.armFrontLower = Math.cos(spinAngle) * 0.5;
                        L.swordAngle = -((spinAngle * 0.8) + Math.PI / 2);
                        L.torsoLean = Math.sin(spinAngle) * 0.2;
                        L.headTilt = Math.sin(spinAngle * 0.5) * 0.1;
                        L.armBackUpper = -L.armFrontUpper * 0.5;
                    } else {
                        // Dizzy stop
                        L.armFrontUpper = 0.3; L.armFrontLower = 0;
                        L.torsoLean = 0.1 * (1 - rp);
                        L.swordAngle = -((0.3) + Math.PI / 2);
                    }
                    break;

                case 'Air Slash': // Air jab: quick aerial forward slash
                    L.swordLength = 36;
                    if (inStartup) {
                        L.armFrontUpper = -1.5 * sp; L.armFrontLower = -0.4;
                        L.swordAngle = -((-1.8 * sp) + Math.PI / 2);
                        L.legFrontUpper = 0.3; L.legBackUpper = -0.2;
                    } else if (inActive) {
                        // Fast forward arc
                        L.armFrontUpper = -1.5 + 3.0 * ap;
                        L.armFrontLower = -0.4 + 0.6 * ap;
                        L.swordAngle = -((-1.8 + 2.5 * ap) + Math.PI / 2);
                        L.legFrontUpper = 0.3; L.legBackUpper = -0.3;
                        L.legFrontLower = 0.2;
                    } else {
                        L.armFrontUpper = 1.5 - 1.0 * rp; L.armFrontLower = 0.2;
                        L.swordAngle = -((0.7 - 0.5 * rp) + Math.PI / 2);
                    }
                    break;

                case 'Downward Cleave': // Air strong: slam sword downward
                    L.swordLength = 40;
                    if (inStartup) {
                        // Raise overhead
                        L.armFrontUpper = -2.5 * sp; L.armFrontLower = -0.5 * sp;
                        L.armBackUpper = -2.0 * sp; L.armBackLower = -0.3 * sp;
                        L.swordAngle = -((-2.8 * sp) + Math.PI / 2);
                        L.torsoLean = -0.15 * sp;
                    } else if (inActive) {
                        // Slam straight down
                        L.armFrontUpper = -2.5 + 3.5 * ap;
                        L.armFrontLower = -0.5 + 1.0 * ap;
                        L.armBackUpper = -2.0 + 2.0 * ap;
                        L.swordAngle = -((-2.8 + 4.5 * ap) + Math.PI / 2); // Goes past vertical to below
                        L.torsoLean = 0.3 * ap;
                        L.legFrontUpper = -0.3 * ap; L.legBackUpper = 0.3 * ap;
                    } else {
                        L.armFrontUpper = 1.0 - 0.8 * rp;
                        L.swordAngle = -((1.7 - 1.0 * rp) + Math.PI / 2);
                        L.torsoLean = 0.3 - 0.3 * rp;
                    }
                    break;

                case 'Rising Slash': // Air move3: upward diagonal slash
                    L.swordLength = 38;
                    if (inStartup) {
                        // Coil down
                        L.armFrontUpper = 0.5 * sp; L.armFrontLower = 0.3 * sp;
                        L.swordAngle = -((1.0 * sp) + Math.PI / 2); // Sword low
                        L.torsoLean = 0.2 * sp;
                    } else if (inActive) {
                        // Slash upward diagonal
                        L.armFrontUpper = 0.5 - 3.5 * ap;
                        L.armFrontLower = 0.3 - 1.0 * ap;
                        L.swordAngle = -((1.0 - 3.5 * ap) + Math.PI / 2); // Sweeps from low to high
                        L.torsoLean = 0.2 - 0.4 * ap;
                        L.legFrontUpper = 0.3 * ap;
                    } else {
                        L.armFrontUpper = -3.0 + 2.5 * rp;
                        L.swordAngle = -((-2.5 + 2.0 * rp) + Math.PI / 2);
                        L.torsoLean = -0.2 + 0.2 * rp;
                    }
                    break;

                case 'Blade Storm': // Move4 ultimate: massive multi-directional slashes
                    L.swordLength = 50;
                    if (inStartup) {
                        // Power up — sword raised, body tenses
                        L.armFrontUpper = -2.0 * sp; L.armFrontLower = -0.5;
                        L.armBackUpper = -1.5 * sp; L.armBackLower = -0.3;
                        L.swordAngle = -((-2.5 * sp) + Math.PI / 2);
                        L.legFrontUpper = 0.2; L.legBackUpper = -0.2;
                        L.torsoLean = -0.1;
                    } else if (inActive) {
                        // Frenzy of slashes — rapid spinning sword
                        const fury = ap * Math.PI * 6; // 3 full rotations during active
                        L.armFrontUpper = Math.sin(fury) * 2.0;
                        L.armFrontLower = Math.cos(fury) * 0.8;
                        L.armBackUpper = Math.sin(fury + Math.PI) * 1.2;
                        L.swordAngle = -((fury) + Math.PI / 2);
                        L.torsoLean = Math.sin(fury * 0.5) * 0.25;
                        L.headTilt = Math.sin(fury * 0.3) * 0.15;
                        L.legFrontUpper = Math.sin(fury * 0.5) * 0.3;
                        L.legBackUpper = -Math.sin(fury * 0.5) * 0.3;
                    } else {
                        // Exhausted recovery
                        L.armFrontUpper = 0.8 * (1 - rp); L.armFrontLower = 0.3;
                        L.swordAngle = -((0.5 * (1 - rp)) + Math.PI / 2);
                        L.torsoLean = 0.2 * (1 - rp);
                    }
                    break;

                case 'Helm Breaker': // Air move4: plunging downward strike
                    L.swordLength = 45;
                    if (inStartup) {
                        // Raise sword high overhead
                        L.armFrontUpper = -2.8 * sp; L.armFrontLower = -0.3;
                        L.armBackUpper = -2.2 * sp; L.armBackLower = -0.2;
                        L.swordAngle = -((-3.0 * sp) + Math.PI / 2);
                        L.legFrontUpper = -0.2; L.legBackUpper = 0.2;
                    } else if (inActive) {
                        // Plunge straight down — sword pointed below
                        L.armFrontUpper = -2.8 + 1.5 * ap;
                        L.armFrontLower = -0.3 + 0.5 * ap;
                        L.swordAngle = -((-3.0 + 4.8 * ap) + Math.PI / 2); // Sword goes from overhead to straight down
                        L.torsoLean = 0.4 * ap;
                        L.legFrontUpper = -0.2 + 0.5 * ap;
                        L.legBackUpper = 0.2 - 0.4 * ap;
                    } else {
                        L.armFrontUpper = -1.3 + 1.0 * rp;
                        L.swordAngle = -((1.8 - 1.5 * rp) + Math.PI / 2);
                        L.torsoLean = 0.4 - 0.4 * rp;
                    }
                    break;

                default:
                    // Fallback generic sword attack
                    if (inStartup) {
                        L.armFrontUpper = -2.0 * sp; L.armFrontLower = -0.8 * sp;
                        L.swordAngle = -((-2.0 * sp) + Math.PI / 2); L.torsoLean = -0.2 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 1.5; L.armFrontLower = 0.3;
                        L.swordAngle = -((0.5) + Math.PI / 2); L.torsoLean = 0.3;
                    } else {
                        L.armFrontUpper = 0.5 * (1 - rp); L.swordAngle = -((0.2 * (1 - rp)) + Math.PI / 2);
                    }
            }
        }

        // BOWMAN attack animations
        updateBowmanAttack(name, L, sp, ap, rp, inStartup, inActive, inRecovery, t) {
            L.swordVisible = false;
            switch (name) {
                case 'Quick Strike': // Fast melee poke
                    if (inStartup) { L.armFrontUpper = 0.3 * sp; L.armFrontLower = 0.2; }
                    else if (inActive) { L.armFrontUpper = 1.2; L.armFrontLower = 0.4; L.torsoLean = 0.2; }
                    else { L.armFrontUpper = 1.2 - 1.0 * rp; L.torsoLean = 0.2 - 0.2 * rp; }
                    break;
                case 'Arrow Shot': // Draw and fire bow — bow lifts in front of face, string pulls back
                    if (inStartup) {
                        // Front arm rises to hold bow at face level (negative = arm raised)
                        L.armFrontUpper = -0.8 * sp; L.armFrontLower = 0.3 * sp;
                        // Back arm bends and draws string back toward bowman
                        L.armBackUpper = -0.5 - 0.8 * sp; L.armBackLower = 0.9 * sp;
                        L.torsoLean = -0.1 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = -0.8; L.armFrontLower = 0.3;
                        L.armBackUpper = 0.3; L.armBackLower = 0.2; // Release snaps forward
                        L.torsoLean = 0.1;
                    } else { L.armFrontUpper = -0.4 * (1 - rp); L.armFrontLower = 0.1 * (1 - rp); L.armBackUpper = 0.2 * (1 - rp); }
                    break;
                case 'Triple Shot': // Same lift, heavier draw
                    if (inStartup) {
                        L.armFrontUpper = -0.8 * sp; L.armFrontLower = 0.3 * sp;
                        L.armBackUpper = -0.5 - 1.0 * sp; L.armBackLower = 1.0 * sp;
                        L.torsoLean = -0.15 * sp; L.legFrontUpper = 0.2;
                    } else if (inActive) {
                        L.armFrontUpper = -0.8; L.armFrontLower = 0.3;
                        L.armBackUpper = 0.4; L.torsoLean = 0.15;
                    } else { L.armFrontUpper = -0.3 * (1 - rp); L.armFrontLower = 0.1 * (1 - rp); }
                    break;
                case 'Air Kick':
                    if (inStartup) { L.legFrontUpper = 0.3 * sp; }
                    else if (inActive) { L.legFrontUpper = 1.5; L.legFrontLower = -0.3; L.torsoLean = -0.2; }
                    else { L.legFrontUpper = 1.5 - 1.3 * rp; }
                    break;
                case 'Falling Arrow':
                    if (inStartup) { L.armFrontUpper = -0.5 * sp; L.armBackUpper = -1.5 * sp; }
                    else if (inActive) { L.armFrontUpper = 0.6; L.armBackUpper = 0.4; L.torsoLean = 0.3; }
                    else { L.armFrontUpper = 0.4 * (1 - rp); }
                    break;
                case 'Scatter Shot':
                    if (inStartup) { L.armFrontUpper = 0.4 * sp; L.armBackUpper = -1.6 * sp; }
                    else if (inActive) { L.armFrontUpper = 0.4; L.armBackUpper = 1.0; L.torsoLean = 0.2; }
                    else { L.armFrontUpper = 0.3 * (1 - rp); }
                    break;
                case 'Arrow Rain': // Ultimate: shoot upward
                    if (inStartup) {
                        L.armFrontUpper = -2.0 * sp; L.armFrontLower = -0.3;
                        L.armBackUpper = -2.5 * sp; L.armBackLower = -0.5;
                        L.torsoLean = -0.3 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = -2.0; L.armBackUpper = -0.5; L.torsoLean = -0.3;
                    } else { L.armFrontUpper = -2.0 + 2.0 * rp; L.torsoLean = -0.3 + 0.3 * rp; }
                    break;
                case 'Piercing Shot':
                    if (inStartup) {
                        L.armFrontUpper = 0.8 * sp; L.armBackUpper = -2.5 * sp; L.armBackLower = -0.6;
                        L.torsoLean = -0.2 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 0.8; L.armBackUpper = 1.0; L.torsoLean = 0.2;
                    } else { L.armFrontUpper = 0.5 * (1 - rp); }
                    break;
                default:
                    if (inStartup) { L.armFrontUpper = -1.5 * sp; }
                    else if (inActive) { L.armFrontUpper = 1.2; L.torsoLean = 0.2; }
                    else { L.armFrontUpper = 0.5 * (1 - rp); }
            }
        }

                    } else if (inActive) {

                        L.headTilt = -0.2;
                    } else {
                        L.armFrontUpper = -2.5 + 2.5 * rp;
                        L.armBackUpper = -2.2 + 2.2 * rp;
                    }
                    break;
                case 'Magic Burst': // Explosive aura
                    if (inStartup) {
                        L.armFrontUpper = -1.0 * sp; L.armBackUpper = -1.0 * sp;
                        L.armFrontLower = -0.8 * sp; L.armBackLower = -0.8 * sp;
                    } else if (inActive) {
                        // Arms spread wide
                        L.armFrontUpper = 1.5 * ap; L.armBackUpper = -1.5;

                    } else { L.armFrontUpper = 1.0 * (1 - rp); L.armBackUpper = -1.0 * (1 - rp); }

                case 'Thunder Drop':
                    if (inStartup) { L.armFrontUpper = -1.5 * sp; L.armFrontLower = -0.3; }
                    else if (inActive) { L.armFrontUpper = 0.8; L.torsoLean = 0.3; }
                    else { L.armFrontUpper = 0.5 * (1 - rp); }
                    break;
                case 'Blink Burst': // Teleport then burst
                    if (inStartup) {
                        L.torsoLean = 0.3 * sp;
                        L.armFrontUpper = 0.5 * sp; L.armBackUpper = 0.5 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = -1.5; L.armBackUpper = 1.5;
                        L.armFrontLower = -0.5; L.armBackLower = 0.5;
                        L.torsoLean = Math.sin(t * 0.3) * 0.2;
                    } else { L.armFrontUpper = -1.0 * (1 - rp); }
                    break;
                case 'Arcane Nova': // Ultimate: huge magic explosion
                    if (inStartup) {
                        L.armFrontUpper = -2.0 * sp; L.armBackUpper = -2.0 * sp;
                        L.armFrontLower = -1.0 * sp; L.armBackLower = -1.0 * sp;
                        L.legFrontUpper = 0.2; L.legBackUpper = -0.2;
                    } else if (inActive) {
                        const burst = ap * Math.PI * 2;
                        L.armFrontUpper = Math.sin(burst) * 2.5;
                        L.armBackUpper = -Math.sin(burst) * 2.5;
                        L.torsoLean = Math.sin(burst * 0.5) * 0.15;
                    } else {
                        L.armFrontUpper = 0.5 * (1 - rp); L.armBackUpper = -0.5 * (1 - rp);
                    }
                    break;
                case 'Void Rift':
                    if (inStartup) {
                        L.armFrontUpper = -1.5 * sp; L.armFrontLower = -0.5;
                        L.armBackUpper = -1.2 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 1.0; L.torsoLean = 0.2;
                    } else { L.armFrontUpper = 0.5 * (1 - rp); }
                    break;
                default:
                    if (inStartup) { L.armFrontUpper = -1.5 * sp; }
                    else if (inActive) { L.armFrontUpper = 1.2; }
                    else { L.armFrontUpper = 0.5 * (1 - rp); }
            }
        }

        // COWBOY attack animations
        updateCowboyAttack(name, L, sp, ap, rp, inStartup, inActive, inRecovery, t) {
            L.swordVisible = false;
            switch (name) {
                case 'Haymaker': // Big fist forward
                    if (inStartup) {
                        L.armFrontUpper = -1.5 * sp; L.armFrontLower = -1.0 * sp;
                        L.torsoLean = -0.15 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 1.5; L.armFrontLower = 0.0;
                        L.torsoLean = 0.3;
                    } else { L.armFrontUpper = 1.0 * (1 - rp); L.torsoLean = 0.2 * (1 - rp); }
                    break;
                case 'Peacemaker': // Quick-draw: back arm whips gun forward and fires
                    if (inStartup) {
                        // Back arm yanks gun up from holster — starts low, swings forward-up
                        L.armBackUpper = 0.8 - 1.4 * sp;   // Sweeps from hip (0.8) to aimed forward (-0.6)
                        L.armBackLower = 0.5 - 0.6 * sp;   // Elbow straightens as arm extends
                        // Front arm braces/steadies
                        L.armFrontUpper = -0.2 * sp;
                        L.armFrontLower = 0.1;
                        L.torsoLean = 0.1 * sp;             // Lean into the shot
                    } else if (inActive) {
                        // Gun arm fully extended forward — locked aim
                        L.armBackUpper = -0.6; L.armBackLower = -0.1;
                        L.armFrontUpper = -0.2; L.armFrontLower = 0.1;
                        L.torsoLean = 0.12;
                    } else {
                        // Gun arm relaxes back down
                        L.armBackUpper = -0.6 + 0.8 * rp;
                        L.armBackLower = -0.1 + 0.3 * rp;
                        L.torsoLean = 0.12 * (1 - rp);
                    }
                    break;
                case 'Lasso': // Throw lasso overhead
                case 'Air Lasso':
                    if (inStartup) {
                        const spin = sp * Math.PI * 3;
                        L.armFrontUpper = -2.0 + Math.sin(spin) * 0.5;
                        L.armFrontLower = -0.3;
                        L.torsoLean = -0.1;
                    } else if (inActive) {
                        L.armFrontUpper = 1.2; L.armFrontLower = 0.3;
                        L.torsoLean = 0.25;
                    } else {
                        L.armFrontUpper = 0.8 * (1 - rp);
                    }
                    break;
                case 'Boot Kick': // Aerial kick
                    if (inStartup) { L.legFrontUpper = 0.5 * sp; }
                    else if (inActive) {
                        L.legFrontUpper = 1.5; L.legFrontLower = -0.2;
                        L.torsoLean = -0.2;
                    } else { L.legFrontUpper = 1.2 * (1 - rp); }
                    break;
                case 'Fan Shot': // Back arm swings gun forward and fires downward-arc
                    if (inStartup) {
                        L.armBackUpper = 0.6 - 1.0 * sp;   // Hip to aimed forward
                        L.armBackLower = 0.4 - 0.5 * sp;
                        L.armFrontUpper = -0.1;
                        L.torsoLean = 0.1 * sp;
                    } else if (inActive) {
                        L.armBackUpper = -0.4; L.armBackLower = -0.1;
                        L.torsoLean = 0.12;
                    } else {
                        L.armBackUpper = -0.4 + 0.6 * rp;
                        L.torsoLean = 0.1 * (1 - rp);
                    }
                    break;
                case 'Dynamite Toss': // Overhead throw — front arm
                    if (inStartup) {
                        L.armFrontUpper = -2.5 * sp; L.armFrontLower = -0.5;
                        L.torsoLean = -0.2 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 1.5; L.armFrontLower = 0.3;
                        L.torsoLean = 0.3;
                    } else { L.armFrontUpper = 1.0 * (1 - rp); L.torsoLean = 0.2 * (1 - rp); }
                    break;
                case 'Dead Eye': // Slow deliberate aim with back arm, front arm steadies
                    if (inStartup) {
                        // Back arm slowly raises gun from hip to perfect aim
                        L.armBackUpper = 0.9 - 1.5 * sp;   // Hip → aimed forward
                        L.armBackLower = 0.6 - 0.7 * sp;   // Straightens out
                        // Front arm comes up to brace the gun hand (two-handed aim)
                        L.armFrontUpper = -0.5 * sp;
                        L.armFrontLower = 0.3 * sp;
                        L.headTilt = 0.12 * sp;             // Head tilts to sight
                        L.torsoLean = 0.08 * sp;
                    } else if (inActive) {
                        L.armBackUpper = -0.6; L.armBackLower = -0.1;
                        L.armFrontUpper = -0.5; L.armFrontLower = 0.3;
                        L.headTilt = 0.12; L.torsoLean = 0.1;
                    } else {
                        L.armBackUpper = -0.6 + 0.9 * rp;
                        L.armBackLower = -0.1 + 0.4 * rp;
                        L.armFrontUpper = -0.5 + 0.5 * rp;
                        L.headTilt = 0.1 * (1 - rp);
                        L.torsoLean = 0.1 * (1 - rp);
                    }
                    break;
                default:
                    if (inStartup) { L.armFrontUpper = -1.5 * sp; }
                    else if (inActive) { L.armFrontUpper = 1.2; L.torsoLean = 0.2; }
                    else { L.armFrontUpper = 0.5 * (1 - rp); }
            }
        }

        updateOspreyAttack(name, L, sp, ap, rp, inStartup, inActive, inRecovery, t) {
            L.swordVisible = false;
            switch (name) {
                case 'Talon Rake': // Quick downward foot swipe from a short hop
                    if (inStartup) {
                        L.legFrontUpper = 0.4 * sp; L.legFrontLower = 0.2 * sp;
                        L.armFrontUpper = -0.3; L.armBackUpper = -0.3;
                    } else if (inActive) {
                        L.legFrontUpper = 1.4; L.legFrontLower = 0.5;
                        L.legBackUpper = 1.0; L.legBackLower = 0.3;
                        L.torsoLean = 0.2;
                        L.armFrontUpper = 0.2; L.armBackUpper = 0.2;
                    } else {
                        L.legFrontUpper = 1.4 - 1.3 * rp; L.legFrontLower = 0.5 - 0.5 * rp;
                        L.legBackUpper = 1.0 - 0.9 * rp;
                        L.armFrontUpper = 0.2 - 0.4 * rp; L.armBackUpper = 0.2 - 0.4 * rp;
                    }
                    break;
                case 'Dive Bomb': // Tuck wings and rocket diagonally down — spike hitbox
                    if (inStartup) {
                        L.armFrontUpper = -0.2 - 1.5 * sp; L.armFrontLower = 0.5 * sp;
                        L.armBackUpper = -0.2 - 1.5 * sp; L.armBackLower = 0.5 * sp;
                        L.torsoLean = 0.3 * sp; L.headTilt = 0.25 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = -1.7; L.armFrontLower = 0.5;
                        L.armBackUpper = -1.7; L.armBackLower = 0.5;
                        L.torsoLean = 0.6; L.headTilt = 0.3;
                        L.legFrontUpper = -0.2; L.legBackUpper = -0.2;
                        L.legFrontLower = -0.1; L.legBackLower = -0.1;
                    } else {
                        L.armFrontUpper = -1.7 + 1.0 * rp; L.armFrontLower = 0.5 - 0.4 * rp;
                        L.armBackUpper = -1.7 + 1.0 * rp; L.armBackLower = 0.5 - 0.4 * rp;
                        L.torsoLean = 0.6 - 0.5 * rp; L.headTilt = 0.3 - 0.3 * rp;
                    }
                    break;
                case 'Wind Shear': // Wing beat fires horizontal gust projectile
                    if (inStartup) {
                        L.armFrontUpper = -0.3 - 1.2 * sp; L.armFrontLower = -0.3;
                        L.armBackUpper = -0.3 - 1.0 * sp; L.armBackLower = -0.3;
                        L.torsoLean = -0.2 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 1.8; L.armFrontLower = 0.3;
                        L.armBackUpper = 1.5; L.armBackLower = 0.2;
                        L.torsoLean = 0.3; L.headTilt = -0.1;
                    } else {
                        L.armFrontUpper = 1.8 - 2.0 * rp; L.armFrontLower = 0.2 * (1 - rp);
                        L.armBackUpper = 1.5 - 1.7 * rp; L.torsoLean = 0.3 - 0.3 * rp;
                    }
                    break;
                case 'Wing Slash': // Aerial wing swipe forward
                    if (inStartup) {
                        L.armFrontUpper = -1.2 * sp; L.armFrontLower = -0.2;
                        L.armBackUpper = -0.8 * sp;
                    } else if (inActive) {
                        L.armFrontUpper = 2.0; L.armFrontLower = 0.4; L.armBackUpper = 1.2;
                        L.torsoLean = 0.25;
                    } else {
                        L.armFrontUpper = 2.0 - 2.2 * rp; L.armFrontLower = 0.3 * (1 - rp);
                        L.armBackUpper = 1.2 - 1.4 * rp;
                    }
                    break;
                case 'Talon Spike': // Aerial downward spike — feet first
                    if (inStartup) {
                        L.legFrontUpper = 0.5 * sp; L.legFrontLower = 0.4 * sp;
                        L.legBackUpper = 0.3 * sp; L.legBackLower = 0.3 * sp;
                        L.armFrontUpper = -0.4; L.armBackUpper = -0.4;
                    } else if (inActive) {
                        L.legFrontUpper = 1.6; L.legFrontLower = 0.6;
                        L.legBackUpper = 1.2; L.legBackLower = 0.4;
                        L.torsoLean = 0.1;
                        L.armFrontUpper = -0.5; L.armBackUpper = -0.5;
                    } else {
                        L.legFrontUpper = 1.6 - 1.5 * rp; L.legFrontLower = 0.6 - 0.5 * rp;
                        L.legBackUpper = 1.2 - 1.1 * rp;
                    }
                    break;
                case 'Thermal': // Wing beats generate rising air platform
                    if (inStartup) {
                        const beat = Math.sin(t * 0.5) * sp;
                        L.armFrontUpper = -1.5 * beat; L.armFrontLower = 0.3 * beat;
                        L.armBackUpper = -1.3 * beat; L.armBackLower = 0.2 * beat;
                    } else if (inActive) {
                        L.armFrontUpper = 1.5; L.armFrontLower = 0.5;
                        L.armBackUpper = 1.3; L.armBackLower = 0.4;
                        L.torsoLean = 0.1; L.headTilt = -0.15;
                    } else {
                        L.armFrontUpper = 1.5 - 1.7 * rp; L.armFrontLower = 0.4 * (1 - rp);
                        L.armBackUpper = 1.3 - 1.5 * rp;
                    }
                    break;
                case 'Death Spiral': // Homing corkscrew dive — massive downward spike
                    if (inStartup) {
                        L.armFrontUpper = -2.5 * sp; L.armFrontLower = -0.2;
                        L.armBackUpper = -2.3 * sp; L.armBackLower = -0.2;
                        L.headTilt = 0.2 * sp; L.torsoLean = -0.1 * sp;
                    } else if (inActive) {
                        const spiral = ap * Math.PI * 4;
                        L.armFrontUpper = Math.sin(spiral) * 2.0 - 0.5;
                        L.armBackUpper = -Math.sin(spiral) * 2.0 - 0.5;
                        L.armFrontLower = Math.abs(Math.sin(spiral)) * 0.3;
                        L.torsoLean = Math.sin(spiral * 0.5) * 0.3 + 0.4;
                        L.headTilt = Math.cos(spiral) * 0.2;
                        L.legFrontUpper = -0.2; L.legBackUpper = -0.2;
                    } else {
                        L.armFrontUpper = -1.0 + 0.8 * rp;
                        L.armBackUpper = -1.0 + 0.8 * rp;
                        L.torsoLean = 0.4 - 0.3 * rp;
                    }
                    break;
                default:
                    if (inStartup) { L.armFrontUpper = -1.5 * sp; L.armBackUpper = -1.2 * sp; }
                    else if (inActive) { L.armFrontUpper = 1.5; L.armBackUpper = 1.2; L.torsoLean = 0.2; }
                    else { L.armFrontUpper = 0.5 * (1 - rp); L.armBackUpper = 0.4 * (1 - rp); }
            }
        }

        releaseLedge() {
            this.body.enable = true;
            this.body.setGravityY(FIGHTER_CONFIG.gravity);
            // Sync body to current sprite position (body was disabled during hang)
            this.body.reset(this.sprite.x - FIGHTER_CONFIG.width/2, this.sprite.y - FIGHTER_CONFIG.height/2);
            this.body.setVelocity(0, 0);
            this.ledgeGrabCooldown = 30;
            this.currentLedge = null;
        }

        // ---- LEDGE GRAB ----
        tryLedgeGrab() {
            if (this.ledgeGrabCooldown > 0) return;
            if (this.spawnProtected) return;        // No ledge grab until first ground touch after spawn
            if (this.body.velocity.y < 0) return;  // Only grab when falling
            if (this.isGrounded) return;
            // Check if another fighter is already on a ledge (SSB: only one per ledge)
            const otherFighter = this.scene.getOtherFighter(this);

            for (const ledge of LEDGES) {
                // Skip if other player is on this exact ledge
                if (otherFighter.state === S.LEDGE_HANG && otherFighter.currentLedge === ledge) continue;

                const dx = this.sprite.x - ledge.x;
                const dy = this.sprite.y - ledge.y;
                const range = ledge.grabRange !== undefined ? ledge.grabRange : FIGHTER_CONFIG.ledgeGrabRange;

                // Must be approaching from the correct side
                if (ledge.side === 'left' && dx > 5) continue;   // Must be to the left of left edge
                if (ledge.side === 'right' && dx < -5) continue;  // Must be to the right of right edge

                if (Math.abs(dx) < range + 15 && dy > -5 && dy < range + 20) {
                    // GRAB! Position once, then freeze physics
                    this.currentLedge = ledge;
                    this.facing = ledge.side === 'left' ? 1 : -1;
                    const hangX = ledge.x + (ledge.side === 'left' ? -10 : 10);
                    const hangY = ledge.y + 46; // +20 to compensate for visual figure offset
                    this.body.setVelocity(0, 0);
                    this.body.setGravityY(0);
                    this.body.enable = false; // Disable physics entirely
                    this.sprite.setPosition(hangX, hangY);
                    this.fastFalling = false;
                    this.jumpsRemaining = FIGHTER_CONFIG.maxJumps;
                    this.hasUsedFly = false;
                    this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed);
                    this.scene.spawnParticles(ledge.x, ledge.y, COLORS.ledge, 4);
                    this.setState(S.LEDGE_HANG);
                    return;
                }
            }
        }

        // ---- SCREEN SPLAT ----
        createSplatEffect() {
            const vx = this.splatVx || 0;
            const vy = this.splatVy || 0;
            const ox = this.splatOriginX || this.sprite.x;
            const oy = this.splatOriginY || this.sprite.y;

            // Which screen edge are they flying toward?
            const absVx = Math.abs(vx); const absVy = Math.abs(vy);
            let splatEdge;
            if (absVx > absVy) splatEdge = vx > 0 ? 'right' : 'left';
            else splatEdge = vy > 0 ? 'bottom' : 'top';

            let edgeX, edgeY;
            switch (splatEdge) {
                case 'left':   edgeX = 20;   edgeY = oy; break;
                case 'right':  edgeX = 1004; edgeY = oy; break;
                case 'top':    edgeX = ox;   edgeY = 20; break;
                case 'bottom': edgeX = ox;   edgeY = 620; break;
            }
            const sx = Math.max(50, Math.min(974, ox + (edgeX - ox) * 0.45));
            const sy = Math.max(50, Math.min(590, oy + (edgeY - oy) * 0.45));
            this.splatX = sx; this.splatY = sy;

            // Screen shake + brief flash (tinted, not white-out)
            this.scene.cameras.main.shake(500, 0.045);
            this.scene.cameras.main.flash(180, 255, 255, 200, false);

            // Slow-mo
            this.scene.time.timeScale = 0.06;
            this.scene.time.delayedCall(1500, () => { this.scene.time.timeScale = 1; });

            const col = this.color;
            const charKey = this.charKey;
            this.splatExtras = [];

            // ---- DARK BACKDROP — gives figure contrast to pop against ----
            const crackGfx = this.scene.add.graphics().setDepth(28);
            crackGfx.fillStyle(0x000000, 0.55);
            crackGfx.fillCircle(sx, sy, 72);
            // Cracks: few, dim, tinted to player color — background accent not foreground noise
            for (let i = 0; i < 10; i++) {
                const a = (i / 10) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
                const len = 35 + Math.random() * 55;
                crackGfx.lineStyle(1 + Math.random() * 1.5, col, 0.29 + Math.random() * 0.23);
                crackGfx.lineBetween(sx, sy, sx + Math.cos(a) * len, sy + Math.sin(a) * len);
            }
            this.splatExtras.push(crackGfx);

            // ---- SHOCKWAVE RING — fires and fades fast, tinted to player color ----
            const ring = this.scene.add.circle(sx, sy, 18, 0xffffff, 0).setDepth(29);
            ring.setStrokeStyle(3, col, 0.55);
            this.splatExtras.push(ring);
            this.scene.tweens.add({
                targets: ring, scaleX: 5, scaleY: 5, duration: 320, ease: 'Quad.easeOut',
                onUpdate: (tw) => { ring.setStrokeStyle(3, col, 0.55 - tw.progress * 0.55); },
                onComplete: () => ring.destroy(),
            });

            // ---- DRAW SPLATTED STICK FIGURE ----
            // The figure is squashed flat against the surface it hit.
            // squashX/squashY compress the figure along the impact axis.
            const isHoriz = (splatEdge === 'left' || splatEdge === 'right');
            const squashX = isHoriz ? 0.55 : 1.0;   // Wall hit = moderate horizontal compress
            const squashY = 1.0;                     // Always keep full vertical proportions
            // Facing: if hit left wall, figure faces right (inward); right wall, faces left
            const splatFacing = splatEdge === 'left' ? 1 : splatEdge === 'right' ? -1 : this.facing;

            // Stick figure dimensions (same as drawStickFigures)
            const scale = 1.55; // A bit bigger for drama
            const headR   = 8  * scale;
            const torsoLen = 22 * scale;
            const upperArm = 10 * scale;
            const lowerArm = 10 * scale;
            const upperLeg = 12 * scale;
            const lowerLeg = 12 * scale;
            const shoulderW = 6 * scale;

            // RAGDOLL POSE — limbs splayed wide on impact
            // Arms flung upward/outward, legs splayed outward, head tilted
            const deadLimbs = {
                armFrontUpper:  isHoriz ? -2.2 : -2.4,
                armFrontLower:  isHoriz ?  1.2 :  0.9,
                armBackUpper:   isHoriz ? -1.8 : -2.0,
                armBackLower:   isHoriz ?  0.8 :  0.7,
                legFrontUpper:  isHoriz ?  1.4 :  1.6,
                legFrontLower:  isHoriz ?  0.5 :  0.8,
                legBackUpper:   isHoriz ? -1.2 : -1.5,
                legBackLower:   isHoriz ?  0.4 :  0.7,
                headTilt:       isHoriz ?  0.6 :  0.3,
                torsoLean:      isHoriz ?  0.2 : -0.1,
                swordAngle: this.limbs.swordAngle,
                swordLength: this.limbs.swordLength,
                swordVisible: charKey === 'swordsman',
            };

            // Helper: transform a point through the squash matrix centered on (sx,sy)
            const tf = (px, py) => ({
                x: sx + (px - sx) * squashX,
                y: sy + (py - sy) * squashY,
            });

            // Helper: place a limb joint
            const limbEnd = (jx, jy, angle, length) => {
                const a = angle * splatFacing + Math.PI / 2;
                return { x: jx + Math.cos(a) * length, y: jy + Math.sin(a) * length };
            };

            // Compute all joint positions (in uncompressed space, centered on sx,sy)
            const headY_raw  = sy - 38 * scale * squashY;
            const headX_raw  = sx;
            const headY_c    = headY_raw;
            const neckX_raw  = headX_raw + Math.sin(deadLimbs.torsoLean * splatFacing) * 2;
            const neckY_raw  = headY_c + headR;
            const hipX_raw   = neckX_raw + Math.sin(deadLimbs.torsoLean * splatFacing) * torsoLen * 0.3;
            const hipY_raw   = neckY_raw + torsoLen;
            const shoulderLX_raw = neckX_raw - shoulderW * splatFacing;
            const shoulderRX_raw = neckX_raw + shoulderW * splatFacing;
            const shoulderY_raw  = neckY_raw + 3 * scale;

            const elbowF_r  = limbEnd(shoulderRX_raw, shoulderY_raw, deadLimbs.armFrontUpper, upperArm);
            const handF_r   = limbEnd(elbowF_r.x, elbowF_r.y, deadLimbs.armFrontUpper + deadLimbs.armFrontLower, lowerArm);
            const elbowB_r  = limbEnd(shoulderLX_raw, shoulderY_raw, deadLimbs.armBackUpper, upperArm);
            const handB_r   = limbEnd(elbowB_r.x, elbowB_r.y, deadLimbs.armBackUpper + deadLimbs.armBackLower, lowerArm);
            const kneeF_r   = limbEnd(hipX_raw, hipY_raw, deadLimbs.legFrontUpper, upperLeg);
            const footF_r   = limbEnd(kneeF_r.x, kneeF_r.y, deadLimbs.legFrontUpper + deadLimbs.legFrontLower, lowerLeg);
            const kneeB_r   = limbEnd(hipX_raw, hipY_raw, deadLimbs.legBackUpper, upperLeg);
            const footB_r   = limbEnd(kneeB_r.x, kneeB_r.y, deadLimbs.legBackUpper + deadLimbs.legBackLower, lowerLeg);

            // Apply squash transform to every joint
            const hd = tf(headX_raw, headY_c);
            const neck = tf(neckX_raw, neckY_raw);
            const hip  = tf(hipX_raw,  hipY_raw);
            const shR  = tf(shoulderRX_raw, shoulderY_raw);
            const shL  = tf(shoulderLX_raw, shoulderY_raw);
            const elbF  = tf(elbowF_r.x,  elbowF_r.y);
            const hnF   = tf(handF_r.x,   handF_r.y);
            const elbB  = tf(elbowB_r.x,  elbowB_r.y);
            const hnB   = tf(handB_r.x,   handB_r.y);
            const knF   = tf(kneeF_r.x,   kneeF_r.y);
            const ftF   = tf(footF_r.x,   footF_r.y);
            const knB   = tf(kneeB_r.x,   kneeB_r.y);
            const ftB   = tf(footB_r.x,   footB_r.y);

            const gfx = this.scene.add.graphics().setDepth(35); // Above everything

            // ── Colour helpers (same as live renderer) ───────────────────────
            const lightenS = (hex, amt) => {
                const r = Math.min(255, ((hex >> 16) & 0xff) + amt);
                const g = Math.min(255, ((hex >>  8) & 0xff) + amt);
                const b = Math.min(255,  (hex        & 0xff) + amt);
                return (r << 16) | (g << 8) | b;
            };
            const darkenS = (hex, amt) => {
                const r = Math.max(0, ((hex >> 16) & 0xff) - amt);
                const g = Math.max(0, ((hex >>  8) & 0xff) - amt);
                const b = Math.max(0,  (hex        & 0xff) - amt);
                return (r << 16) | (g << 8) | b;
            };
            const colLight = lightenS(col, 80);
            const colDark  = darkenS(col,  60);
            const colRim   = lightenS(col, 140);

            // Squashed head radii
            const squashedHR_x = headR * squashX;
            const squashedHR_y = headR * squashY;

            // ── Capsule helper that works in already-transformed (squashed) space ──
            // x1,y1,x2,y2 are already tf()-processed coordinates
            const drawSplatCapsule = (x1, y1, x2, y2, r, fillCol, fillAlpha, hlCol, hlAlpha) => {
                const dx = x2 - x1, dy = y2 - y1;
                const len = Math.sqrt(dx*dx + dy*dy);
                if (len < 0.5) { gfx.fillStyle(fillCol, fillAlpha); gfx.fillCircle(x1, y1, r); return; }
                const nx = -dy / len, ny = dx / len;
                gfx.fillStyle(fillCol, fillAlpha);
                gfx.fillCircle(x1, y1, r);
                gfx.fillCircle(x2, y2, r);
                gfx.fillTriangle(x1+nx*r, y1+ny*r, x1-nx*r, y1-ny*r, x2+nx*r, y2+ny*r);
                gfx.fillTriangle(x1-nx*r, y1-ny*r, x2-nx*r, y2-ny*r, x2+nx*r, y2+ny*r);
                gfx.lineStyle(1, colDark, 0.5);
                gfx.lineBetween(x1+nx*r, y1+ny*r, x2+nx*r, y2+ny*r);
                gfx.lineBetween(x1-nx*r, y1-ny*r, x2-nx*r, y2-ny*r);
                if (hlAlpha > 0) {
                    const hOff = r * 0.35;
                    gfx.lineStyle(r * 0.45, hlCol, hlAlpha);
                    gfx.lineBetween(x1+nx*hOff, y1+ny*hOff, x2+nx*hOff, y2+ny*hOff);
                }
            };

            const armR  = 3.2 * scale * squashX;
            const legR  = 3.8 * scale * squashX;
            const torsoW  = 5.5 * scale * squashX;
            const torsoWH = 3.8 * scale * squashX;

            // ── Draw order: back limbs → torso → front limbs → head ──────────

            // BACK LEG
            drawSplatCapsule(hip.x, hip.y, knB.x, knB.y, legR*0.72, colDark, 0.75, colLight, 0.0);
            drawSplatCapsule(knB.x, knB.y, ftB.x, ftB.y, legR*0.65, colDark, 0.7, colLight, 0.0);
            gfx.fillStyle(darkenS(col, 40), 0.8);
            gfx.fillCircle(knB.x, knB.y, legR*0.75);

            // BACK ARM
            drawSplatCapsule(shL.x, shL.y, elbB.x, elbB.y, armR*0.72, colDark, 0.7, colLight, 0.0);
            drawSplatCapsule(elbB.x, elbB.y, hnB.x, hnB.y, armR*0.65, colDark, 0.65, colLight, 0.0);
            gfx.fillStyle(darkenS(col, 30), 0.75);
            gfx.fillCircle(elbB.x, elbB.y, armR*0.8);

            // TORSO — tapered filled quad
            const tdx = hip.x - neck.x, tdy = hip.y - neck.y;
            const tLen = Math.sqrt(tdx*tdx + tdy*tdy) || 1;
            const tnx = -tdy/tLen, tny = tdx/tLen;
            gfx.fillStyle(col, 1);
            gfx.fillTriangle(neck.x+tnx*torsoW, neck.y+tny*torsoW, neck.x-tnx*torsoW, neck.y-tny*torsoW, hip.x+tnx*torsoWH, hip.y+tny*torsoWH);
            gfx.fillTriangle(neck.x-tnx*torsoW, neck.y-tny*torsoW, hip.x-tnx*torsoWH, hip.y-tny*torsoWH, hip.x+tnx*torsoWH, hip.y+tny*torsoWH);
            gfx.lineStyle(torsoW*0.6, colLight, 0.22);
            gfx.lineBetween(neck.x+tnx*torsoW*0.3, neck.y+tny*torsoW*0.3, hip.x+tnx*torsoWH*0.3, hip.y+tny*torsoWH*0.3);
            gfx.lineStyle(1.2, colDark, 0.6);
            gfx.lineBetween(neck.x+tnx*torsoW, neck.y+tny*torsoW, hip.x+tnx*torsoWH, hip.y+tny*torsoWH);
            gfx.lineBetween(neck.x-tnx*torsoW, neck.y-tny*torsoW, hip.x-tnx*torsoWH, hip.y-tny*torsoWH);
            gfx.fillStyle(lightenS(col, 30), 0.9);
            gfx.fillCircle(neck.x, neck.y, torsoW*0.9);
            gfx.fillStyle(colDark, 0.9);
            gfx.fillCircle(hip.x, hip.y, torsoWH*0.95);

            // FRONT LEG
            drawSplatCapsule(hip.x, hip.y, knF.x, knF.y, legR, col, 1.0, colLight, 0.28);
            drawSplatCapsule(knF.x, knF.y, ftF.x, ftF.y, legR*0.85, col, 1.0, colLight, 0.22);
            gfx.fillStyle(lightenS(col, 20), 1);
            gfx.fillCircle(knF.x, knF.y, legR*1.1);
            gfx.fillStyle(colLight, 0.4);
            gfx.fillCircle(knF.x-1, knF.y-1, legR*0.5);

            // FRONT ARM
            drawSplatCapsule(shR.x, shR.y, elbF.x, elbF.y, armR, col, 1.0, colLight, 0.32);
            drawSplatCapsule(elbF.x, elbF.y, hnF.x, hnF.y, armR*0.85, col, 1.0, colLight, 0.26);
            gfx.fillStyle(lightenS(col, 20), 1);
            gfx.fillCircle(elbF.x, elbF.y, armR*1.05);
            gfx.fillStyle(colLight, 0.4);
            gfx.fillCircle(elbF.x-1, elbF.y-1, armR*0.45);
            gfx.fillStyle(col, 1);
            gfx.fillCircle(hnF.x, hnF.y, armR*0.9);

            // HEAD — filled volumetric with sheen + X_X eyes
            gfx.fillStyle(colDark, 0.7);
            gfx.fillEllipse(hd.x+1, hd.y+1, squashedHR_x*2, squashedHR_y*2);
            gfx.fillStyle(col, 1);
            gfx.fillEllipse(hd.x, hd.y, squashedHR_x*2, squashedHR_y*2);
            gfx.lineStyle(1.5, colDark, 0.8);
            gfx.strokeEllipse(hd.x, hd.y, squashedHR_x*2, squashedHR_y*2);
            // Sheen
            gfx.fillStyle(colRim, 0.35);
            gfx.fillEllipse(hd.x - squashedHR_x*0.2, hd.y - squashedHR_y*0.28, squashedHR_x*0.9, squashedHR_y*0.65);
            gfx.fillStyle(0xffffff, 0.55);
            gfx.fillCircle(hd.x - squashedHR_x*0.3, hd.y - squashedHR_y*0.35, squashedHR_x*0.18);

            // X_X eyes
            const eyeDir = splatFacing;
            const eyeOffX = squashedHR_x * 0.38;
            const eyeOffY = squashedHR_y * 0.1;
            const eyeEx = hd.x + eyeDir * eyeOffX;
            const eyeEy = hd.y - eyeOffY;
            const xs2 = squashedHR_x * 0.28, ys2 = squashedHR_y * 0.28;
            gfx.lineStyle(2.5, 0xffffff, 1);
            gfx.lineBetween(eyeEx - xs2*1.6, eyeEy - ys2*1.6, eyeEx - xs2*0.2, eyeEy - ys2*0.2);
            gfx.lineBetween(eyeEx - xs2*0.2, eyeEy - ys2*1.6, eyeEx - xs2*1.6, eyeEy - ys2*0.2);
            gfx.lineBetween(eyeEx + xs2*0.2, eyeEy - ys2*1.6, eyeEx + xs2*1.6, eyeEy - ys2*0.2);
            gfx.lineBetween(eyeEx + xs2*1.6, eyeEy - ys2*1.6, eyeEx + xs2*0.2, eyeEy - ys2*0.2);

            // ---- CHARACTER ACCESSORIES (squashed in place) ----

            // SWORDSMAN — sword flies off and spins separately
            if (charKey === 'swordsman') {
                const swordA = -deadLimbs.swordAngle + (splatFacing < 0 ? Math.PI : 0);
                const rawTipX = handF_r.x + Math.cos(swordA) * (deadLimbs.swordLength || 30);
                const rawTipY = handF_r.y + Math.sin(swordA) * (deadLimbs.swordLength || 30);
                const tip = tf(rawTipX, rawTipY);
                gfx.lineStyle(3, 0xcccccc, 0.9);
                gfx.lineBetween(hnF.x, hnF.y, tip.x, tip.y);
                const gp = swordA + Math.PI / 2;
                gfx.lineStyle(2.5, 0x997733, 1);
                gfx.lineBetween(hnF.x + Math.cos(gp)*5*squashX, hnF.y + Math.sin(gp)*5*squashY,
                                hnF.x - Math.cos(gp)*5*squashX, hnF.y - Math.sin(gp)*5*squashY);
                // Flying-off sword
                const flyingSword = this.scene.add.graphics().setDepth(36);
                flyingSword._angle = Math.random() * Math.PI * 2;
                flyingSword._vx = (Math.random() - 0.5) * 200;
                flyingSword._vy = -Math.random() * 250 - 80;
                flyingSword._spin = (Math.random() - 0.5) * 0.4;
                flyingSword._x = hnB.x; flyingSword._y = hnB.y;
                flyingSword._life = 1.0;
                this.splatExtras.push(flyingSword);
