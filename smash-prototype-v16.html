        _closeLeaderboard() {
            this._lbOpen = false;
            this._lbContainer.setVisible(false);
            this._lbContainer.removeAll(true);
        }

        _handleLBKey(e) {
            // Don't process LB keys when sub-modals are open
            if (this._lbExportModal || this._lbImportModal) return;
            // If a sub-modal just closed via ESC, eat this event to prevent also closing leaderboard
            if (this._lbModalJustClosed) { this._lbModalJustClosed = false; return; }
            // Sort keys in left-to-right column order — arrow keys walk this list in order
            const sortableCols = ['winRate','gamesPlayed','totalSmashes','maxCombo',
                                  'totalDamageDealt','perfectRounds','longestStreak','totalPlaytime'];
            const idx = sortableCols.indexOf(this._lbSortCol);
            if (e.key === 'ArrowRight') { this._lbSortCol = sortableCols[(idx+1) % sortableCols.length]; this._renderLeaderboard(); }
            if (e.key === 'ArrowLeft')  { this._lbSortCol = sortableCols[(idx-1+sortableCols.length) % sortableCols.length]; this._renderLeaderboard(); }
            if (e.key === 'Tab') { this._lbAscend = !this._lbAscend; this._renderLeaderboard(); }
            if (e.key === 'x' || e.key === 'X') { this._showLBExportModal(); }
            if (e.key === 'i' || e.key === 'I') { this._showLBImportModal(); }
            if (e.key === 'Escape' || e.key === 'Backspace') { this._closeLeaderboard(); }
        }

        _renderLeaderboard() {
            this._lbContainer.removeAll(true);
            const W = 1024, H = 640;
            const g = this.add.graphics();
            this._lbContainer.add(g);

            // ── Dark overlay + panel ─────────────────────────────────────────
            g.fillStyle(0x000000, 0.9); g.fillRect(0, 0, W, H);
            g.fillStyle(0x04070e, 0.98); g.fillRect(18, 12, W-36, H-24);
            g.lineStyle(2, 0x1a3a7a, 1); g.strokeRect(18, 12, W-36, H-24);
            g.fillStyle(0x091628, 1); g.fillRect(18, 12, W-36, 58);
            g.lineStyle(1, 0x2255aa, 0.6); g.lineBetween(18, 70, W-18, 70);
            for (let y = 78; y < H-20; y += 5) {
                g.lineStyle(1, 0x0d1e30, 0.15); g.lineBetween(20, y, W-20, y);
            }
            g.lineStyle(4, 0x1144cc, 0.3); g.lineBetween(22, 12, 22, H-12);
            g.lineStyle(1, 0x3366ff, 0.15); g.lineBetween(28, 12, 28, H-12);

            // ── Title ────────────────────────────────────────────────────────
            const title = this.add.text(W/2, 42, '🏆  LEADERBOARD', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '30px', fontStyle: 'bold',
                color: '#ffdd44', letterSpacing: 10,
                stroke: '#996600', strokeThickness: 4,
            }).setOrigin(0.5);
            this._lbContainer.add(title);

            // ── Column definitions — 11 cols spread evenly across 1024px ──
            // Merged W+L into W-L to free up horizontal space
            const cols = [
                { key: 'rank',             label: '#',         x:  18, w:  36, align: 'center', sortable: false },
                { key: 'name',             label: 'PLAYER',    x:  54, w: 148, align: 'left',   sortable: false },
                { key: 'wl',               label: 'W — L',     x: 202, w:  70, align: 'center', sortable: false },
                { key: 'winRate',          label: 'WIN %',     x: 272, w:  62, align: 'center', sortable: true  },
                { key: 'gamesPlayed',      label: 'GAMES',     x: 334, w:  56, align: 'center', sortable: true  },
                { key: 'totalSmashes',     label: 'KOs',       x: 390, w:  56, align: 'center', sortable: true  },
                { key: 'maxCombo',         label: 'COMBO',     x: 446, w:  64, align: 'center', sortable: true  },
                { key: 'totalDamageDealt', label: 'DMG',       x: 510, w:  68, align: 'center', sortable: true  },
                { key: 'perfectRounds',    label: 'PERFECT',   x: 578, w:  68, align: 'center', sortable: true  },
                { key: 'longestStreak',    label: 'STREAK',    x: 646, w:  66, align: 'center', sortable: true  },
                { key: 'totalPlaytime',    label: 'TIME',      x: 712, w:  56, align: 'center', sortable: true  },
                { key: 'favoriteChar',     label: 'FAV CHAR',  x: 768, w: 116, align: 'center', sortable: false },
                { key: 'favStage',         label: 'FAV STAGE', x: 884, w: 122, align: 'center', sortable: false },
            ];

            // ── Sort label ───────────────────────────────────────────────────
            const sortableCols = cols.filter(c => c.sortable).map(c => c.key);
            const activeCol = cols.find(c => c.key === this._lbSortCol);
            const sortLabel = activeCol ? activeCol.label : '';
            const sortLabelExpanded = {
                gamesPlayed:      'Total Games Played',
                winRate:          'Win %',
                totalSmashes:     'Total Knockouts',
                maxCombo:         'Best Combo',
                totalDamageDealt: 'Lifetime Damage Dealt',
                perfectRounds:    '# of Perfect Games (no damage taken)',
                longestStreak:    'Longest Win Streak',
                totalPlaytime:    'Total Time Played',
            }[this._lbSortCol] || sortLabel;
            const sortTxt = this.add.text(W/2, 80, `Sort: ${sortLabelExpanded}  ${this._lbAscend?'↑':'↓'}   ◀ ▶ cycle  ·  TAB flip  ·  X export  ·  I import  ·  ESC close`, {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#3a6aaa', letterSpacing: 1,
            }).setOrigin(0.5);
            this._lbContainer.add(sortTxt);

            // ── Column headers ───────────────────────────────────────────────
            const headerY = 100;
            const rowH = 56;
            const rowY0 = 132;

            g.fillStyle(0x0c1e3e, 1); g.fillRect(18, headerY-14, W-36, 28);

            cols.forEach(col => {
                const isSortCol = col.key === this._lbSortCol;
                const label = isSortCol ? `${col.label} ${this._lbAscend?'↑':'↓'}` : col.label;
                const hdr = this.add.text(col.x + col.w/2, headerY, label, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '10px', fontStyle: 'bold',
                    color: isSortCol ? '#ffcc44' : (col.sortable ? '#4a6ecc' : '#2e4a6a'),
                    letterSpacing: 0,
                }).setOrigin(0.5);
                this._lbContainer.add(hdr);
                if (isSortCol) {
                    g.lineStyle(2, 0xffcc44, 0.6);
                    g.lineBetween(col.x+3, headerY+11, col.x+col.w-3, headerY+11);
                }
            });

            // ── Sort & display profiles ──────────────────────────────────────
            const profiles = [...PROFILES.data];
            const sortKey = this._lbSortCol;
            profiles.sort((a, b) => {
                let va = sortKey === 'winRate' ? PROFILES.winRate(a) : (a[sortKey] || 0);
                let vb = sortKey === 'winRate' ? PROFILES.winRate(b) : (b[sortKey] || 0);
                return this._lbAscend ? va - vb : vb - va;
            });

            const STAGE_NAMES = { proving_grounds:'Proving Grd', the_void:'Event Horizon', the_divide:'The Divide', the_ascent:'The Ascent', twin_peaks:'Twin Peaks', the_gauntlet:'Gauntlet' };

            profiles.forEach((p, i) => {
                const y = rowY0 + i * rowH;
                if (y + rowH > H - 20) return;

                const isFirst = i === 0, isSecond = i === 1, isThird = i === 2;
                const rowBg = isFirst ? 0x1c1600 : i%2===0 ? 0x080c16 : 0x060910;
                g.fillStyle(rowBg, 1); g.fillRect(19, y-rowH/2+2, W-38, rowH-3);
                if (isFirst)  { g.lineStyle(1.5, 0xffcc00, 0.45); g.strokeRect(19, y-rowH/2+2, W-38, rowH-3); }
                if (isSecond) { g.lineStyle(1,   0xaaaaaa, 0.25); g.strokeRect(19, y-rowH/2+2, W-38, rowH-3); }
                if (isThird)  { g.lineStyle(1,   0xaa6622, 0.25); g.strokeRect(19, y-rowH/2+2, W-38, rowH-3); }

                const barCol = isFirst ? 0xffcc00 : isSecond ? 0xaaaaaa : isThird ? 0xaa6622 : 0x1133aa;
                g.fillStyle(barCol, isFirst ? 0.9 : isSecond ? 0.55 : isThird ? 0.45 : 0.18);
                g.fillRect(19, y-rowH/2+2, 5, rowH-3);

                const wr = PROFILES.winRate(p);
                const fmtTime = (s) => { s=s||0; if(s<60) return `${s}s`; if(s<3600) return `${Math.floor(s/60)}m`; return `${Math.floor(s/3600)}h${Math.floor((s%3600)/60)}m`; };
                const favStage = p.stagePlays ? Object.entries(p.stagePlays).sort((a,b)=>b[1]-a[1])[0]?.[0] : null;
                const mainChar = p.favoriteChar ? (CHARACTERS[p.favoriteChar]?.name || p.favoriteChar) : '—';

                const vals = {
                    rank:             i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`,
                    name:             `${p.emoji||'⚔️'} ${p.name}`,
                    wl:               `${p.wins||0} — ${p.losses||0}`,
                    gamesPlayed:      `${p.gamesPlayed||0}`,
                    winRate:          wr > 0 ? `${wr}%` : '—',
                    totalSmashes:     `${p.totalSmashes||0}`,
                    maxCombo:         p.maxCombo > 0 ? `${p.maxCombo}` : '—',
                    totalDamageDealt: p.totalDamageDealt > 0 ? `${p.totalDamageDealt}%` : '—',
                    perfectRounds:    `${p.perfectRounds||0}`,
                    longestStreak:    `${p.longestStreak||0}`,
                    totalPlaytime:    fmtTime(p.totalPlaytime),
                    favoriteChar:     mainChar,
                    favStage:         favStage ? (STAGE_NAMES[favStage]||favStage) : '—',
                };

                cols.forEach(col => {
                    const isSort = col.key === sortKey;
                    let color = '#7799bb';
                    if (col.key === 'name')   color = isFirst ? '#ffdd66' : '#aaccee';
                    if (col.key === 'rank')   color = isFirst ? '#ffcc00' : isSecond ? '#cccccc' : isThird ? '#dd9944' : '#3a4a5a';
                    if (col.key === 'wl')     color = '#88bbee';
                    if (isSort && col.key !== 'name' && col.key !== 'rank') color = '#ffee88';
                    const tx = col.align === 'center' ? col.x + col.w/2 : col.x + 4;
                    const cell = this.add.text(tx, y, vals[col.key] || '—', {
                        fontFamily: col.key === 'name' ? 'Orbitron, sans-serif' : 'Share Tech Mono, monospace',
                        fontSize: col.key === 'name' ? '17px' : '16px',
                        fontStyle: col.key === 'name' ? 'bold' : 'normal',
                        color,
                    }).setOrigin(col.align === 'center' ? 0.5 : 0, 0.5);
                    this._lbContainer.add(cell);
                });

                // Combo sub-label (×N times achieved)
                if (p.maxCombo > 0 && p.maxComboCount > 0) {
                    const note = this.add.text(446 + 64/2, y + 18, `×${p.maxComboCount}`, {
                        fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#447744',
                    }).setOrigin(0.5);
                    this._lbContainer.add(note);
                }
                // Active streak indicator
                if ((p.currentStreak||0) > 1) {
                    const pip = this.add.text(646 + 66/2, y + 18, `▲${p.currentStreak}`, {
                        fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#44dd66',
                    }).setOrigin(0.5);
                    this._lbContainer.add(pip);
                }

                g.lineStyle(1, 0x0c1a2e, 1); g.lineBetween(19, y+rowH/2, W-19, y+rowH/2);
            });

            if (profiles.length === 0) {
                const empty = this.add.text(W/2, 320, 'No profiles yet — add players on the Profile screen', {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '16px', color: '#223344',
                }).setOrigin(0.5);
                this._lbContainer.add(empty);
            }
        }
    }

    class ProfileScene extends Phaser.Scene {
        constructor() { super({ key: 'ProfileScene' }); }
        create() {
            document.querySelector('.controls-bar').style.display = 'none';
            document.querySelector('.debug-toggle').style.display = 'none';
            this.cameras.main.setBackgroundColor(0x0a0a14);
            createMenuBG(this);
            setPlayerLabel(1, 'Player 1');
            setPlayerLabel(2, 'Player 2');

            const _modeLabel = gameMode === '1p' ? 'ONE PLAYER' : 'TWO PLAYERS';
            this.add.text(512, 30, `PLAYER PROFILES  ·  ${_modeLabel}`, {
                fontFamily: 'Orbitron, sans-serif', fontSize: '26px', fontStyle: 'bold',
                color: '#ffffff', letterSpacing: 4,
            }).setOrigin(0.5);

            this.add.text(512, 55, gameMode === '1p' ? 'Select your profile to fight the CPU' : 'Select profiles for P1 and P2', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '13px', color: '#778',
            }).setOrigin(0.5);

            // Input for adding new profile
            this.add.text(512, 82, 'Type a name to add a profile', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#667',
            }).setOrigin(0.5);

            // Keyboard shortcuts hint
            this.add.text(512, 118, '[E] emoji  [R] rename  [Del] delete  [X] export  [I] import  [TAB] switch  [ESC] back', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#556677',
            }).setOrigin(0.5);

            this.typingName = '';
            this.typingTxt = this.add.text(512, 100, '> _', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '14px', color: '#ffcc00',
            }).setOrigin(0.5);

            // Keyboard input for typing
            this._pendingTransition = false;
            this._deleteModal = null;
            this._renameModal = null;
            this._emojiModal = null;
            this._exportModal = null;
            this._importModal = null;
            this.input.keyboard.on('keydown', (e) => {
                // Export modal — ESC closes only
                if (this._exportModal) {
                    if (e.key === 'Escape') this.hideExportModal();
                    return;
                }
                // Import modal captures input
                if (this._importModal) {
                    if (e.key === 'Escape') {
                        this.hideImportModal();
                    } else if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        this.doImport();
                    }
                    // Let textarea handle normal typing natively
                    return;
                }
                // Delete confirmation modal captures ALL input when open
                if (this._deleteModal) {
                    if (e.key === 'Escape') {
                        this.hideDeleteModal();
                    } else if (e.key === 'Backspace') {
                        this._deleteModal.typed = this._deleteModal.typed.slice(0, -1);
                        this.updateDeleteModal();
                    } else if (e.key === 'Enter') {
                        if (this._deleteModal.typed.toLowerCase() === 'delete') {
                            const delIdx = this._deleteModal.idx;
                            this.hideDeleteModal();
                            PROFILES.deleteProfile(delIdx);
                            this.p1Sel = Math.min(this.p1Sel, Math.max(0, PROFILES.data.length - 1));
                            this.p2Sel = Math.min(this.p2Sel, Math.max(0, PROFILES.data.length - 1));
                            this.refreshList();
                        }
                    } else if (e.key.length === 1 && this._deleteModal.typed.length < 6) {
                        this._deleteModal.typed += e.key;
                        this.updateDeleteModal();
                    }
                    return;
                }

                // Rename modal captures ALL input when open
                if (this._renameModal) {
                    if (e.key === 'Escape') {
                        this.hideRenameModal();
                    } else if (e.key === 'Backspace') {
                        this._renameModal.newName = this._renameModal.newName.slice(0, -1);
                        this.updateRenameModal();
                    } else if (e.key === 'Enter') {
                        const nn = this._renameModal.newName.trim();
                        if (nn.length > 0) {
                            const duplicate = PROFILES.data.find(p =>
                                p.name.toLowerCase() === nn.toLowerCase() && p.name !== this._renameModal.oldName);
                            if (!duplicate) {
                                // Update name in profile data
                                const prof = PROFILES.data[this._renameModal.idx];
                                prof.name = nn;
                                // Update active session names if they match
                                if (PROFILES.p1Name === this._renameModal.oldName) PROFILES.p1Name = nn;
                                if (PROFILES.p2Name === this._renameModal.oldName) PROFILES.p2Name = nn;
                                PROFILES.save();
                                this.hideRenameModal();
                                this.refreshList();
                            } else {
                                this._renameStatus.setText('Name already taken').setColor('#ff4444');
                            }
                        }
                    } else if (e.key.length === 1 && this._renameModal.newName.length < 16) {
                        this._renameModal.newName += e.key;
                        this.updateRenameModal();
                    }
                    return;
                }

                // Emoji modal captures ALL input when open
                if (this._emojiModal) {
                    if (e.key === 'Escape') {
                        this.hideEmojiModal();
                    } else if (e.key === 'ArrowLeft') {
                        this._emojiModal.sel = (this._emojiModal.sel - 1 + this._emojiModal.emojis.length) % this._emojiModal.emojis.length;
                        this.updateEmojiModal();
                    } else if (e.key === 'ArrowRight') {
                        this._emojiModal.sel = (this._emojiModal.sel + 1) % this._emojiModal.emojis.length;
                        this.updateEmojiModal();
                    } else if (e.key === 'ArrowUp') {
                        this._emojiModal.sel = Math.max(0, this._emojiModal.sel - this._emojiModal.cols);
                        this.updateEmojiModal();
                    } else if (e.key === 'ArrowDown') {
                        this._emojiModal.sel = Math.min(this._emojiModal.emojis.length - 1, this._emojiModal.sel + this._emojiModal.cols);
                        this.updateEmojiModal();
                    } else if (e.key === 'Enter') {
                        const prof = PROFILES.data[this._emojiModal.idx];
                        prof.emoji = this._emojiModal.emojis[this._emojiModal.sel];
                        PROFILES.save();
                        this.hideEmojiModal();
                        this.refreshList();
                    }
                    return;
                }

                // Normal input handling
                if (e.key === 'e' && this.typingName.length === 0) {
                    // Emoji select for selected profile
                    const emoIdx = this.p1Active ? this.p1Sel : this.p2Sel;
                    if (PROFILES.data.length > 0 && emoIdx < PROFILES.data.length) {
                        this._emojiModal = {
                            idx: emoIdx,
                            name: PROFILES.data[emoIdx].name,
                            sel: 0,
                            cols: 10,
                            emojis: ['⚔️','🗡️','🏹','🔮','🤠','🦸','👊','💥','🔥','❄️',
                                     '⚡','🌟','💀','👑','🎮','🕹️','🎯','🚀','🛡️','💎',
                                     '🐉','🦅','🐺','🦁','🐻','🐍','🦊','🐲','🎭','👹',
                                     '😎','😈','🤖','👽','🧙','🧛','🧟','🥷','🏴‍☠️','🎪'],
                        };
                        // Find current emoji in list
                        const curEmoji = PROFILES.data[emoIdx].emoji;
                        const curIdx = this._emojiModal.emojis.indexOf(curEmoji);
                        if (curIdx >= 0) this._emojiModal.sel = curIdx;
                        this.showEmojiModal();
                    }
                } else if (e.key === 'r' && this.typingName.length === 0) {
                    // Rename selected profile (only when not typing a new name)
                    const renIdx = this.p1Active ? this.p1Sel : this.p2Sel;
                    if (PROFILES.data.length > 0 && renIdx < PROFILES.data.length) {
                        this._renameModal = {
                            idx: renIdx,
                            oldName: PROFILES.data[renIdx].name,
                            newName: PROFILES.data[renIdx].name,
                        };
                        this.showRenameModal();
                    }
                } else if (e.key === 'x' && this.typingName.length === 0) {
                    // Export all profile data
                    this.showExportModal();
                } else if (e.key === 'i' && this.typingName.length === 0) {
                    // Import profile data
                    this.showImportModal();
                } else if (e.key === 'Enter') {
                    if (this.typingName.length > 0) {
                        if (PROFILES.addProfile(this.typingName)) {
                            this.typingName = '';
                            if (PROFILES.data.length === 2) this.p2Sel = 1;
                            this.refreshList();
                        }
                    } else if (PROFILES.data.length >= 2 && this.p1Sel !== this.p2Sel) {
                        this._pendingTransition = true;
                    }
                } else if (e.key === 'Backspace') {
                    if (this.typingName.length > 0) {
                        this.typingName = this.typingName.slice(0, -1);
                    }
                } else if (e.key === 'Delete') {
                    const delIdx = this.p1Active ? this.p1Sel : this.p2Sel;
                    if (PROFILES.data.length > 0 && delIdx < PROFILES.data.length) {
                        this._deleteModal = {
                            idx: delIdx,
                            name: PROFILES.data[delIdx].name,
                            typed: '',
                        };
                        this.showDeleteModal();
                    }
                } else if (e.key === 'Tab' || e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
                           e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                    // Handled by Phaser keys in update
                } else if (e.key === 'Escape') {
                    this.scene.start('TitleScene')
                } else if (e.key.length === 1 && this.typingName.length < 16) {
                    this.typingName += e.key;
                }
                this.typingTxt.setText(`> ${this.typingName}_`);
            });

            this.p1Sel = 0; this.p2Sel = gameMode === '1p' ? -1 : Math.max(0, Math.min(1, PROFILES.data.length - 1));
            this.p1Active = true; // Which column is active (true=P1, toggled with TAB)

            // Navigation keys
            this.navUp = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP);
            this.navDown = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN);
            this.navLeft = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT);
            this.navRight = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT);
            this.tabKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.TAB);

            this.listGroup = [];
            this.statusTxt = this.add.text(512, 615, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '14px', fontStyle: 'bold', color: '#ffcc00',
            }).setOrigin(0.5);

            // Handicap display (2P only)
            this.p1HcapTxt = gameMode === '2p' ? this.add.text(300, 173, '', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#3399ff',
            }).setOrigin(0.5) : null;
            this.p2HcapTxt = gameMode === '2p' ? this.add.text(724, 173, '', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#ff4444',
            }).setOrigin(0.5) : null;

            // Column headers
            if (gameMode === '1p') {
                this.add.text(512, 158, 'SELECT YOUR PROFILE', {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '11px', fontStyle: 'bold', color: '#3399ff', letterSpacing: 2,
                }).setOrigin(0.5);
                this.colIndicator = null;
            } else {
                this.add.text(300, 158, 'P1 SELECT', {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '14px', fontStyle: 'bold', color: '#3399ff', letterSpacing: 2,
                }).setOrigin(0.5);
                this.add.text(724, 158, 'P2 SELECT', {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '14px', fontStyle: 'bold', color: '#ff4444', letterSpacing: 2,
                }).setOrigin(0.5);
                this.colIndicator = this.add.text(512, 158, '', {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#889',
                }).setOrigin(0.5);
            }

            this.refreshList();
        }

        refreshList() {
            // Clear old
            this.listGroup.forEach(o => o.destroy());
            this.listGroup = [];

            const profiles = PROFILES.data;
            if (profiles.length === 0) {
                const t = this.add.text(512, 300, 'No profiles yet — type a name above to add one', {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '13px', color: '#556',
                }).setOrigin(0.5);
                this.listGroup.push(t);
                return;
            }

            const y0 = 197; const rowH = 42;
            const is1P = gameMode === '1p';
            const maxVisible = Math.min(profiles.length, 10);
            for (let i = 0; i < maxVisible; i++) {
                const p = profiles[i];
                // In 1P mode, center the single column
                const p1cx = is1P ? 512 : 300;
                const p1ex = is1P ? 367 : 155;
                const p1nx = is1P ? 527 : 315;
                const y = y0 + i * rowH;
                const rate = PROFILES.winRate(p);
                const total = p.wins + p.losses;
                const statStr = total > 0 ? `${p.wins}W ${p.losses}L  (${rate}%)` : 'No games';
                const emojiSize = rowH - 8;

                // P1 column
                const p1Box = this.add.rectangle(p1cx, y, 320, rowH - 4, 0x111122, 0.5).setDepth(0);
                p1Box.setStrokeStyle(1, 0x222244);
                const p1Emoji = this.add.text(p1ex, y, p.emoji || '⚔️', { fontSize: `${emojiSize}px` }).setOrigin(0.5).setDepth(1);
                const p1Name = this.add.text(p1nx, y - 7, p.name, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#bbccdd',
                }).setOrigin(0.5);
                const p1Stats = this.add.text(p1nx, y + 9, statStr, {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#778',
                }).setOrigin(0.5);
                this.listGroup.push(p1Box, p1Emoji, p1Name, p1Stats);
                p1Box._profileIdx = i;

                if (!is1P) {
                    // P2 column — 2P mode only
                    const p2Box = this.add.rectangle(724, y, 320, rowH - 4, 0x111122, 0.5).setDepth(0);
                    p2Box.setStrokeStyle(1, 0x222244);
                    const p2Emoji = this.add.text(579, y, p.emoji || '⚔️', { fontSize: `${emojiSize}px` }).setOrigin(0.5).setDepth(1);
                    const p2Name = this.add.text(739, y - 7, p.name, {
                        fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#bbccdd',
                    }).setOrigin(0.5);
                    const p2Stat = this.add.text(739, y + 9, statStr, {
                        fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#778',
                    }).setOrigin(0.5);
                    this.listGroup.push(p2Box, p2Emoji, p2Name, p2Stat);
                    p2Box._profileIdx = i;
                }
            }
        }

        update() {
            updateMenuBG(this);
            // Block all interaction while modal is open
            if (this._deleteModal || this._renameModal || this._emojiModal || this._exportModal || this._importModal) return;

            const profiles = PROFILES.data;
            if (profiles.length === 0) {
                this.statusTxt.setText('Add at least 2 profiles to play');
                this.statusTxt.setColor('#ff6644');
                if (this._charStatGroup) { this._charStatGroup.forEach(o => o.destroy()); this._charStatGroup = []; }
                return;
            }

            // Navigation
            const is1P = gameMode === '1p';
            if (!is1P && Phaser.Input.Keyboard.JustDown(this.tabKey)) {
                this.p1Active = !this.p1Active;
            }
            if (Phaser.Input.Keyboard.JustDown(this.navUp)) {
                if (is1P || this.p1Active) this.p1Sel = (this.p1Sel - 1 + profiles.length) % profiles.length;
                else this.p2Sel = (this.p2Sel - 1 + profiles.length) % profiles.length;
            }
            if (Phaser.Input.Keyboard.JustDown(this.navDown)) {
                if (is1P || this.p1Active) this.p1Sel = (this.p1Sel + 1) % profiles.length;
                else this.p2Sel = (this.p2Sel + 1) % profiles.length;
            }
            if (is1P) {
                // 1P: ←→ adjusts CPU difficulty
                if (Phaser.Input.Keyboard.JustDown(this.navLeft))  cpuDifficulty = Math.max(1, cpuDifficulty - 1);
                if (Phaser.Input.Keyboard.JustDown(this.navRight)) cpuDifficulty = Math.min(9, cpuDifficulty + 1);
                cpuEnabled = true;
                this.p2Sel = -1;
            } else {
                // 2P: ←→ adjusts handicap
                if (Phaser.Input.Keyboard.JustDown(this.navLeft)) {
                    if (this.p1Active) PROFILES.p1Handicap = Math.max(0, PROFILES.p1Handicap - 1);
                    else PROFILES.p2Handicap = Math.max(0, PROFILES.p2Handicap - 1);
                }
                if (Phaser.Input.Keyboard.JustDown(this.navRight)) {
                    if (this.p1Active) PROFILES.p1Handicap = Math.min(9, PROFILES.p1Handicap + 1);
                    else PROFILES.p2Handicap = Math.min(9, PROFILES.p2Handicap + 1);
                }
                cpuEnabled = false;
                const hcBar = (level) => {
                    if (level === 0) return '◀ OFF ▶';
                    return '◀ ' + '█'.repeat(level) + '░'.repeat(9 - level) + ' ▶  Lv' + level;
                };
                if (this.p1HcapTxt) this.p1HcapTxt.setText('Handicap: ' + hcBar(PROFILES.p1Handicap));
                if (this.p2HcapTxt) this.p2HcapTxt.setText('Handicap: ' + hcBar(PROFILES.p2Handicap));
            }

            // colIndicator intentionally blank until SelectScene

            // Highlight selected rows
            const y0 = 197; const rowH = 42;
            this.listGroup.forEach(o => {
                if (o.type === 'Rectangle') {
                    const idx = o._profileIdx;
                    if (idx === undefined) return;
                    const cx = o.x;
                    const isP1Col = cx <= 512;
                    const isSelected = isP1Col ? idx === this.p1Sel : idx === this.p2Sel;
                    const selColor = isP1Col ? 0x3399ff : 0xff4444;
                    o.setStrokeStyle(isSelected ? 2 : 1, isSelected ? selColor : 0x222244);
                    o.setFillStyle(isSelected ? 0x1a1a33 : 0x111122, isSelected ? 0.8 : 0.5);
                }
            });

            // Show selected profile's character stats
            this.drawCharStats();

            // Status
            const CPU_DIFF_LABELS = ['','NOVICE','BEGINNER','CASUAL','INTERMEDIATE','STANDARD','ADVANCED','EXPERT','MASTER','LEGENDARY'];
            if (is1P) {
                if (profiles.length < 1) {
                    this.statusTxt.setText('Add a profile to play');
                    this.statusTxt.setColor('#ff6644');
                } else {
                    this.statusTxt.setText(`CPU  ${cpuDifficulty} ${CPU_DIFF_LABELS[cpuDifficulty]}   ←→ difficulty   ENTER to fight`);
                    this.statusTxt.setColor('#ffcc00');
                    this.statusTxt.setAlpha(0.7 + Math.sin(this.time.now * 0.005) * 0.3);
                }
            } else if (profiles.length < 2) {
                this.statusTxt.setText('Add at least 2 profiles to play');
                this.statusTxt.setColor('#ff6644');
            } else if (this.p1Sel === this.p2Sel) {
                this.statusTxt.setText('P1 and P2 must be different profiles');
                this.statusTxt.setColor('#ff6644');
            } else {
                this.statusTxt.setText('PRESS ENTER TO SELECT FIGHTERS');
                this.statusTxt.setColor('#ffcc00');
                this.statusTxt.setAlpha(0.7 + Math.sin(this.time.now * 0.005) * 0.3);
            }

            // Handle pending scene transition (set by keydown handler)
            if (this._pendingTransition) {
                this._pendingTransition = false;
                const profiles = PROFILES.data;
                const cpuSlot = this.p2Sel === -1;
                const valid = cpuSlot
                    ? profiles.length >= 1
                    : profiles.length >= 2 && this.p1Sel !== this.p2Sel;
                if (valid) {
                    PROFILES.p1Name = profiles[this.p1Sel].name;
                    PROFILES.p2Name = cpuSlot ? 'CPU' : profiles[this.p2Sel].name;
                    SCORE.p1 = 0; SCORE.p2 = 0;
                    this.scene.start('SelectScene');
                }
            }
        }

        drawCharStats() {
            // Clean old stat texts
            if (this._charStatGroup) this._charStatGroup.forEach(o => o.destroy());
            this._charStatGroup = [];

            const drawFor = (profileIdx, cx, color) => {
                if (profileIdx < 0 || profileIdx >= PROFILES.data.length) return;
                const p = PROFILES.data[profileIdx];
                const y0 = 197 + Math.min(PROFILES.data.length, 10) * 42 + 10;
                if (y0 > 560) return; // Not enough room

                const header = this.add.text(cx, y0, `${p.name}'s Character Stats`, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '20px', fontStyle: 'bold', color, letterSpacing: 1,
                }).setOrigin(0.5);
                this._charStatGroup.push(header);

                CHAR_KEYS.forEach((k, i) => {
                    const c = p.chars[k] || { played: 0, wins: 0, losses: 0 };
                    const y = y0 + 30 + i * 28;
                    const str = c.played > 0
                        ? `${CHARACTERS[k].name}: ${c.played} played · ${c.wins}W ${c.losses}L`
                        : `${CHARACTERS[k].name}: —`;
                    const t = this.add.text(cx, y, str, {
                        fontFamily: 'Share Tech Mono, monospace', fontSize: '17px', color: '#778',
                    }).setOrigin(0.5);
                    this._charStatGroup.push(t);
                });
            };
            const _statCx = gameMode === '1p' ? 512 : 300;
            drawFor(this.p1Sel, _statCx, '#3399ff');
            if (gameMode !== '1p') drawFor(this.p2Sel, 724, '#ff4444');

            // TAB active-column indicator — 2P only
            if (gameMode !== '1p') {
                const statsBottom = 197 + Math.min(PROFILES.data.length, 10) * 42 + 10
                    + 30 + CHAR_KEYS.length * 28 + 10;
                const arrowY = Math.min(statsBottom, 570);
                const isP1 = this.p1Active;
                const arrowCol  = isP1 ? '#3399ff' : '#ff4444';
                const arrowHex  = isP1 ? 0x3399ff  : 0xff4444;
                const arrowX    = isP1 ? 300 : 724;
                const arrowTxt  = isP1 ? '▲  P1 ACTIVE  ▲' : '▲  P2 ACTIVE  ▲';

                div.lineStyle(1, 0x223344, 0.5);
                div.lineBetween(100, arrowY - 8, 924, arrowY - 8);
                this._charStatGroup.push(div);

                // pulsing arrow label
                const pulse = 0.65 + Math.sin(this.time.now * 0.005) * 0.35;
                const arrow = this.add.text(arrowX, arrowY + 10, arrowTxt, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '13px', fontStyle: 'bold',
                    color: arrowCol, letterSpacing: 3,
                }).setOrigin(0.5).setAlpha(pulse);
                this._charStatGroup.push(arrow);

                // small bracket graphics flanking the arrow
                const g2 = this.add.graphics();
                g2.lineStyle(2, arrowHex, pulse * 0.7);
                const bw = 80, bh = 14, bx = arrowX - bw/2 - 12, by = arrowY + 3;
                g2.lineBetween(bx, by, bx + 10, by);
                g2.lineBetween(bx, by, bx, by + bh);
                const bx2 = arrowX + bw/2 + 12;
                g2.lineBetween(bx2, by, bx2 - 10, by);
                g2.lineBetween(bx2, by, bx2, by + bh);
                this._charStatGroup.push(g2);

                const tabHint = this.add.text(512, arrowY + 32, '[TAB] switch active column', {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#445566',

        doImport() {
            if (!this._importTA) return;
            const raw = this._importTA.value.trim();
            if (!raw) { if (this._importStatusTxt) this._importStatusTxt.setText('Nothing pasted!').setColor('#ff6644'); return; }
            let parsed;
            try { parsed = JSON.parse(raw); } catch(e) {
                if (this._importStatusTxt) this._importStatusTxt.setText('Invalid JSON — check your paste').setColor('#ff4444');
                return;
            }
            if (!Array.isArray(parsed)) {
                if (this._importStatusTxt) this._importStatusTxt.setText('Expected an array of profiles').setColor('#ff4444');
                return;
            }
            let added = 0, updated = 0;
            parsed.forEach(incoming => {
                if (!incoming.name) return;
                // Ensure all char keys
                if (!incoming.chars) incoming.chars = {};
                CHAR_KEYS.forEach(k => { if (!incoming.chars[k]) incoming.chars[k] = { played: 0, wins: 0, losses: 0 }; });
                const existing = PROFILES.data.find(p => p.name === incoming.name);
                if (existing) {
                    Object.assign(existing, incoming);
                    updated++;
                } else {
                    PROFILES.data.push(incoming);
                    added++;
                }
            });
            PROFILES.save();
            const msg = `✓ Imported! ${added} added, ${updated} updated`;
            if (this._importStatusTxt) this._importStatusTxt.setText(msg).setColor('#44ff88');
            setTimeout(() => { this.hideImportModal(); this.refreshList(); }, 1600);
        }

        hideImportModal() {
            this._importModal = false;
            if (this._importGroup) { this._importGroup.forEach(o => o.destroy()); this._importGroup = null; }
            if (this._importTA)   { this._importTA.remove();   this._importTA = null; }
            if (this._importBtn)  { this._importBtn.remove();  this._importBtn = null; }
            this._importStatusTxt = null;
        }
    }

    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
        return (ax - aw/2) < (bx + bw/2) && (ax + aw/2) > (bx - bw/2) &&
               (ay - ah/2) < (by + bh/2) && (ay + ah/2) > (by - bh/2);
    }

    // Knockback formula with rage/scaling: more damage = more KB received
    function calcKnockback(atkData, defenderDamage) {
        const base = atkData.baseKnockback;
        const growth = atkData.knockbackGrowth;
        const scaling = FIGHTER_CONFIG.baseKnockbackScaling;
        // Rage multiplier: at 0% = 1.0, at 150% = 1.6, exponential curve
        const rageMult = 1.0 + Math.pow(defenderDamage / 150, 1.5) * 0.6;
        return (base + (defenderDamage * growth * scaling / 100)) * rageMult;
    }

    class SelectScene extends Phaser.Scene {

            if (p2Controls) p2Controls.style.display = cpuEnabled ? 'none' : 'flex';
            this.cameras.main.setBackgroundColor(0x0a0a14);
            createMenuBG(this);

            this.p1Sel = 0;

            this.cpuRandom = cpuEnabled; // CPU starts on random pick
            this.p1Locked = false;
            this.p2Locked = cpuEnabled; // CPU auto-locks its char
            const numChars = CHAR_KEYS.length;
            const cardH = Math.min(74, Math.floor((600 - 108) / numChars));
            const y0 = 108;

            // Scoreboard
            const scoreStr = SCORE.p1 + SCORE.p2 > 0
                ? `${PROFILES.p1Name}  ${SCORE.p1} — ${SCORE.p2}  ${PROFILES.p2Name}`
                : '';
            this.scoreTxt = this.add.text(512, 56, scoreStr, {
                fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#889',
            }).setOrigin(0.5);
            if (SCORE.p1 + SCORE.p2 > 0) {
                this.add.text(512, 72, 'Press Backspace to reset score', {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#556',
                }).setOrigin(0.5);
            }
            this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.BACKSPACE).on('down', () => {
                SCORE.p1 = 0; SCORE.p2 = 0;
                this.scoreTxt.setText('');
            });

            // Controls hint — shown here (post-profile-select) for the first time
            const ctrlHint = gameMode === '1p'
                ? 'W/S to choose · F to lock'
                : 'P1: W/S · F lock     P2: ↑↓ · , lock';
            this.add.text(512, 72, ctrlHint, {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '13px', color: '#556',
            }).setOrigin(0.5);

            this.p1Cursor = this.add.text(0, 0, `▶ ${PROFILES.p1Name}`, {
                fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#3399ff',
            }).setOrigin(1, 0.5).setDepth(10);
            this.p2Cursor = this.add.text(0, 0, cpuEnabled ? '🤖 CPU ◀' : `${PROFILES.p2Name} ◀`, {
                fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#ff4444',
            }).setOrigin(0, 0.5).setDepth(10);

            this.p1LockTxt = this.add.text(200, 580, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#556',
            }).setOrigin(0.5);
            this.p2LockTxt = this.add.text(824, 580, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#556',
            }).setOrigin(0.5);
            // Extra line for CPU difficulty — shown below p2LockTxt in 1P mode
            this.cpuDiffTxt = this.add.text(824, 597, '', {
                fontFamily: 'Share Tech Mono, monospace', fontSize: '11px', color: '#ff8844',
            }).setOrigin(0.5);
            this.startPrompt = this.add.text(512, 615, '', {
                fontFamily: 'Orbitron, sans-serif', fontSize: '18px', fontStyle: 'bold', color: '#ffcc00',
            }).setOrigin(0.5);

            this.charBoxes = [];
            this.cardY0 = y0; this.cardH = cardH;
            CHAR_KEYS.forEach((key, i) => {
                const ch = CHARACTERS[key];
                const y = y0 + i * cardH;
                const box = this.add.rectangle(512, y, 540, cardH - 8, 0x111122, 0.5);
                box.setStrokeStyle(1, 0x222244); this.charBoxes.push(box);

                this.add.text(512, y - 18, ch.name, {
                    fontFamily: 'Orbitron, sans-serif', fontSize: '15px', fontStyle: 'bold', color: '#bbccdd',
                }).setOrigin(0.5);
                this.add.text(512, y - 4, ch.desc, {
                    fontFamily: 'Share Tech Mono, monospace', fontSize: '10px', color: '#778',
                }).setOrigin(0.5);
                const pT = (a) => a.projectile ? (a.lasso ? ' ⟠' : (a.freeze ? ' ❄' : ' ⟡')) : (a.flyUp ? ' ↑' : '');
                const l1 = `Jab: ${ch.jab.name}${pT(ch.jab)}  ·  Sp: ${ch.strong.name}${pT(ch.strong)}  ·  M3: ${ch.move3.name}${pT(ch.move3)}  ·  M4: ${ch.move4.name}${pT(ch.move4)}`;
                const l2 = `Air: ${ch.airJab.name}${pT(ch.airJab)}  ·  AirSp: ${ch.airStrong.name}${pT(ch.airStrong)}  ·  AirM3: ${ch.airMove3.name}${pT(ch.airMove3)}  ·  AirM4: ${ch.airMove4.name}${pT(ch.airMove4)}`;
                this.add.text(512, y + 9, l1, { fontFamily: 'Share Tech Mono, monospace', fontSize: '9px', color: '#667' }).setOrigin(0.5);
                this.add.text(512, y + 19, l2, { fontFamily: 'Share Tech Mono, monospace', fontSize: '9px', color: '#667' }).setOrigin(0.5);
            });

            // Glint sweep layer — drawn above charBoxes
            this.glintGfx = this.add.graphics().setDepth(9);
            this._glintT = -1;          // -1 = idle, 0..1 = sweeping
            this._glintCooldown = 180;  // frames until first glint (3s head start)

            this.p1Keys = { up: this.input.keyboard.addKey('W'), down: this.input.keyboard.addKey('S'), lock: this.input.keyboard.addKey('F') };
            this.p2Keys = {
                up: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
                down: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN),
                left: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
                right: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
                lock: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.COMMA),
            };
            this.enterKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ENTER);
            this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC).on('down', () => {
                this.scene.start('ProfileScene');
            });
        }
        update() {
            updateMenuBG(this);
            const nav = (sel, locked, keys) => {
                if (!locked) {
                    if (Phaser.Input.Keyboard.JustDown(keys.up)) sel = (sel - 1 + CHAR_KEYS.length) % CHAR_KEYS.length;
                    if (Phaser.Input.Keyboard.JustDown(keys.down)) sel = (sel + 1) % CHAR_KEYS.length;
                }
                return sel;
            };
            if (!this.p1Locked) {
                this.p1Sel = nav(this.p1Sel, false, this.p1Keys);
                if (Phaser.Input.Keyboard.JustDown(this.p1Keys.lock)) this.p1Locked = true;
            } else {
                if (Phaser.Input.Keyboard.JustDown(this.p1Keys.up) || Phaser.Input.Keyboard.JustDown(this.p1Keys.down)) this.p1Locked = false;
            }
            if (cpuEnabled) {
                // CPU: ↑↓ arrow keys let player override character, any pick auto-locks
                const cpuUp   = Phaser.Input.Keyboard.JustDown(this.p2Keys.up);
                const cpuDown = Phaser.Input.Keyboard.JustDown(this.p2Keys.down);
                const cpuLeft  = Phaser.Input.Keyboard.JustDown(this.p2Keys.left);
                const cpuRight = Phaser.Input.Keyboard.JustDown(this.p2Keys.right);
                if (cpuUp || cpuDown) {
                    this.cpuRandom = false;
                    // Step p2Sel directly — nav() re-checks JustDown which is already spent
                    if (cpuUp)   this.p2Sel = (this.p2Sel - 1 + CHAR_KEYS.length) % CHAR_KEYS.length;
                    if (cpuDown) this.p2Sel = (this.p2Sel + 1) % CHAR_KEYS.length;
                    this.p2Locked = true;
                }
                // ←→ adjust CPU difficulty level
                if (cpuLeft)  cpuDifficulty = Math.max(1, cpuDifficulty - 1);
                if (cpuRight) cpuDifficulty = Math.min(9, cpuDifficulty + 1);
            } else {
                if (!this.p2Locked) {
                    this.p2Sel = nav(this.p2Sel, false, this.p2Keys);
                    if (Phaser.Input.Keyboard.JustDown(this.p2Keys.lock)) this.p2Locked = true;
                } else {
                    if (Phaser.Input.Keyboard.JustDown(this.p2Keys.up) || Phaser.Input.Keyboard.JustDown(this.p2Keys.down)) this.p2Locked = false;
                }
            }

            this.p1Cursor.setPosition(228, this.cardY0 + this.p1Sel * this.cardH);
            this.p2Cursor.setPosition(796, this.cardY0 + this.p2Sel * this.cardH);

            this.charBoxes.forEach((box, i) => {
                let s = 0x222244;
                if (i === this.p1Sel && i === this.p2Sel) s = 0xcc88ff;
                else if (i === this.p1Sel) s = 0x3399ff;
                else if (i === this.p2Sel) s = 0xff4444;
                box.setStrokeStyle(i === this.p1Sel || i === this.p2Sel ? 2 : 1, s);
            });
            this.p1LockTxt.setText(this.p1Locked ? `✓ ${CHARACTERS[CHAR_KEYS[this.p1Sel]].name}` : 'Press F to lock');
            if (cpuEnabled) {
                const cpuCharName = CHARACTERS[CHAR_KEYS[this.p2Sel]].name;
                const CPU_DIFF_LABELS = ['','NOVICE','BEGINNER','CASUAL','INTERMEDIATE','STANDARD','ADVANCED','EXPERT','MASTER','LEGENDARY'];
                const diffLabel = `LV${cpuDifficulty} ${CPU_DIFF_LABELS[cpuDifficulty]}`;
                this.p2LockTxt.setText(this.cpuRandom ? `🤖 CPU — ${cpuCharName} (RANDOM)` : `🤖 CPU — ${cpuCharName}  ↑↓ char`);
                this.p2LockTxt.setColor('#ff8844');
                this.cpuDiffTxt.setText(`◀▶ difficulty: ${diffLabel}`);
            } else {
                this.p2LockTxt.setText(this.p2Locked ? `✓ ${CHARACTERS[CHAR_KEYS[this.p2Sel]].name}` : 'Press , to lock');
                this.p2LockTxt.setColor(this.p2Locked ? '#ff4444' : '#667');
                this.cpuDiffTxt.setText('');
            }
            this.p1LockTxt.setColor(this.p1Locked ? '#3399ff' : '#667');

            // ── Glint sweep on selected rows ─────────────────────────────────
            // Fires once every 12–18 s (random). Sweeps across in ~55 frames.
            this.glintGfx.clear();
            if (this._glintT < 0) {
                // Idle: count down to next trigger
                this._glintCooldown--;
                if (this._glintCooldown <= 0) {
                    this._glintT = 0;
                    // Next cooldown: 12–18 s at 60 fps = 720–1080 frames
                    this._glintCooldown = 720 + Math.floor(Math.random() * 360);
                }
            } else {
                // Active sweep: advance t over 55 frames then go idle
                this._glintT += 1 / 55;
                if (this._glintT >= 1) this._glintT = -1;
            }
            if (this._glintT >= 0) {
                const glintRows = [...new Set([this.p1Sel, this.p2Sel])];
                glintRows.forEach(ri => {
                    const bx = 512, by = this.cardY0 + ri * this.cardH;
                    const bw = 540, bh = this.cardH - 8;
                    const L = bx - bw/2, R = bx + bw/2;
                    const T = by - bh/2, B = by + bh/2;
                    // Stripe centre travels from L to R across the box width only
                    const sw = 44;
                    const skew = bh * 0.38;
                    // cx goes from L-sw/2 to R+sw/2 so stripe fully enters & exits
                    const cx = (L - sw/2) + this._glintT * (bw + sw);
                    // The parallelogram corners (before clipping):
                    //   top-left=(cx-sw/2, T), top-right=(cx+sw/2, T)
                    //   bot-right=(cx+sw/2-skew, B), bot-left=(cx-sw/2-skew, B)
                    // Clamp all x coords to [L, R] and draw only what's inside
                    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
                    const txL = clamp(cx - sw/2, L, R);
                    const txR = clamp(cx + sw/2, L, R);
                    const bxL = clamp(cx - sw/2 - skew, L, R);
                    const bxR = clamp(cx + sw/2 - skew, L, R);
                    if (txR > txL || bxR > bxL) {
                        this.glintGfx.fillStyle(0xffffff, 0.055);
                        this.glintGfx.fillTriangle(txL, T, txR, T, bxR, B);
                        this.glintGfx.fillTriangle(txL, T, bxR, B, bxL, B);
                        // Leading edge hairline — stays inside box
                        const leX1 = clamp(cx + sw/2, L, R);
                        const leX2 = clamp(cx + sw/2 - skew, L, R);
                        this.glintGfx.lineStyle(1, 0xffffff, 0.22);
                        this.glintGfx.lineBetween(leX1, T, leX2, B);
                    }
                });
            }

            if (this.p1Locked && (this.p2Locked || cpuEnabled)) {
                this.startPrompt.setText('PRESS ENTER TO FIGHT!');
                this.startPrompt.setAlpha(0.7 + Math.sin(this.time.now * 0.005) * 0.3);
                if (Phaser.Input.Keyboard.JustDown(this.enterKey)) {
                    const p1Key = CHAR_KEYS[this.p1Sel], p2Key = CHAR_KEYS[this.p2Sel];
                    setPlayerLabel(1, `${PROFILES.p1Name} (${CHARACTERS[p1Key].name})`);
                    const CPU_DIFF_LABELS = ['','NOVICE','BEGINNER','CASUAL','INTERMEDIATE','STANDARD','ADVANCED','EXPERT','MASTER','LEGENDARY'];
                    const p2Label = cpuEnabled
                        ? `${PROFILES.p2Name} (${CHARACTERS[p2Key].name}) LV${cpuDifficulty}`
                        : `${PROFILES.p2Name} (${CHARACTERS[p2Key].name})`;
                    setPlayerLabel(2, p2Label);
                    this.scene.start('LevelScene', { p1Char: p1Key, p2Char: p2Key });
                }
            } else {
                this.startPrompt.setText('Both players lock in to start'); this.startPrompt.setAlpha(0.3);
            }
        }
    }

    // ============================================================
    // PROJECTILE
    // ============================================================
    class Projectile {
        constructor(scene, x, y, attackData, ownerIndex, facing, angleOverride) {
            this.scene = scene; this.ownerIndex = ownerIndex;
            this.attackData = attackData; this.alive = true; this.reflected = false;
            this.isLasso = !!attackData.lasso;
            this.isFreeze = !!attackData.freeze;
            this.facing = facing;
            this.charKey = ownerIndex === 0 ? scene.p1Char : scene.p2Char;

            const angleDeg = angleOverride !== undefined ? angleOverride : (attackData.projAngle || 0);
            const angleRad = (angleDeg * Math.PI) / 180;
            if (attackData.projSpeed === 0) { this.vx = 0; this.vy = 0; }
            else {
                this.vx = Math.cos(angleRad) * attackData.projSpeed * facing;
                this.vy = -Math.sin(angleRad) * attackData.projSpeed;
            }
            this.gravity = attackData.projGravity || 0;
            this.x = x; this.y = y;
            this.w = attackData.projWidth; this.h = attackData.projHeight;
            this.startX = x; this.maxDist = attackData.projMaxDist;
            this.spawnX = x; this.spawnY = y; // For lasso rope

            // Visual: use Graphics instead of rectangle for better looks
            this.gfx = scene.add.graphics().setDepth(8);
            this.trailTimer = 0;
            this.age = 0;
        }
        draw() {
            if (!this.gfx) return;
            this.gfx.clear();
            const g = this.gfx;
            const hw = this.w / 2, hh = this.h / 2;
            const pCol = this.ownerIndex === 0 ? 0x66bbff : 0xff7766;

            if (this.isLasso) {
                // Lasso: rope loop
                const owner = this.ownerIndex === 0 ? this.scene.p1 : this.scene.p2;
                // Rope from cowboy to lasso
                if (owner && owner.state !== 'dead') {
                    g.lineStyle(2, 0xddaa44, 0.6);
                    g.lineBetween(owner.sprite.x + owner.facing * 10, owner.sprite.y - 5, this.x, this.y);
                }
                // Lasso loop
                g.lineStyle(3, 0xddaa44, 0.9);
                g.strokeCircle(this.x, this.y, this.w * 0.6);
                g.lineStyle(1.5, 0xffdd66, 0.5);
                g.strokeCircle(this.x, this.y, this.w * 0.4);
            } else if (this.isFreeze) {
                // Freeze: icy crystal
                g.fillStyle(0x88ddff, 0.7);
                g.fillCircle(this.x, this.y, hw);
                g.lineStyle(2, 0xccffff, 0.9);
                g.strokeCircle(this.x, this.y, hw);
                // Ice sparkles
                for (let i = 0; i < 4; i++) {
                    const a = (i / 4) * Math.PI * 2 + this.age * 0.15;
                    const r = hw * 1.3;
                    g.fillStyle(0xffffff, 0.7);
                    g.fillCircle(this.x + Math.cos(a) * r, this.y + Math.sin(a) * r, 1.5);
                }
            } else if (this.charKey === 'bowman') {
                // Arrow: pointed shaft with fletching
                const angle = Math.atan2(this.vy, this.vx);
                const len = this.w;
                const tipX = this.x + Math.cos(angle) * len / 2;
                const tipY = this.y + Math.sin(angle) * len / 2;
                const tailX = this.x - Math.cos(angle) * len / 2;
                const tailY = this.y - Math.sin(angle) * len / 2;
                // Shaft
                g.lineStyle(2, 0xcc9944, 1);
                g.lineBetween(tailX, tailY, tipX, tipY);
                // Arrowhead
                g.fillStyle(0xdddddd, 1);
                const perpX = -Math.sin(angle) * 4;
                const perpY = Math.cos(angle) * 4;
                g.fillTriangle(tipX, tipY, tipX - Math.cos(angle) * 6 + perpX, tipY - Math.sin(angle) * 6 + perpY,
                    tipX - Math.cos(angle) * 6 - perpX, tipY - Math.sin(angle) * 6 - perpY);
                // Fletching
                g.lineStyle(1, 0xff4444, 0.8);
                g.lineBetween(tailX, tailY, tailX + perpX * 1.5, tailY + perpY * 1.5);
                g.lineBetween(tailX, tailY, tailX - perpX * 1.5, tailY - perpY * 1.5);
            } else if (this.charKey === 'wizard') {
                // Magic: glowing orb with particle ring
                const name = this.attackData.name || '';
                if (name === 'Fireball') {
                    // Fireball: orange/yellow core with flame aura
                    g.fillStyle(0xff6600, 0.9);
                    g.fillCircle(this.x, this.y, hw);
                    g.fillStyle(0xffcc00, 0.6);
                    g.fillCircle(this.x - this.vx * 0.01, this.y, hw * 0.6);
                    g.lineStyle(2, 0xff3300, 0.8);
                    g.strokeCircle(this.x, this.y, hw + 2 + Math.sin(this.age * 0.3) * 2);
                    // Flame trail wisps
                    for (let i = 0; i < 3; i++) {
                        const a = this.age * 0.2 + i * 2;
                        g.fillStyle(0xff9933, 0.4);
                        g.fillCircle(this.x - this.vx * 0.02 + Math.sin(a) * 4, this.y + Math.cos(a) * 4, 3);
                    }
                } else if (name === 'Meteor') {
                    // Meteor: large fiery rock
                    g.fillStyle(0x884422, 0.9);
                    g.fillCircle(this.x, this.y, hw);
                    g.fillStyle(0xff6600, 0.7);
                    g.fillCircle(this.x - 2, this.y - 2, hw * 0.7);
                    g.lineStyle(2, 0xff3300, 1);
                    g.strokeCircle(this.x, this.y, hw + 1);
                    // Flame tail going up
                    for (let i = 0; i < 4; i++) {
                        const yOff = -hw - i * 5 - Math.sin(this.age * 0.3 + i) * 3;
                        g.fillStyle(0xff6600, 0.5 - i * 0.1);
                        g.fillCircle(this.x + Math.sin(this.age * 0.4 + i) * 3, this.y + yOff, 4 - i * 0.5);
                    }
                } else if (name === 'Thunder Drop') {
                    // Electric bolt
                    g.fillStyle(0xffff44, 0.8);
                    g.fillCircle(this.x, this.y, hw);
                    g.lineStyle(2, 0xffffaa, 0.9);
                    g.strokeCircle(this.x, this.y, hw + Math.sin(this.age * 0.5) * 3);
                    // Lightning sparks
                    for (let i = 0; i < 3; i++) {
                        const a = this.age * 0.3 + i * 2.1;
                        const r = hw * 1.5;
                        g.lineStyle(1, 0xffff88, 0.6);
                        g.lineBetween(this.x, this.y, this.x + Math.cos(a) * r, this.y + Math.sin(a) * r);
                    }
                } else if (name === 'Void Rift') {
                    // Dark purple vortex
                    g.fillStyle(0x6600cc, 0.7);
                    g.fillCircle(this.x, this.y, hw);
                    g.lineStyle(2, 0xaa44ff, 0.9);
                    for (let i = 0; i < 3; i++) {
                        g.strokeCircle(this.x, this.y, hw * (0.5 + i * 0.3) + Math.sin(this.age * 0.2 + i) * 2);
                    }
                    g.fillStyle(0x220044, 0.8);
                    g.fillCircle(this.x, this.y, hw * 0.4);
                } else {
                    // Generic magic projectile
                    g.fillStyle(0x9944ff, 0.7);
                    g.fillCircle(this.x, this.y, hw);
                    g.lineStyle(1.5, 0xcc88ff, 0.8);
                    g.strokeCircle(this.x, this.y, hw + 2);
                }
            } else if (this.charKey === 'cowboy') {
                // Bullets: small bright muzzle flash style
                const name = this.attackData.name || '';
                if (name === 'Dynamite Toss') {
                    // Dynamite stick
                    g.fillStyle(0xcc3300, 0.9);
                    g.fillRect(this.x - 5, this.y - 8, 10, 16);
                    g.lineStyle(1, 0x660000, 1);
                    g.strokeRect(this.x - 5, this.y - 8, 10, 16);
                    // Fuse spark
                    g.fillStyle(0xffcc00, 0.9);
                    g.fillCircle(this.x, this.y - 10, 3 + Math.sin(this.age * 0.5) * 1.5);
                    g.fillStyle(0xff6600, 0.6);
                    g.fillCircle(this.x + Math.sin(this.age * 0.7) * 2, this.y - 13, 2);
                } else {
                    // Bullet
                    const angle = Math.atan2(this.vy, this.vx);
                    g.fillStyle(0xffdd44, 1);
                    g.fillCircle(this.x, this.y, 3);
                    g.lineStyle(1.5, 0xffff88, 0.8);
                    g.lineBetween(this.x, this.y, this.x - Math.cos(angle) * 8, this.y - Math.sin(angle) * 8);
                    g.fillStyle(0xffffff, 0.5);
                    g.fillCircle(this.x + Math.cos(angle) * 2, this.y + Math.sin(angle) * 2, 1.5);
                }
            } else if (this.charKey === 'superguy') {
                // Laser: bright beam segment
                const name = this.attackData.name || '';
                if (this.isFreeze) {
                    // Already handled above
                } else {
                    // Laser beam
                    const angle = Math.atan2(this.vy, this.vx);
                    g.lineStyle(4, 0xff2200, 0.9);
                    g.lineBetween(this.x - Math.cos(angle) * hw, this.y - Math.sin(angle) * hh,
                                  this.x + Math.cos(angle) * hw, this.y + Math.sin(angle) * hh);
                    g.lineStyle(2, 0xff8844, 0.7);
                    g.lineBetween(this.x - Math.cos(angle) * hw, this.y - Math.sin(angle) * hh,
                                  this.x + Math.cos(angle) * hw, this.y + Math.sin(angle) * hh);
                    g.fillStyle(0xffcc44, 0.9);
                    g.fillCircle(this.x + Math.cos(angle) * hw, this.y + Math.sin(angle) * hh, 3);
                }
            } else if (this.charKey === 'osprey') {
                // Tornado — spinning funnel cloud
                const spin = this.age * 0.18;
                const r = hw * 0.9;
                // Funnel layers (wide at top, narrow at bottom)
                for (let layer = 0; layer < 4; layer++) {
                    const t = layer / 3;
                    const layerR = r * (1 - t * 0.65);
                    const layerY = this.y - hh + layer * (hh * 2 / 3);
                    const alpha = 0.7 - t * 0.2;
                    const col = layer % 2 === 0 ? 0xaaeeff : 0x66ccdd;
                    g.lineStyle(2.5 - t, col, alpha);
                    // Rotating ellipse approximation with 8 segments
                    for (let s = 0; s < 8; s++) {
                        const a1 = (s / 8) * Math.PI * 2 + spin + layer * 0.4;
                        const a2 = ((s + 1) / 8) * Math.PI * 2 + spin + layer * 0.4;
                        g.lineBetween(
                            this.x + Math.cos(a1) * layerR,
                            layerY + Math.sin(a1) * layerR * 0.35,
                            this.x + Math.cos(a2) * layerR,
                            layerY + Math.sin(a2) * layerR * 0.35
                        );
                    }
                }
                // Debris particles orbiting the funnel
                for (let d = 0; d < 5; d++) {
                    const da = (d / 5) * Math.PI * 2 + spin * 1.5;
                    const dr = r * (0.4 + Math.sin(this.age * 0.1 + d) * 0.2);
                    const dy = this.y - hh * 0.3 + Math.cos(this.age * 0.07 + d) * hh * 0.5;
                    g.fillStyle(0xffffff, 0.5);
                    g.fillCircle(this.x + Math.cos(da) * dr, dy + Math.sin(da) * dr * 0.3, 2);
                }
                // Center core glow
                g.fillStyle(0xeeffff, 0.3);
                g.fillEllipse(this.x, this.y, hw * 0.5, hh * 0.6);
            } else {
                // Generic projectile (fallback)
                g.fillStyle(pCol, 0.8);
                g.fillRect(this.x - hw, this.y - hh, this.w, this.h);
                g.lineStyle(1, 0xffffff, 0.5);
                g.strokeRect(this.x - hw, this.y - hh, this.w, this.h);
            }
        }
        update(dt) {
            if (!this.alive) return;
            this.vy += this.gravity * dt;
            this.x += this.vx * dt; this.y += this.vy * dt;
            this.age++;
            this.draw();
            this.trailTimer++;
            if (this.trailTimer % 3 === 0) {
                const c = this.isFreeze ? 0x88ddff : this.isLasso ? 0xddaa44 :
                    this.charKey === 'wizard' ? 0x9944ff :
                    this.charKey === 'bowman' ? 0xcc9944 :
                    this.charKey === 'cowboy' ? 0xffcc44 :
                    this.charKey === 'superguy' ? 0xff4400 :
                    this.charKey === 'osprey' ? 0x88eeff :
                    (this.ownerIndex === 0 ? 0x3399ff : 0xff4444);
                this.scene.spawnParticles(this.x, this.y, c, 1);
            }
            if (Math.abs(this.x - this.startX) > this.maxDist) { this.destroy(); return; }
            if (this.x < BLAST_ZONES.left - 50 || this.x > BLAST_ZONES.right + 50 ||
                this.y < BLAST_ZONES.top - 100 || this.y > BLAST_ZONES.bottom + 50) this.destroy();
        }
        reflect(reflectorIndex) {
            this.vx *= -1.3; this.vy *= -0.5;
            this.ownerIndex = reflectorIndex; this.reflected = true; this.startX = this.x;
            // charKey intentionally NOT changed — reflected projectile keeps its original appearance
            this.scene.spawnParticles(this.x, this.y, 0xffffff, 6);
        }
        destroy() { this.alive = false; if (this.gfx) { this.gfx.destroy(); this.gfx = null; } }
    }

    // ============================================================
    // INPUT BUFFER
    // Stores buffered button presses for a short window (bufferFrames).
    // Inputs are registered via event-driven .press() calls (not polling),
    // so they're never dropped due to frame timing. Each buffered action
    // can be consumed exactly once, preventing repeated triggering.
    // ============================================================
    class InputBuffer {
        constructor(bufferFrames = 7) {
            this.bufferFrames = bufferFrames;
            // Maps action name -> frames remaining until expiry (0 = no buffered input)
            this.buffer = {
                jump: 0,
                attack: 0,
                strong: 0,
                move3: 0,
                move4: 0,
                fastfall: 0,
                airdodge: 0,
            };
        }

        // Call from a Phaser key 'down' event — records a press with full buffer window.
        press(action) {
            if (action in this.buffer) {
                this.buffer[action] = this.bufferFrames;
            }
        }

        // Attempt to consume a buffered input. Returns true and clears it if present.
        consume(action) {
            if (this.buffer[action] > 0) {
                this.buffer[action] = 0;
                return true;
            }
            return false;
        }

        // Call once per fighter update tick to age out old inputs.
        tick() {
            for (const k in this.buffer) {
                if (this.buffer[k] > 0) this.buffer[k]--;
            }
        }
    }

    // ============================================================
    // FIGHTER
    // ============================================================
    class Fighter {
        constructor(scene, x, y, playerIndex, color, charKey) {
            this.scene = scene; this.playerIndex = playerIndex;
            this.color = color; this.charKey = charKey;
            this.charData = CHARACTERS[charKey];

            this.sprite = scene.add.rectangle(x, y, FIGHTER_CONFIG.width, FIGHTER_CONFIG.height, color).setDepth(5);
            scene.physics.add.existing(this.sprite);
            this.body = this.sprite.body;
            this.body.setGravityY(FIGHTER_CONFIG.gravity);
            this.body.setMaxVelocityY(FIGHTER_CONFIG.maxFallSpeed);
            this.body.setBounce(0); this.body.setCollideWorldBounds(false);

            this.state = S.IDLE; this.facing = playerIndex === 0 ? 1 : -1;
            this.damage = 0; this.stocks = 3;
            this.jumpsRemaining = FIGHTER_CONFIG.maxJumps;
            this.attackFrame = 0; this.currentAttack = null;
            this.stateTimer = 0; this.fastFalling = false;
            this.hasHitThisAttack = false;
            this.invincible = 120; this.comboCount = 0;
            this.hitstunDuration = 0; this.isGrounded = false;
            this.dropThrough = false;
            this.dropThroughTimer = 0;
            this.lassoPullTarget = null; this.lassoPullSpeed = 0;
            this.freezeDuration = 0; this.freezeMashCount = 0;
            this.hasUsedFly = false;
            this.airdodgeCooldown = 0; // Frames until can airdodge again
            this.airdodgeVx = 0;      // Saved velocity direction for dodge
            this.airdodgeVy = 0;

            // Ledge grab
            this.ledgeGrabCooldown = 0; // Can't re-grab same ledge immediately
            this.currentLedge = null;

            // Shield
            this.shieldHP = FIGHTER_CONFIG.shieldMaxHP;
            this.shielding = false;
            this.shieldGfx = scene.add.ellipse(x, y, 55, 70, COLORS.shield, 0.25).setDepth(6);
            this.shieldGfx.setStrokeStyle(2, COLORS.shield, 0.6);
            this.shieldGfx.setVisible(false);

            // Hitbox
            this.hitboxActive = false;
            this.hitboxRect = { x: 0, y: 0, w: 0, h: 0 };

            // Hit stop — both fighters freeze for a few frames on impact
            this.hitStop = 0;
            this._hitStopVx = 0; // Saved velocity to restore after hit stop
            this._hitStopVy = 0;
            this._pendingHitStop = 0;

            // Screen splat state
            this.splatX = 0; this.splatY = 0;
            this.splatGfx = null; // Will be created on splat

            this.faceIndicator = scene.add.rectangle(x, y - 18, 8, 8, 0xffffff).setDepth(11);
            this.shadow = scene.add.ellipse(x, STAGE.mainPlatform.y - 4, 36, 8, 0x000000, 0.3).setDepth(0);
            this.spawnX = x; this.spawnY = y;

            // Stick figure limb angles (radians, 0 = straight down)
            // These are hooks for future animation — currently set by state in updateLimbs()
            this.limbs = {
                // Upper arm angles (from shoulder, 0=down, positive=forward)
                armFrontUpper: 0, armBackUpper: 0,
                // Lower arm angles (from elbow, relative to upper arm)
                armFrontLower: 0, armBackLower: 0,
                // Upper leg angles (from hip, 0=down, positive=forward)
                legFrontUpper: 0, legBackUpper: 0,
                // Lower leg angles (from knee, relative to upper leg)
                legFrontLower: 0, legBackLower: 0,
                // Head tilt
                headTilt: 0,
                // Torso lean (radians from vertical)
                torsoLean: 0,
                // Weapon: sword (angle from hand, length, visibility)
                swordAngle: 0,    // Radians from hand position, 0 = forward
                swordLength: 0,   // Pixel length of sword
                swordVisible: false,
            };

            // Per-character movement stat overrides
            this.groundSpeed = FIGHTER_CONFIG.groundSpeed;
            this.airSpeed = FIGHTER_CONFIG.airSpeed;
            this.jumpForce = FIGHTER_CONFIG.jumpForce;
            if (charKey === 'brute') {
                this.groundSpeed = 195; // Slowest on the roster
                this.airSpeed = 160;
                this.jumpForce = -480; // Heavier jump
            } else if (charKey === 'osprey') {
                this.groundSpeed = 240;
                this.airSpeed = 300;
                this.jumpForce = -638;  // 10% higher than before (-580)
                this.floatTimer = 0;    // float hold tracker
                this.maxFloatFrames = 90; // 1.5s @ 60fps
            }

            // Input buffer: catches jump/attack presses that land on a busy frame
            this.inputBuffer = new InputBuffer(7);
        }

        setState(s) { this.state = s; this.stateTimer = 0; }

        update(cursors) {
            // Tick the input buffer every frame so buffered inputs age out correctly.
            // This runs even during hit stop so the window stays accurate.
            this.inputBuffer.tick();

            // ---- HIT STOP ----
            // Both fighters freeze for a few frames on impact for tactile weight
            if (this.hitStop > 0) {
                this.hitStop--;
                // Keep body locked while frozen
                this.body.setVelocity(0, 0);
                this.body.setGravityY(0);
                // On the last frame, restore saved velocity + gravity
                if (this.hitStop === 0) {
                    this.body.setGravityY(FIGHTER_CONFIG.gravity);
                    this.body.setVelocity(this._hitStopVx, this._hitStopVy);
                }
                // Still update visuals (position/shadow/shield gfx) but skip all gameplay logic
                this.faceIndicator.setPosition(this.sprite.x + (this.facing * 12), this.sprite.y - 18);
                this.shadow.setPosition(this.sprite.x, STAGE.mainPlatform.y - 4);
                this.shieldGfx.setPosition(this.sprite.x, this.sprite.y);
                return;
            }

            this.stateTimer++;
            if (this.airdodgeCooldown > 0) this.airdodgeCooldown--;
            if (this.invincible > 0) this.invincible--;
            if (this.ledgeGrabCooldown > 0) this.ledgeGrabCooldown--;
            this.isGrounded = this.body.touching.down || this.body.blocked.down;
            if (this.isGrounded && this.spawnProtected) this.spawnProtected = false;

            this.sprite.setAlpha(this.invincible > 0 ? (Math.sin(this.invincible * 0.5) > 0 ? 1 : 0.3) : 1);
            this.faceIndicator.setPosition(this.sprite.x + (this.facing * 12), this.sprite.y - 18);
            this.shadow.setPosition(this.sprite.x, STAGE.mainPlatform.y - 4);
            this.shadow.setAlpha(Math.max(0, 0.3 - (STAGE.mainPlatform.y - this.sprite.y) * 0.001));
            this.shieldGfx.setPosition(this.sprite.x, this.sprite.y);

            // Hide all visuals during splat and death
            if (this.state === S.SCREEN_SPLAT || this.state === S.DEAD) {
                this.sprite.setVisible(false); this.sprite.setAlpha(0);
                this.faceIndicator.setVisible(false);
                this.shadow.setVisible(false);
                this.shieldGfx.setVisible(false);
            } else {
                this.shadow.setVisible(true);
            }

            // Shield regen
            if (this.state !== S.SHIELD && this.state !== S.SHIELDSTUN && this.state !== S.SHIELDBREAK) {
                this.shieldHP = Math.min(this.shieldHP + FIGHTER_CONFIG.shieldRegenRate, FIGHTER_CONFIG.shieldMaxHP);
                this.shielding = false; this.shieldGfx.setVisible(false);
            }

            // Drop-through: only activated by explicit down-key press while grounded.
            // A timer keeps the window open long enough for the body to clear the platform.
            if (cursors.down.isDown &&
                this.state !== S.SHIELD && this.state !== S.SHIELDSTUN &&
                this.state !== S.SHIELDBREAK && this.state !== S.LEDGE_HANG &&
                this.isGrounded && this.state !== S.ATTACK) {
                this.dropThroughTimer = 10; // open for 10 frames
            }
            if (this.dropThroughTimer > 0) {
                this.dropThroughTimer--;
                this.dropThrough = true;
            } else {
                this.dropThrough = false;
            }

            // Blast zone (except during splat — splat handles its own transition to KO)
            if (this.state !== S.DEAD && this.state !== S.SCREEN_SPLAT) {
                if (this.sprite.x < BLAST_ZONES.left || this.sprite.x > BLAST_ZONES.right ||
                    this.sprite.y < BLAST_ZONES.top || this.sprite.y > BLAST_ZONES.bottom) {
                    this.onKO(); return;
                }
            }

            switch (this.state) {
                case S.IDLE:
                    this.handleMovement(cursors); this.handleJump(cursors);
                    this.handleAttackInput(cursors); this.handleShieldInput(cursors);
                    this.applyGroundFriction(); this.hitboxActive = false;
                    if (!this.isGrounded) { this.setState(S.AIRBORNE); this.jumpsRemaining = Math.max(0, this.jumpsRemaining - 1); }
                    break;
                case S.RUN:
                    this.handleMovement(cursors); this.handleJump(cursors);
                    this.handleAttackInput(cursors); this.handleShieldInput(cursors);
